<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="%CSP%" />
  <title>git-graph</title>
  <!-- Peint avant que le bundle n'existe. Sans ce fond, la fenêtre s'ouvre en blanc puis
       bascule en sombre à l'arrivée d'app.css. React vide #root à son premier commit :
       le splash s'en va sans une ligne de JS — et la CSP de prod interdit l'inline. -->
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0 }
    /* pas sur body : app.css y pose `bg-background` dans @layer base, qu'une règle sans
       layer écraserait — le thème ne suivrait plus les tokens. */
    html { background: light-dark(#fff, #0a0a0a) }

    #splash { position: fixed; inset: 0; display: grid; place-items: center }
    #splash svg { width: 44px; height: 44px; animation: splash 1.2s ease-in-out infinite alternate }
    @keyframes splash { from { opacity: .4 } to { opacity: 1 } }
    @media (prefers-reduced-motion: reduce) { #splash svg { animation: none } }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <svg viewBox="0 0 20 20" fill="none" stroke-linecap="round" role="img" aria-label="Chargement">
        <path d="M5 17.2V3.4" stroke="light-dark(oklch(0.56 0.16 250), oklch(0.70 0.14 250))" stroke-width="1.7" />
        <path d="M15 17.2v-3.7C15 10 5 12.5 5 9" stroke="light-dark(oklch(0.55 0.19 322), oklch(0.70 0.17 322))" stroke-width="1.7" />
        <circle cx="5" cy="3.4" r="2.4" fill="light-dark(oklch(0.56 0.16 250), oklch(0.70 0.14 250))" />
        <circle cx="15" cy="17.2" r="2.1" fill="light-dark(oklch(0.55 0.19 322), oklch(0.70 0.17 322))" />
        <circle cx="5" cy="9" r="2.3" fill="light-dark(#fff, #0a0a0a)"
                stroke="light-dark(oklch(0.56 0.16 250), oklch(0.70 0.14 250))" stroke-width="1.6" />
      </svg>
    </div>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
