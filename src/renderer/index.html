<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="%CSP%" />
  <title>Amont</title>
  <!-- Painted before the bundle even exists. Without this backdrop, the window opens white then
       flips to dark once app.css lands. React clears #root on its first commit: the splash goes
       away without a line of JS — and the production CSP forbids inline scripts anyway. -->
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0 }
    /* not on body: app.css sets `bg-background` there inside @layer base, which an unlayered
       rule would override — the theme would stop following the tokens. */
    html { background: light-dark(#fff, #0a0a0a) }

    #splash { position: fixed; inset: 0; display: grid; place-items: center }
    #splash svg { width: 44px; height: 44px; animation: splash 1.2s ease-in-out infinite alternate }
    @keyframes splash { from { opacity: .4 } to { opacity: 1 } }
    @media (prefers-reduced-motion: reduce) { #splash svg { animation: none } }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <svg viewBox="0 0 240 240" role="img" aria-label="Loading">
        <defs>
          <linearGradient id="splash-courant" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="#6AA6E8"/>
            <stop offset="1" stop-color="#8F8FE8"/>
          </linearGradient>
        </defs>
        <path d="M62,192 C62,132 92,112 114,70" fill="none" stroke="url(#splash-courant)" stroke-width="22" stroke-linecap="round"/>
        <path d="M178,192 C178,132 148,112 126,70" fill="none" stroke="url(#splash-courant)" stroke-width="22" stroke-linecap="round"/>
        <path d="M94,148 H146" fill="none" stroke="light-dark(#1C1C22, #ECECF2)" stroke-width="16" stroke-linecap="round"/>
        <circle cx="120" cy="40" r="13" fill="#F272A8"/>
      </svg>
    </div>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
