the\nSENTRY_DSN repository variable, and local testing is just\n`MAIN_VITE_SENTRY_DSN=\u003cdsn> pnpm dev`. The committed .env.example added\nnothing, so it's removed. .gitignore still ignores a stray local .env as\na safety net. Comments and docs updated to match.\n\nCo-Authored-By: Claude Opus 4.8 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01Nj43QLE65KCsVUANmxX22h\n","a78d64071d67c46a0c7d0d75fa9028424de18811":"Official release builds get MAIN_VITE_SENTRY_DSN from the `SENTRY_DSN`\nrepository variable (mapped in release.yml). electron-vite reads it from\nthe build environment, so no committed file is needed. A DSN is embedded\nin the shipped binary, so it's a variable, not a secret.\n\nCI (ci.yml) stays without it: validation builds and fork PRs send\nnothing. The .env path remains for local testing only. Docs updated\n(README maintainer note, .env.example, SECURITY.md).\n\nCo-Authored-By: Claude Opus 4.8 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01Nj43QLE65KCsVUANmxX22h\n","e155859942b89a565b9376739f477ddadc4c241f":"# Conflicts:\n#\tsrc/renderer/src/locales/en.po\n#\tsrc/renderer/src/locales/fr.po\n","19d900afad84c555ff9bd742afc4157cd2d1f629":"Wire @sentry/electron across main, preload and renderer so unhandled\nerrors and native crashes are reportable, without weakening the app's\nprivacy posture.\n\n- DSN is injected at build time from a gitignored .env\n  (MAIN_VITE_SENTRY_DSN, cf. .env.example). Builds from source and dev\n  runs have no DSN, so telemetry is fully inert — nothing is ever sent\n  by contributors' or unofficial builds.\n- Opt-out at runtime via a toggle on the home screen, persisted in\n  state.json. beforeSend re-reads the flag on every event, so flipping\n  it takes effect immediately (native minidumps included).\n- No PII: sendDefaultPii false, plus hostname/user scrubbed in\n  beforeSend. No repository contents, diffs, or credentials are sent.\n- Events leave from the main process; @sentry/electron forwards renderer\n  errors over IPC, so the renderer opens no socket and the strict CSP is\n  unchanged. ErrorBoundary reports React render throws with the\n  component stack.\n- Docs: README Privacy + maintainer note, SECURITY.md subsection.\n\nCo-Authored-By: Claude Opus 4.8 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01Nj43QLE65KCsVUANmxX22h\n","2fda957ac3084164e0dd884d9d499ac3d63453b8":"CI's format:check step flagged the new files; no behavior change.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01LZvPkHare8j2WDxdbM8LFi\n","64570bf4b271aaf68c93ec072897aec756f589fe":"Adds a \"Resolve merge conflicts side by side\" section describing the A/B\npanes, the header/chunk/line pickers, click-ordered output and the\neditable highlighted result, with a screenshot from the mock harness.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01LZvPkHare8j2WDxdbM8LFi\n","f20a4a2cf2617783122e78639689c964d6fd8d59":"# Conflicts:\n#\tsrc/renderer/src/locales/en.po\n#\tsrc/renderer/src/locales/fr.po\n","ea55601c9dd2acb906897edfc3e06f5fe0255c79":"- the merged output is now syntax-highlighted like the panes: a\n  transparent textarea over a scroll-synced, shiki-tokenized \u003cpre>; the\n  \u003cmerge conflict> placeholder gets its own muted-italic styling\n- picks and manual edits share one buffer instead of an either/or overlay.\n  A pick toggle splices only its conflict's block into the current text\n  (applyPickDiff: exact re-derive when untouched, per-region occurrence\n  splice once hand-edited), so typed edits elsewhere survive and the\n  pickers never lock. \"Reset to selection\" regenerates from current picks\n- tests for the splice/coexistence model; verify skill + fr/en updated\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01LZvPkHare8j2WDxdbM8LFi\n","632aeb7313424fbd323af43f037ea360399e576b":"Introduce a menubar-based application menu (File / View / Help) in the\nwindow header, built on a clean, extensible architecture so new menus are\ntrivial to add.\n\n- add the shadcn/base-ui `menubar` primitive (primitives/menubar.tsx) and\n  its app-styled wrapper (ui/menubar.tsx), matching the context-menu look\n- app/menu/: a data-driven menu model — declarative `MenuDescriptor`s\n  (menus/file, menus/view, menus/help) resolved against a single\n  `MenuContext` seam into App state, rendered by AppMenu. Adding a menu is\n  one descriptor + one registry line, no App wiring.\n- wire AppMenu into the TabStrip header; build the MenuContext in App\n- expose the app version to the renderer via a Vite `define`\n  (Help ▸ About)\n- i18n: new `menu.*` strings with French translations\n\nFile covers new/open/close, View covers home/theme/reload, Help covers\ndocs/source/issues and the version.\n","64af74821ebe03fbc31ba5ee1cfab2ea792d137c":"The file rows (commit detail, staging) kept the old active state — 1px\nprimary outline + primary/30 fill, two channels at once — and a full-muted\nhover. Both the file tree and the refs sidebar now mark selection with a\nsingle quiet tinted fill (primary/15, primary/20 on hover) and a neutral\nmuted/60 hover, no left rail or border.\n\nDropping the rail removes the border-l placeholder from every row (no\nlayout shift between states) and the inset-::before machinery it needed to\nstay straight over a rounded fill. Contiguous lit refs still merge into one\nblock: the data-run DOM pass squares the corners between neighbors so the\nfill reads as a single surface. The flat graph rows keep their own rail —\nnon-rounded full-bleed rows carry it cleanly.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01F7Ld5FAt4y1rfnCnXw7bxY\n","4d1960433a23609fae1d7535a7c1c89a9283ebc8":"- both panes go through the same lazy shiki core as the diff view: each\n  side is tokenized as one document (context + that side's lines) so the\n  grammar sees real code; unknown grammars fall back to plain text\n- an unpicked conflict now shows as a single \"\u003cmerge conflict>\"\n  placeholder line in the merged output instead of the raw marker block;\n  unpicking everything brings the placeholder back, and unresolvedCount\n  (placeholders + real marker blocks, hand-typed ones included) is what\n  gates \"Mark as resolved\"\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01LZvPkHare8j2WDxdbM8LFi\n","f0fddcf7ef9d976da52eb4138652a47073ee6a2d":"Replaces the Take A / Take B / Take A then B buttons with a selection\nmodel where the output order is the click order, never a hardcoded\nA-before-B:\n\n- Picks (conflict-parse.ts): per conflict, an ordered list of line refs —\n  toggleLine appends/removes a single line, setSide appends a side's\n  unpicked lines as a run (off removes them wherever the clicks put\n  them), renderPicks emits picked lines in click order and keeps the raw\n  markers of untouched conflicts, so resolve stays blocked and every\n  selection is reversible (uncheck everything, markers come back)\n- ConflictView: checkbox per side in the pane headers (whole file),\n  checkbox per chunk (indeterminate when partial), +/- button per line;\n  each picked line shows its 1-based position in the output region\n- hand-editing the merged output freezes the pickers (with a hint and\n  Undo edits) instead of silently clobbering either side\n- Checkbox primitive learns the indeterminate visual (dash)\n- tests for the picks model; verify skill updated; en/fr catalogs\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01LZvPkHare8j2WDxdbM8LFi\n","d88446bda2be9d0f88958c784f606b851a623e6c":"Sections reordered (clone > local > bare remote), and the clone name input\nbecomes an input group whose frozen addon spells out the exact path the\nclone will create — destination prefix (start-truncated so its tail stays\nvisible) followed by the editable folder name.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_019R7SddnGQpwNR44JJ8espV\n","4f0752735774eef26548c94dae27a095980fb078":"The + in the tab strip used to jump back to the home screen. It now opens a\ndedicated pinned page — a real ARIA tab like home — from which one can:\n- initialize a local repository (git init) and open it in a tab,\n- create a bare repository (name.git), meant to be used as a remote,\n- clone an existing repository from a URL or local path and open it.\n\nMain side, destinations stay confined: create:chooseDir shows the system\npicker and remembers the choice; init/bare/clone refuse any folder that\ndidn't come through it or isn't the configured root (same model as\n'openable'). Names are validated as a single path segment, the clone URL\nmust not look like an option, and an existing target is refused (new\nEXISTS error code). In-flight clone children are killed at window close.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_019R7SddnGQpwNR44JJ8espV\n","02b697c22acb9f943fc355fd3226642885ed72f5":"End-to-end slice, from git to the UI:\n\n- main: repo:mergeState (who is A/ours and B/theirs, from MERGE_HEAD),\n  repo:conflict (the three index stages + working file), repo:resolve\n  (write merged output + git add, under the repo mutex), repo:mergeAbort\n- shared contract + preload projection extended accordingly\n- renderer: ConflictView overlays the graph (same slot as the diff) —\n  side A (current branch, blue) and side B (incoming branch, green) are\n  labeled from the merge state and aligned block by block; per-conflict\n  Take A / Take B / Take A then B actions patch the editable merged\n  output, which is the single source of truth (panes re-derive from it);\n  \"Mark as resolved\" enables once no markers remain and stages the file\n- conflict-parse: pure marker parser (diff3 base skipped, CRLF tolerated,\n  unterminated blocks flow back as context) + unit tests\n- worktree panel: conflicts get their own block (click opens the\n  resolution view, no stage button) plus a merge-in-progress banner\n  naming both sides with an abort action\n- mock harness: simulated merge with UU and AA conflicts; verify skill\n  documents the flow; en/fr catalogs extended\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01LZvPkHare8j2WDxdbM8LFi\n","7510f896404cfad2fdccd144fedb1e70c1c014f0":"Build-free renderer verification recipe: launch pnpm mock, drive\nmock.html with Playwright, plus the sidebar selectors and gotchas\nlearned while verifying the refs styling.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01F7Ld5FAt4y1rfnCnXw7bxY\n","3fa4ff8ef7da49b8f630177e3ff31d5695732cd9":"The sidebar's three branch-row states each get a single visual channel,\naligned with the graph rows' existing selection language (ROW_CLASS):\n\n- selected: primary/20 fill + 2px left rail (was a 1px primary outline);\n  contiguous lit refs merge into one filled block by squaring the corners\n  between neighbors — refs-focus-paint.ts is unchanged, only the CSS\n  consuming data-run moved from borders to radii\n- current branch (HEAD): semibold label + primary dot marker (was the\n  loudest fill in the sidebar, primary/30, outranking the selection)\n- hover: muted/60, matching the graph rows (was full muted)\n- keyboard focus: ring on rows, same as the folder triggers (was absent)\n\nStash rows pick up the same base so all .amont-refrow rows stay aligned;\nthe border/-my-px layout hacks the outline needed are gone.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01F7Ld5FAt4y1rfnCnXw7bxY\n","16c688234adfa781a38aa8918efeb07f2d153c07":"GitHub proxies HTML \u003cimg>/\u003cpicture> content through camo, which cannot\nauthenticate to a private repository — every screenshot rendered as a\nbroken image. Markdown images go through signed raw URLs instead.\nCosts the theme-aware \u003cpicture> switching (a dark shot is shown inline\ninstead) and the dynamic release/CI badges, which also query the API\nanonymously. The header icon becomes a pre-scaled docs/logo.png since\nMarkdown cannot size images.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01WfQK9dhvNVJWEVQtFwai9C\n","48a3c6237b5dd3bc3673633aba3e18e5ef226344":"Light and dark captures of the commit graph + detail panel, the\nside-by-side diff, and the staging panel, taken from the pnpm mock\nharness; served theme-aware via \u003cpicture> tags.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01WfQK9dhvNVJWEVQtFwai9C\n","87c6fa0fd8a9b592d78b3da152595411998e42da":"The preview config was missing the lingui plugin and babel macro, so the\nraw .po catalogs were served as JS and the harness died on a syntax error.\nWith that fixed, two module-scope messages.* reads surfaced — they run `t`\nduring import, before setupI18n() activates a locale (throws in dev) —\ndeferred behind thunks, matching the getter convention in lib/messages.ts.\n\nCo-Authored-By: Claude Fable 5 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01WfQK9dhvNVJWEVQtFwai9C\n","592f3717947373809ea0dbbf4f74f13958aa2f74":"The dropped EyeIcon/EyeOffIcon imports let the icon import fit one line;\nCI's format:check requires it.\n\nCo-Authored-By: Claude Opus 4.8 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01NdrPWMGua68wycWSoDegn5\n","bea5384ea1eff8d5b1283137dcfe5d209b3c3611":"Avatars now always resolve, so the README Privacy section and the SECURITY\nCSP note no longer describe an off-by-default toggle.\n\nCo-Authored-By: Claude Opus 4.8 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01NdrPWMGua68wycWSoDegn5\n","d803dc2b057836023f0add92fdeab8d30bb0855f":"Network avatars (Gravatar/GitHub) were off by default behind an opt-in\ntoggle. Remove the toggle entirely and always resolve avatars: drop the\nenabled/setEnabled/useEnabled machinery and its localStorage pref, the\ntab-strip toggle button, and the associated messages and locale strings.\n\nCo-Authored-By: Claude Opus 4.8 \u003cnoreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01NdrPWMGua68wycWSoDegn5\n","4bb9a3942013266a87a161d9091ef4923df0cb8d":"# Conflicts:\n#\tREADME.md\n"},"FILES":{"266e136d638ce2ef4f603aba2235adb171786640":[{"st":"M","path":"package.json","old":null}],"227c6f01005901648d1532b3e3916d62f68ea86e":[{"st":"M","path":"README.md","old":null},{"st":"M","path":"src/main/ipc.ts","old":null},{"st":"M","path":"src/preload/index.ts","old":null},{"st":"M","path":"src/renderer/mock.html","old":null},{"st":"M","path":"src/renderer/src/lib/git.ts","old":null},{"st":"M","path":"src/renderer/src/lib/messages.ts","old":null},{"st":"M","path":"src/renderer/src/locales/en.po","old":null},{"st":"M","path":"src/renderer/src/locales/fr.po","old":null},{"st":"M","path":"src/shared/ipc-contract.ts","old":null}],"0e542f64134a7fb9c0184143b30ea59cf84f2ebd":[{"st":"D","path":".env.example","old":null},{"st":"M","path":".gitignore","old":null},{"st":"M","path":"README.md","old":null},{"st":"M","path":"SECURITY.md","old":null},{"st":"M","path":"src/main/env.d.ts","old":null},{"st":"M","path":"src/main/telemetry.ts","old":null}],"a78d64071d67c46a0c7d0d75fa9028424de18811":[{"st":"M","path":".env.example","old":null},{"st":"M","path":".github/workflows/release.yml","old":null},{"st":"M","path":"README.md","old":null},{"st":"M","path":"SECURITY.md","old":null}],"e155859942b89a565b9376739f477ddadc4c241f":[{"st":"M","path":" :[{"st":"M","path":"src/renderer/src/app/tab-strip.tsx","old":null},{"st":"M","path":"src/renderer/src/lib/avatar.test.ts","old":null},{"st":"M","path":"src/renderer/src/lib/avatar.ts","old":null},{"st":"M","path":"src/renderer/src/lib/messages.ts","old":null},{"st":"M","path":"src/renderer/src/lib/prefs.ts","old":null},{"st":"M","path":"src/renderer/src/locales/en.po","old":null},{"st":"M","path":"src/renderer/src/locales/fr.po","old":null}],"4bb9a3942013266a87a161d9091ef4923df0cb8d":[{"st":"M","path":"README.md","old":null}],"d24914dcda537c08720671565e63d94be5ccf3dd":[{"st":"M","path":"README.md","old":null}]},"DIFFS":{"266e136d638ce2ef4f603aba2235adb171786640 package.json":"diff --git a/package.json b/package.json\nindex 7729464..ef95648 100644\n--- a/package.json\n+++ b/package.json\n@@ -1,6 +1,6 @@\n {\n   \"name\": \"amont\",\n-  \"version\": \"0.13.0\",\n+  \"version\": \"0.14.0\",\n   \"private\": true,\n   \"type\": \"module\",\n   \"description\": \"A Git history visualizer\",\n","227c6f01005901648d1532b3e3916d62f68ea86e README.md":"diff --git a/README.md b/README.md\nindex 56e0546..6056d93 100644\n--- a/README.md\n+++ b/README.md\n@@ -42,6 +42,23 @@ amend — with the exact git command shown on the button before you run it.\n \n ![The staging panel: unstaged and staged file trees, a live side-by-side diff of a modified file, and a commit message box with the Commit button.](docs/worktree-light.png)\n \n+## Resolve merge conflicts side by side\n+\n+When a merge, rebase, or stash pop leaves conflicts, the conflicted files get their own\n+block in the staging panel and a banner naming both sides — **A** is the branch you're on\n+(_ours_), **B** the one being merged in (_theirs_). Opening a file lays the two versions out\n+in aligned, syntax-highlighted panes so it's always clear which change came from where.\n+\n+You build the resolution by picking: a checkbox in each pane header takes a whole side across\n+every conflict, a per-chunk checkbox takes one side of one conflict, and per-line `+`/`−`\n+buttons take individual lines. Lines land in the merged output **in the order you click\n+them** — no forced A-before-B — and each carries its position so that order stays visible.\n+The output is a normal, syntax-highlighted editor: picks and hand edits coexist, so you can\n+fine-tune the result and still keep clicking. `Mark as resolved` writes the file and stages\n+it once no conflict markers remain.\n+\n+![The conflict resolution view: the \"ours\" (A) and \"theirs\" (B) versions of a file in two aligned, syntax-highlighted panes with per-side and per-line pickers, above an editable merged output.](docs/conflict-light.png)\n+\n ## And more\n \n - **git-flow aware** — feature/release/hotfix branches get a context banner and a\n","227c6f01005901648d1532b3e3916d62f68ea86e src/main/ipc.ts":"diff --git a/src/main/ipc.ts b/src/main/ipc.ts\nindex 7d6b8b0..5af4e6a 100644\n--- a/src/main/ipc.ts\n+++ b/src/main/ipc.ts\n@@ -241,6 +241,10 @@ export function registerIpc(): void {\n   handle(\"repo:checkout\", (_ev, id, name) => ops.checkout(repos.use(id), name))\n   handle(\"repo:stashes\", (_ev, id) => queries.stashList(repos.use(id)))\n   handle(\"repo:stash\", (_ev, id, action, arg) => ops.stashAction(repos.use(id), action, arg))\n+  handle(\"repo:mergeState\", (_ev, id) => queries.mergeState(repos.use(id)))\n+  handle(\"repo:conflict\", (_ev, id, path) => queries.conflict(repos.use(id), path))\n+  handle(\"repo:resolve\", (_ev, id, path, content) => ops.resolveConflict(repos.use(id), path, content))\n+  handle(\"repo:mergeAbort\", (_ev, id) => ops.mergeAbort(repos.use(id)))\n \n   handle(\"repo:cancel\", (_ev, id, requestId) => {\n     repos.use(id).requests.get(requestId)?.abort()\n","227c6f01005901648d1532b3e3916d62f68ea86e src/preload/index.ts":"diff --git a/src/preload/index.ts b/src/preload/index.ts\nindex 906102d..baff295 100644\n--- a/src/preload/index.ts\n+++ b/src/preload/index.ts\n@@ -72,6 +72,10 @@ const bridge: Bridge = {\n   checkout: invoke(\"repo:checkout\"),\n   stashes: invoke(\"repo:stashes\"),\n   stash: invoke(\"repo:stash\"),\n+  mergeState: invoke(\"repo:mergeState\"),\n+  conflict: invoke(\"repo:conflict\"),\n+  resolve: invoke(\"repo:resolve\"),\n+  mergeAbort: invoke(\"repo:mergeAbort\"),\n   fileIcon: invoke(\"repo:fileIcon\"),\n   openFile: invoke(\"repo:openFile\"),\n   cancel: invoke(\"repo:cancel\"),\n","227c6f01005901648d1532b3e3916d62f68ea86e src/renderer/mock.html":"diff --git a/src/renderer/mock.html b/src/renderer/mock.html\nindex 21f0969..e0097ec 100644\n--- a/src/renderer/mock.html\n+++ b/src/renderer/mock.html\n@@ -146,9 +146,58 @@\n           { st: \"D\", path: \"src/legacy/old.ts\" },\n         ],\n         untracked: [{ st: \"?\", path: \"notes/todo.md\" }],\n-        conflicts: [],\n+        conflicts: [\n+          { st: \"UU\", path: \"src/solver/threshold.ts\" },\n+          { st: \"AA\", path: \"src/solver/params.ts\" },\n+        ],\n       }\n       const drop = (arr, paths) => arr.filter((f) => !paths.includes(f.path))\n+      /* MERGE_HEAD outlives the last resolved file (until commit or abort), like real git */\n+      let merging = true\n+\n+      /* Simulated merge in progress: feature/cost-optim (B/theirs) into develop (A/ours).\n+     threshold.ts is a both-modified (UU) with two blocks — the first diff3-style, to\n+     exercise the base-section skip — params.ts a both-added (AA): no base stage. */\n+      const CONFLICTS = {\n+        \"src/solver/threshold.ts\": {\n+          base: \"export const EPSILON = 1e-6\\nexport const THRESHOLD = 0.5\\n\\nexport function clamp(x) {\\n  return Math.max(0, Math.min(1, x))\\n}\\n\",\n+          ours: \"export const EPSILON = 1e-6\\nexport const THRESHOLD = 0.75 // calibrated on the sparse suite\\n\\nexport function clamp(x) {\\n  return Math.max(0, Math.min(1, x))\\n}\\n\",\n+          theirs:\n+            \"export const EPSILON = 1e-9\\nexport const THRESHOLD = 0.6 // aligned with the cost model\ ps, before it leaves the process.\n - Reports exclude PII (`sendDefaultPii: false`, plus hostname/user scrubbed in `beforeSend`)\n","e155859942b89a565b9376739f477ddadc4c241f src/renderer/src/lib/messages.ts":"diff --git a/src/renderer/src/lib/messages.ts b/src/renderer/src/lib/messages.ts\nindex 466e0cd..5183137 100644\n--- a/src/renderer/src/lib/messages.ts\n+++ b/src/renderer/src/lib/messages.ts\n@@ -379,6 +379,73 @@ export const messages = {\n       staged ? `${verb} · ${plural(staged, { one: \"# file\", other: \"# files\" })}` : verb,\n   },\n \n+  conflict: {\n+    get conflicts() {\n+      return t`Conflicts`\n+    },\n+    /* the A/B letters are deliberately literal (not translated): they're the visual anchor\n+       shared by the banner, the pane headers and the per-conflict buttons */\n+    mergeBanner: (theirs: string, ours: string) => t`Merging ${theirs} (B) into ${ours} (A)`,\n+    get abortMerge() {\n+      return t`Abort merge`\n+    },\n+    sideA: (label: string) => t`A · ${label}`,\n+    sideB: (label: string) => t`B · ${label}`,\n+    get oursHint() {\n+      return t`ours — current branch`\n+    },\n+    get theirsHint() {\n+      return t`theirs — incoming`\n+    },\n+    get deletedOnThisSide() {\n+      return t`deleted on this side`\n+    },\n+    conflictN: (n: number) => t`Conflict ${n}`,\n+    get takeA() {\n+      return t`Take A`\n+    },\n+    get takeB() {\n+      return t`Take B`\n+    },\n+    get takeAllA() {\n+      return t`Take A in every conflict`\n+    },\n+    get takeAllB() {\n+      return t`Take B in every conflict`\n+    },\n+    get addLine() {\n+      return t`Add line to the output`\n+    },\n+    get removeLine() {\n+      return t`Remove line from the output`\n+    },\n+    get resetToSelection() {\n+      return t`Reset to selection`\n+    },\n+    get mergedOutput() {\n+      return t`Merged output — editable`\n+    },\n+    remaining: (n: number) => plural(n, { one: \"# conflict remaining\", other: \"# conflicts remaining\" }),\n+    get noMarkersLeft() {\n+      return t`No conflict markers left.`\n+    },\n+    get markResolved() {\n+      return t`Mark as resolved`\n+    },\n+    get restoreFile() {\n+      return t`Undo edits`\n+    },\n+    get unavailable() {\n+      return t`Conflict unavailable.`\n+    },\n+    get loading() {\n+      return t`conflict…`\n+    },\n+    get close() {\n+      return t`Close (Esc)`\n+    },\n+  },\n+\n   graph: {\n     get extraRefs() {\n       return t`Additional references`\n","19d900afad84c555ff9bd742afc4157cd2d1f629 .env.example":"diff --git a/.env.example b/.env.example\nnew file mode 100644\nindex 0000000..c97dbf3\n--- /dev/null\n+++ b/.env.example\n@@ -0,0 +1,9 @@\n+# Sentry crash reporting — optional, disabled unless a DSN is set here at build time.\n+#\n+# amont only reports crashes when a DSN is baked into the build. Builds from source have none\n+# (this example file is never read), so they send nothing — that is the default.\n+#\n+# To enable it in your own release builds: copy this file to `.env` (gitignored) and set your\n+# Sentry DSN below. Reports are opt-out at runtime from the home screen; they carry no\n+# repository contents, diffs, or credentials, and no PII (IP, hostname, user identity).\n+MAIN_VITE_SENTRY_DSN=\n","19d900afad84c555ff9bd742afc4157cd2d1f629 .gitignore":"diff --git a/.gitignore b/.gitignore\nindex 4016c93..9a1256d 100644\n--- a/.gitignore\n+++ b/.gitignore\n@@ -3,5 +3,10 @@ out/\n dist/\n coverage/\n \n+# Local env (Sentry DSN, etc.) — .env.example is committed as the template\n+.env\n+.env.*\n+!.env.example\n+\n # Lingui compiled catalogs (the Vite plugin compiles .po at build time)\n src/renderer/src/locales/*.js\n","19d900afad84c555ff9bd742afc4157cd2d1f629 README.md":"diff --git a/README.md b/README.md\nindex c9fd662..c24561b 100644\n--- a/README.md\n+++ b/README.md\n@@ -77,6 +77,14 @@ network request), or by querying Gravatar / `avatars.githubusercontent.com` dire\n reveals the (hashed) author email and your IP address to those services. An author without an\n avatar there falls back to a colored monogram.\n \n+**Crash reporting.** Official release builds report unhandled errors and native crashes to\n+Sentry, so bugs surface and get fixed. Reports carry no repository contents, diffs, or\n+credentials, and no PII (IP, hostname, user identity) — see `src/main/telemetry.ts`. It's\n+**opt-out at runtime** from a toggle on the home screen. Builds from source send nothing: the\n+DSN is injected from a gitignored `.env` at build time, so a build you make yourself has no\n+telemetry at all. Reports leave from the main process, never the sandboxed renderer, so the\n+renderer's strict CSP is unchanged.\n+\n ## Development\n \n Requires Node (see `.nvmrc` / `engines.node` in `package.json`) and [pnpm](https://pnpm.io).\n@@ -94,6 +102,13 @@ pnpm typecheck\n browser tab against a fake `window.amont` bridge (see `src/renderer/mock.html`), so you get\n instant reload without packaging or spawning git processes.\n \n+### Crash reporting (maintainers)\n+\n+Error reporting is inert unless a Sentry DSN is baked in at build time. To enable it in your\n+own release builds, copy `.env.example` to `.env` (gitignored) and set `MAIN_VITE_SENTRY_DSN`.\n+Every build without it — including every build from source and `pnpm dev` — sends nothing.\n+See the [Privacy](#privacy) section for what's reported and `src/main/telemetry.ts` for how.\n+\n ## Contributing\n \n See [CONTRIBUTING.md](CONTRIBUTING.md) for project conventions and the release process.\n","19d900afad84c555ff9bd742afc4157cd2d1f629 SECURITY.md":"diff --git a/SECURITY.md b/SECURITY.md\nindex 0581ea7..35323b4 100644\n--- a/SECURITY.md\n+++ b/SECURITY.md\n@@ -30,6 +30,25 @@ Posture already in place:\n   `avatars.githubusercontent.com` only, used solely for author avatars (see\n   README's Privacy section).\n \n+### Crash reporting\n+\n+Official release builds send unhandled errors and native crashes to Sentry. This is the only\n+outbound data flow besides author avatars, and it's a deliberate one:\n+\n+- It's **off unless a DSN is baked in at build time** (`MAIN_VITE_SENTRY_DSN`, from a gitignored\n+  `.env`), so builds from source and dev runs send nothing — nothing to disable, nothing leaks.\n+- It's **opt-out at runtime** (home-screen toggle, persisted in `state.json`); when off,\n+  `beforeSend` drops every event, including native minidumps, before it leaves the process.\n+- Reports exclude PII (`sendDefaultPii: false`, plus hostname/user scrubbed in `beforeSend`)\n+  and never carry repository contents, diffs, or credentials — only error type, message, and\n+  stack (`src/main/telemetry.ts`).\n+- Events leave from the **main process**, not the sandboxed renderer: `@sentry/electron`\n+  forwards renderer errors over IPC, so the renderer opens no socket and the strict renderer\n+  CSP is unaffected.\n+\n+Any change here that broadens what's sent (enabling tracing/session replay, relaxing the\n+scrub, defaulting the toggle on where it wasn't) should be treated as security-relevant.\n+\n ### Diff rendering (diff2html)\n \n Commit and working-tree diffs are rendered with [diff2html](https://diff2html.io/),\n","19d900afad84c555ff9bd742afc4157cd2d1f629 csp.mjs":"diff --git a/csp.mjs b/csp.mjs\nindex 7dd2ee9..5687831 100644\n--- a/csp.mjs\n+++ b/csp.mjs\n@@ -2,7 +2,9 @@\n    'unsafe-inline' the renderer won't boot in dev. The relaxation is confined to the dev\n    server, the production CSP stays the same as before this migration. */\n /* img-src data: file shell icons arrive as a data URL from app.getFileIcon.\n-   gravatar / githubusercontent: author avatars, the only outgoing requests (cf. lib/avatar.ts). */\n+   gravatar / githubusercontent: author avatars, the only outgoing requests the renderer makes\n+   (cf. lib/avatar.ts). Crash reports, when enabled, leave from the main process, not from here —\n+   @sentry/electron forwards them over IPC (cf. main/telemetry.ts), so this CSP is unaffected. */\n const IMG = \"img-src 'self' data: https://*.gravatar.com https://avatars.githubusercontent.com\";\n /* object-src/base-uri/form-action 'none' (AUDIT.md §4, hardening): no embedded plugin,\n    no legitimate \u003cbase> tag, no \u003cform> in the app — closing these three doors costs\n","19d900afad84c555ff9bd742afc4157cd2d1f629 package.json":"diff --git a/package.json b/package.json\nindex 46986d3..7729464 100644\n--- a/package.json\n+++ b/package.json\n@@ -48,6 +48,7 @@\n     \"@lingui/core\": \"^5.9.5\",\n     \"@lingui/format-po\": \"^5.9.5\",\n     \"@lingui/vite-plugin\": \"^5\",\n+    \"@sentry/electron\": \"^7.15.0\",\n     \"@tailwindcss/vite\": \"^4.3.2\",\n     \"@tanstack/react-query\": \"5.101.2\",\n     \"@types/node\": \"^24.13.2\",\n","19d900afad84c555ff9bd742afc4157cd2d1f629 src/main/env.d.ts":"diff --git a/src/main/env.d.ts b/src/main/env.d.ts\nnew file mode 100644\nindex 0000000..29ff476\n--- /dev/null\n+++ b/src/main/env.d.ts\n@@ -0,0 +1,14 @@\n+/* electron-vite injects .env variables prefixed with MAIN_VITE_ into import.meta.env at\n+   build time (cf. .env.example). Typed here because the Node-side tsconfig (tsconfig.node.json)\n+   deliberately doesn't pull in vite/client — only the renderer does. Merges with the ImportMeta\n+   that @types/node already declares (url/dirname/…), it only adds `env`. */\n+interface ImportMetaEnv {\n+  /** \"development\" under `electron-vite dev`, \"production\" in a packaged build. */\n+  readonly MODE: string\n+  /** Sentry DSN, baked in at build time from a gitignored `.env`. Absent → no telemetry. */\n+  readonly MAIN_VITE_SENTRY_DSN?: string\n+}\n+\n+interface ImportMeta {\n+  readonly env: ImportMetaEnv\n+}\n","19d900afad84c555ff9bd742afc4157cd2d1f629 src/main/index.ts":"diff --git a/src/main/index.ts b/src/main/index.ts\nindex 43eff77..1d0402d 100644\n--- a/src/main/index.ts\n+++ b/src/main/index.ts\n@@ -6,6 +6,7 @@ import { app } from \"electron\"\n import { registerIpc } from \"./ipc.ts\"\n import { hardenSession } from \"./security.ts\"\n import { loadState } from \"./state.ts\"\n+import { initTelemetry } from \"./telemetry.ts\"\n import { createWindow, focusExisting } from \"./window.ts\"\n \n /* Single instance only: a second concurrent launch would overwrite state.json in a\n@@ -29,6 +30,9 @@ if (!gotLock) {\n     .whenReady()\n     .then(loadState)\n     .then(() => {\n+      /* after loadState (reads the opt-out flag), before createWindow so a failure while\n+         building the window is still reported */\n+      initTelemetry()\n       hardenSession()\n       createWindow()\n     })\n","19d900afad84c555ff9bd742afc4157cd2d1f629 src/main/ipc.ts":"diff --git a/src/main/ipc.ts b/src/main/ipc.ts\nindex 0fe41f0..7d6b8b0 100644\n--- a/src/main/ipc.ts\n+++ b/src/main/ipc.ts\n@@ -16,6 +16,7 @@ import * as queries from \"./git/queries.ts\"\n import * as repos from \"./repos.ts\"\n import { scan } from \"./scan.ts\"\n import { openable, persisted, saveState } from \"./state.ts\"\n+import { setTelemetryEnabled, telemetryState } from \"./telemetry.ts\"\n import { basename } from \"./util.ts\"\n import { getMainWindow } from \"./window.ts\"\n \n@@ -140,6 +141,11 @@ export function registerIpc(): void {\n     return persisted.root\n   })\n \n+  /* Crash-reporting opt-out (cf. telemetry.ts). `set` coerces to a real boolean — the renderer\n+     is the source, and every other handler validates its arguments the same way. */\n+  handle(\"telemetry:state\", () => Promise.resolve(telemetryState()))\n+  handle(\"telemetry:set\", (_ev, enabled) => setTelemetryEnabled(enabled === true))\n+\n   handle(\"root:scan\", async () => {\n     if (!persisted.root) return []\n     const found: string[] = []\n","19d900afad84c555ff9bd742afc4157cd2d1f629 src/main/state.ts":"diff --git a/src/main/state.ts b/src/main/state.ts\nindex 2571839..a2a603c 100644\n--- a/src/main/state.ts\n+++ b/src/main/state.ts\n@@ -15,6 +15,8 @@ export interface PersistedState {\n   recents: string[]\n   tabs: string[]\n   active: string | null\n+  /** Crash-reporting opt-out (cf. telemetry.ts). Undefined = never chosen, treated as on. */\n+  telemetry?: boolean\n }\n \n export const persisted: PersistedState = { root: null, recents: [], tabs: [], active: null }\n@@ -44,6 +46,7 @@ export async function loadState(): Promise\u003cvoid> {\n   persisted.tabs = paths(persisted.tabs)\n   persisted.recents = paths(persisted.recents).filter(isRepo)\n   if (typeof persisted.root !== \"string\") persisted.root = null\n+  if (typeof persisted.telemetry !== \"boolean\") delete persisted.telemetry\n   persisted.tabs.forEach((p) => openable.add(p))\n   persisted.recents.forEach((p) => openable.add(p))\n }\n","19d900afad84c555ff9bd742afc4157cd2d1f629 src/main/telemetry.ts":"diff --git a/src/main/telemetry.ts b/src/main/telemetry.ts\nnew file mode 100644\nindex 0000000..4782fab\n--- /dev/null\n+++ b/src/main/telemetry.ts\n@@ -0,0 +1,62 @@\n+/* Crash reporting — opt-out, and inert unless a DSN is baked in.\n+\n+   amont is privacy-conscious (cf. csp.mjs, security.ts): the CSP comment notes avatars are the\n+   renderer's only outgoing request, and that stays true — Sentry events leave from the MAIN\n+   process here, never the renderer. Renderer errors are forwarded over IPC by @sentry/electron\n+   (cf. lib/telemetry.ts + the preload), so the strict renderer CSP is untouched.\n+\n+   The DSN is injected at build time from a gitignored `.env` (MAIN_VITE_SENTRY_DSN, cf.\n+   .env.example): a build from source has no DSN, so initTelemetry() is a no-op and nothing is\n+   ever sent by contributors' or unofficial builds — only the maintainer's release builds carry it.\n+\n+   Opt-out is a persisted flag (state.json, cf. state.ts), toggled from the home screen. `enabled`\n+   is read on every event by beforeSend/beforeBreadcrumb, so flipping it takes effect immediately,\n+   no restart — and native minidumps go through the same client, so nothing is uploaded either. */\n+\n+import { app } from \"electron\"\n+import * as Sentry from \"@sentry/electron/main\"\n+\n+import { persisted, saveState } from \"./state.ts\"\n+\n+const DSN = import.meta.env.MAIN_VITE_SENTRY_DSN\n+\n+/* Default on when a DSN is present; the persisted flag (undefined on first run) only ever\n+   turns it off. Stays false when there's no DSN — telemetryState() reports it as unavailable. */\n+let enabled = false\n+\n+/** Drop the two identity fields Sentry attaches by default even with sendDefaultPii off.\n+    Generic so beforeSend keeps handing back the exact event type it received. */\n+function scrub\u003cE extends Sentry.Event>(event: E): E {\n+  delete event.server_name // machine hostname\n+  delete event.user\n+  return event\n+}\n+\n+export function initTelemetry(): void {\n+  if (!DSN) return\n+  enabled = persisted.telemetry !== false\n+  Sentry.init({\n+    dsn: DSN,\n+    release: `amont@${app.getVersion()}`,\n+    environment: import.meta.env.MODE,\n+    /* never attach IP, cookies, or request bodies */\n+    sendDefaultPii: false,\n+    /* errors and native crashes only — no performance tracing (no tracesSampleRate) */\n+    beforeBreadcrumb: (breadcrumb) => (enabled ? breadcrumb : null),\n+    beforeSend: (event) => (enabled ? scrub(event) : null),\n+  })\n+}\n+\n+/** Home-screen toggle. Live (no restart): beforeSend re-reads `enabled` on every event.\n+    Persisted so the choice survives the next launch. No-op effect when no DSN is baked in. */\n+export function setTelemetryEnabled(value: boolean): Promise\u003cvoid> {\n+  enabled = value\n+  persisted.telemetry = value\n+  return saveState()\n+}\n+\n+/** `available`: a DSN was baked in — the home screen only shows the toggle then. */\n+export const telemetryState = (): { available: boolean; enabled: boolean } => ({\n+  available: !!DSN,\n+  enabled,\n+})\n","19d900afad84c555ff9bd742afc4157cd2d1f629 src/preload/index.ts":"diff --git a/src/preload/index.ts b/src/preload/index.ts\nindex 51483f4..906102d 1006 t/conflict-parse.test.ts\n@@ -2,6 +2,7 @@ import { describe, expect, it } from \"vitest\"\n \n import {\n   CONFLICT_PLACEHOLDER,\n+  applyPickDiff,\n   conflictCount,\n   parseConflicts,\n   pickPosition,\n@@ -11,6 +12,7 @@ import {\n   toggleLine,\n   unresolvedCount,\n   type ConflictBlock,\n+  type ConflictSegment,\n   type Picks,\n } from \"./conflict-parse\"\n \n@@ -156,3 +158,61 @@ describe(\"picks\", () => {\n     expect(pickPosition(picks, 0, { side: \"ours\", line: 1 })).toBeNull()\n   })\n })\n+\n+/* Two conflicts, so occurrence counting between identical placeholders matters. */\n+const DOUBLE = [\n+  \"top\",\n+  \"\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\",\n+  \"a1\",\n+  \"=======\",\n+  \"b1\",\n+  \">>>>>>> x\",\n+  \"mid\",\n+  \"\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\",\n+  \"a2\",\n+  \"=======\",\n+  \"b2\",\n+  \">>>>>>> x\",\n+  \"bot\",\n+].join(\"\\n\")\n+\n+describe(\"applyPickDiff — picks coexist with hand edits\", () => {\n+  const segs = (): ConflictSegment[] => parseConflicts(DOUBLE)\n+  const blocks = () => segs().filter((s): s is ConflictBlock => s.kind === \"conflict\")\n+\n+  it(\"exact re-derive when the buffer carries no hand edits\", () => {\n+    const s = segs()\n+    const from = renderPicks(s, {})\n+    const next = toggleLine({}, 1, { side: \"theirs\", line: 0 })\n+    expect(applyPickDiff(s, blocks(), from, {}, next)).toBe(renderPicks(s, next))\n+  })\n+\n+  it(\"targets the second placeholder, not the first, when only conflict 2 is picked\", () => {\n+    const s = segs()\n+    const from = renderPicks(s, {}) // top / \u003cmerge conflict> / mid / \u003cmerge conflict> / bot\n+    const next = toggleLine({}, 1, { side: \"ours\", line: 0 })\n+    expect(applyPickDiff(s, blocks(), from, {}, next)).toBe(\n+      `top\\n${CONFLICT_PLACEHOLDER}\\nmid\\na2\\nbot`\n+    )\n+  })\n+\n+  it(\"preserves a hand edit to context when a pick is toggled\", () => {\n+    const s = segs()\n+    let buffer = renderPicks(s, {})\n+    buffer = buffer.replace(\"mid\", \"mid // reviewed\") // hand edit between the two conflicts\n+    const next = toggleLine({}, 0, { side: \"ours\", line: 0 })\n+    const out = applyPickDiff(s, blocks(), buffer, {}, next)\n+    expect(out).toBe(`top\\na1\\nmid // reviewed\\n${CONFLICT_PLACEHOLDER}\\nbot`)\n+  })\n+\n+  it(\"preserves a picked region when a different conflict is toggled afterwards\", () => {\n+    const s = segs()\n+    // conflict 1 already resolved to a1; buffer edited elsewhere too\n+    const picks: Picks = toggleLine({}, 0, { side: \"ours\", line: 0 })\n+    let buffer = renderPicks(s, picks) // top / a1 / mid / \u003cmerge conflict> / bot\n+    buffer = buffer.replace(\"top\", \"top!\") // stray hand edit\n+    const next = toggleLine(picks, 1, { side: \"theirs\", line: 0 })\n+    const out = applyPickDiff(s, blocks(), buffer, picks, next)\n+    expect(out).toBe(\"top!\\na1\\nmid\\nb2\\nbot\")\n+  })\n+})\n","ea55601c9dd2acb906897edfc3e06f5fe0255c79 src/renderer/src/features/conflict/conflict-parse.ts":"diff --git a/src/renderer/src/features/conflict/conflict-parse.ts b/src/renderer/src/features/conflict/conflict-parse.ts\nindex fd36b1c..c85c0cc 100644\n--- a/src/renderer/src/features/conflict/conflict-parse.ts\n+++ b/src/renderer/src/features/conflict/conflict-parse.ts\n@@ -156,6 +156,13 @@ export function sideState(picks: Picks, block: ConflictBlock, side: PickSide): \"\n     the resolve gating greps for (`unresolvedCount`), not UI copy. */\n export const CONFLICT_PLACEHOLDER = \"\u003cmerge conflict>\"\n \n+/** The block one conflict contributes to the output under a set of picks: the placeholder\n+    when nothing is picked, otherwise its picked lines joined in click order. */\n+export function regionOf(block: ConflictBlock, refs: LineRef[]): string {\n+  if (!refs.length) return CONFLICT_PLACEHOLDER\n+  return refs.map((r) => block[r.side][r.line]).join(\"\\n\")\n+}\n+\n /** The merged output: context verbatim, each picked confli app/App.tsx\n+++ b/src/renderer/src/app/App.tsx\n@@ -1,12 +1,14 @@\n-import { useCallback, useEffect, useState } from \"react\"\n+import { useCallback, useEffect, useMemo, useState } from \"react\"\n import { flushSync } from \"react-dom\"\n \n import { host, type BootState, type Repo } from \"@/lib/git\"\n import { afterClose, CREATE, HOME, navKeyEquals, repoKey, transitionKind, type NavKey } from \"@/app/navigation\"\n import { PRIORITY, useShortcut } from \"@/app/shortcuts\"\n import { messages } from \"@/lib/messages\"\n+import { setDark, useTheme } from \"@/lib/theme\"\n import { cn } from \"@/lib/utils\"\n import { ErrorBoundary } from \"@/app/error-boundary\"\n+import { AppMenu, type MenuContext } from \"@/app/menu\"\n import { CreateScreen } from \"@/features/create/create-screen\"\n import { HomeScreen } from \"@/features/home/home-screen\"\n import { RepoView } from \"@/features/repo/repo-view\"\n@@ -121,9 +123,34 @@ export default function App({ boot }: Props) {\n     [active, select, tabs]\n   )\n \n+  /* the folder-picker path shared with the home screen: open the dialog, and if a repo\n+     comes back, surface it as a tab. A cancelled dialog resolves to null and is a no-op. */\n+  const openDialog = useCallback(() => {\n+    void host.openDialog().then((res) => res && openTab(res))\n+  }, [openTab])\n+\n   const homeActive = active.kind === \"home\"\n   const createActive = active.kind === \"create\"\n \n+  /* The declarative menu bar's single seam into App state (see app/menu/types.ts). Subscribed\n+     to the theme so the \"Dark theme\" checkbox reflects an OS flip, not just an explicit choice. */\n+  const dark = useTheme()\n+  const menuCtx = useMemo\u003cMenuContext>(\n+    () => ({\n+      newRepo: () => select(CREATE),\n+      openRepo: openDialog,\n+      closeActiveTab: () => active.kind === \"repo\" && closeTab(active.id),\n+      hasActiveRepo: active.kind === \"repo\",\n+      goHome: () => select(HOME),\n+      isDark: dark,\n+      toggleTheme: () => setDark(!dark),\n+      reload: () => window.location.reload(),\n+      version: __APP_VERSION__,\n+      openExternal: (url) => void window.open(url, \"_blank\", \"noopener,noreferrer\"),\n+    }),\n+    [active, closeTab, dark, openDialog, select]\n+  )\n+\n   return (\n     \u003cdiv className=\"flex h-full flex-col\">\n       \u003cTabStrip\n@@ -131,6 +158,7 @@ export default function App({ boot }: Props) {\n         active={toTabKey(active)}\n         onSelect={(key) => select(fromTabKey(key))}\n         onClose={closeTab}\n+        menu={\u003cAppMenu ctx={menuCtx} />}\n       />\n \n       {/* `data-tab-active` carries the view-transition names on the only visible tab (see app.css) */}\n","632aeb7313424fbd323af43f037ea360399e576b src/renderer/src/app/menu/app-menu.tsx":"diff --git a/src/renderer/src/app/menu/app-menu.tsx b/src/renderer/src/app/menu/app-menu.tsx\nnew file mode 100644\nindex 0000000..a821c70\n--- /dev/null\n+++ b/src/renderer/src/app/menu/app-menu.tsx\n@@ -0,0 +1,77 @@\n+import { HugeiconsIcon } from \"@hugeicons/react\"\n+\n+import {\n+  Menubar,\n+  MenubarCheckboxItem,\n+  MenubarContent,\n+  MenubarItem,\n+  MenubarMenu,\n+  MenubarSeparator,\n+  MenubarShortcut,\n+  MenubarSub,\n+  MenubarSubContent,\n+  MenubarSubTrigger,\n+  MenubarTrigger,\n+} from \"@/components/ui/menubar\"\n+import { MENUS } from \"@/app/menu\"\n+import type { MenuContext, MenuNode } from \"@/app/menu/types\"\n+\n+/** Renders one node — recursive for submenus. `key` comes from the caller (list index +\n+    the node's own id, which every non-separator node carries). */\n+function MenuItemNode({ node }: { node: MenuNode }) {\n+  switch (node.kind) {\n+    case \"separator\":\n+      return \u003cMenubarSeparator />\n+\n+    case \"action\":\n+      return (\n+        \u003cMenubarItem data-menu-item={node.id} disabled={node.disabled} variant={node.variant} onClick={node.run}>\n+          {node.icon && \u003cHugeiconsIcon icon={node.icon} strokeWidth={2} />}\n+          {node.label}\n+          {node.shortcut && \u003cMenubarShortcut>{node.shortcut}\u003c/MenubarShortcut>}\n+        \u003c/MenubarItem>\n+      )\n+\n+    case \"checkbox\":\n+      return (\n+        \u003cMenubarCheckboxItem data-menu-item={node.id} checked={node.checked} onCheckedChange={node.onCheckedChange}>\n+          {node.icon && \u003cHugeiconsIcon icon={node.icon} strokeWidth={2} />}\n+          {node.label}\n+        \u003c/MenubarCheckboxItem>\n+      )\n+\n+    case \"submenu\":\n+      return (\n+        \u003cMenubarSub>\n+          \u003cMenubarSubTrigger data-menu-item={node.id}>\n+            {node.icon && \u003cHugeiconsIcon icon={node.icon} strokeWidth={2} />}\n+            {node.label}\n+          \u003c/MenubarSubTrigger>\n+          \u003cMenubarSubContent>\n+            {node.items.map((child, i) => (\n+              \u003cMenuItemNode key={child.kind === \"separator\" ? `sep-${i}` : child.id} node={child} />\n+            ))}\n+          \u003c/MenubarSubContent>\n+        \u003c/MenubarSub>\n+      )\n+  }\n+}\n+\n+/** The application menu bar. Fully data-driven: it maps `MENUS` (see app/menu/index.ts),\n+    building each menu's items from the live `ctx` on every render. */\n+export function AppMenu({ ctx }: { ctx: MenuContext }) {\n+  return (\n+    \u003cMenubar>\n+      {MENUS.map((menu) => (\n+        \u003cMenubarMenu key={menu.id}>\n+          \u003cMenubarTrigger data-menu={menu.id}>{menu.label}\u003c/MenubarTrigger>\n+          \u003cMenubarContent>\n+            {menu.build(ctx).map((node, i) => (\n+              \u003cMenuItemNode key={node.kind === \"separator\" ? `sep-${i}` : node.id} node={node} />\n+            ))}\n+          \u003c/MenubarContent>\n+        \u003c/MenubarMenu>\n+      ))}\n+    \u003c/Menubar>\n+  )\n+}\n","632aeb7313424fbd323af43f037ea360399e576b src/renderer/src/app/menu/index.ts":"diff --git a/src/renderer/src/app/menu/index.ts b/src/renderer/src/app/menu/index.ts\nnew file mode 100644\nindex 0000000..177e960\n--- /dev/null\n+++ b/src/renderer/src/app/menu/index.ts\n@@ -0,0 +1,13 @@\n+/* The menu registry: the ordered list of top-level menus shown in the bar. To add a menu,\n+   write a descriptor under ./menus and drop it in here — nothing else changes. */\n+\n+import type { MenuDescriptor } from \"@/app/menu/types\"\n+import { fileMenu } from \"@/app/menu/menus/file\"\n+import { viewMenu } from \"@/app/menu/menus/view\"\n+import { helpMenu } from \"@/app/menu/menus/help\"\n+\n+/** Bar order, left to right. */\n+export const MENUS: MenuDescriptor[] = [fileMenu, viewMenu, helpMenu]\n+\n+export type { MenuContext, MenuDescriptor, MenuNode } from \"@/app/menu/types\"\n+export { AppMenu } from \"@/app/menu/app-menu\"\n","632aeb7313424fbd323af43f037ea360399e576b src/renderer/src/app/menu/menus/file.ts":"diff --git a/src/renderer/src/app/menu/menus/file.ts b/src/renderer/src/app/menu/menus/file.ts\nnew file mode 100644\nindex 0000000..e5d2ec8\n--- /dev/null\n+++ b/src/renderer/src/app/menu/menus/file.ts\n@@ -0,0 +1,25 @@\n+import { FolderAddIcon, FolderOpenIcon, Cancel01Icon } from \"@hugeicons/core-free-icons\"\n+\n+import { messages } from \"@/lib/messages\"\n+import type { MenuDescriptor } from \"@/app/menu/types\"\n+\n+/** File ▸ repository lifecycle: create, open, close the active tab. */\n+export const fileMenu: MenuDescriptor = {\n+  id: \"file\",\n+  get label() {\n+    return messages.menu.file\n+  },\n+  build: (ctx) => [\n+    { kind: \"action\", id: \"file.new\", label: messages.menu.newRepo, icon: FolderAddIcon, run: ctx.newRepo },\n+    { kind: \"action\", id: \"file.open\", label: messages.menu.openRepo, icon: FolderOpenIcon, run: ctx.openRepo },\n+    { kind: \"separator\" },\n+    {\n+      kind: \"action\",\n+      id: \"file.close\",\n+      label: messages.menu.closeTab,\n+      icon: Cancel01Icon,\n+      disabled: !ctx.hasActiveRepo,\n+      run: ctx.closeActiveTab,\n+    },\n+  ],\n+}\n","632aeb7313424fbd323af43f037ea360399e576b src/renderer/src/app/menu/menus/help.ts":"diff --git a/src/renderer/src/app/menu/menus/help.ts b/src/renderer/src/app/menu/menus/help.ts\nnew file mode 100644\nindex 0000000..9e17652\n--- /dev/null\n+++ b/src/renderer/src/app/menu/menus/help.ts\n@@ -0,0 +1,46 @@\n+import { Book02Icon, BugIcon, Github01Icon, InformationCircleIcon } from \"@hugeicons/core-free-icons\"\n+\n+import { messages } from \"@/lib/messages\"\n+import type { MenuDescriptor } from \"@/app/menu/types\"\n+\n+const REPO = \"https://github.com/ethylon/amont\"\n+\n+/** Help ▸ documentation, issue reporting, version. */\n+export const helpMenu: MenuDescriptor = {\n+  id: \"help\",\n+  get label() {\n+    return messages.menu.help\n+  },\n+  build: (ctx) => [\n+    {\n+      kind: \"action\",\n+      id: \"help.docs\",\n+      label: messages.menu.documentation,\n+      icon: Book02Icon,\n+      run: () => ctx.openExternal(`${REPO}#readme`),\n+    },\n+    {\n+      kind: \"action\",\n+      id: \"help.repo\",\n+      label: messages.menu.sourceCode,\n+      icon: Github01Icon,\n+      run: () => ctx.openExternal(REPO),\n+    },\n+    {\n+      kind: \"action\",\n+      id: \"help.issue\",\n+      label: messages.menu.reportIssue,\n+      icon: BugIcon,\n+      run: () => ctx.openExternal(`${REPO}/issues/new`),\n+    },\n+    { kind: \"separator\" },\n+    {\n+      kind: \"action\",\n+      id: \"help.about\",\n+      label: messages.menu.about(ctx.version),\n+      icon: InformationCircleIcon,\n+      disabled: true,\n+      run: () => {},\n+    },\n+  ],\n+}\n","632aeb7313424fbd323af43f037ea360399e576b src/renderer/src/app/menu/menus/view.ts":"diff --git a/src/renderer/src/app/menu/menus/view.ts b/src/renderer/src/app/menu/menus/view.ts\nnew file mode 100644\nindex 0000000..1077452\n--- /dev/null\n+++ b/src/renderer/src/app/menu/menus/view.ts\n@@ -0,0 +1,33 @@\n+import { Home01Icon, Moon02Icon, RefreshIcon } from \"@hugeicons/core-free-icons\"\n+\n+import { messages } from \"@/lib/messages\"\n+import type { MenuDescriptor } from \"@/app/menu/types\"\n+\n+/** View ▸ navigation and appearance. */\n+export const viewMenu: MenuDescriptor = {\n+  id: \"view\",\n+  get label() {\n+    return messages.menu.view\n+  },\n+  build: (ctx) => [\n+    { kind: \"action\", id: \"view.home\", label: messages.menu.goHome, icon: Home01Icon, run: ctx.goHome },\n+    { kind: \"separator\" },\n+    {\n+      kind: \"checkbox\",\n+      id: \"view.dark\",\n+      label: messages.menu.darkTheme,\n+      icon: Moon02Icon,\n+      checked: ctx.isDark,\n+      onCheckedChange: ctx.toggleTheme,\n+    },\n+    { kind: \"separator\" },\n+    {\n+      kind: \"action\",\n+      id: \"view.reload\",\n+      label: messages.menu.reload,\n+      icon: RefreshIcon,\n+      shortcut: \"F5\",\n+      run: ctx.reload,\n+    },\n+  ],\n+}\n","632aeb7313424fbd323af43f037ea360399e576b src/renderer/src/app/menu/types.ts":"diff --git a/src/renderer/src/app/menu/types.ts b/src/renderer/src/app/menu/types.ts\nnew file mode 100644\nindex 0000000..c91b25c\n--- /dev/null\n+++ b/src/renderer/src/app/menu/types.ts\n@@ -0,0 +1,79 @@\n+/* Declarative application-menu model. A menu is data — a `MenuDescriptor` built fresh from a\n+   `MenuContext` on every render — not JSX. The renderer (app-menu.tsx) walks these nodes; the\n+   registry (index.ts) lists them in bar order. Adding a menu is: write a descriptor under\n+   ./menus, register it. No component to touch, no App wiring beyond the context. */\n+\n+import type { IconSvgElement } from \"@hugeicons/react\"\n+\n+/** An item that performs an action when chosen. */\n+export type MenuAction = {\n+  kind: \"action\"\n+  /** Stable key — React lists, and `data-menu-item` for tests. */\n+  id: string\n+  label: string\n+  /** Display-only shortcut hint (e.g. \"F5\"). The actual binding lives in app/shortcuts.ts. */\n+  shortcut?: string\n+  icon?: IconSvgElement\n+  disabled?: boolean\n+  variant?: \"default\" | \"destructive\"\n+  run: () => void\n+}\n+\n+/** A toggle bound to a boolean. */\n+export type MenuCheckbox = {\n+  kind: \"checkbox\"\n+  id: string\n+  label: string\n+  icon?: IconSvgElement\n+  checked: boolean\n+  onCheckedChange: (checked: boolean) => void\n+}\n+\n+/** A divider between groups of items. */\n+export type MenuSeparator = { kind: \"separator\" }\n+\n+/** A nested submenu. */\n+export type MenuSubmenu = {\n+  kind: \"submenu\"\n+  id: string\n+  label: string\n+  icon?: IconSvgElement\n+  items: MenuNode[]\n+}\n+\n+export type MenuNode = MenuAction | MenuCheckbox | MenuSeparator | MenuSubmenu\n+\n+/** A top-level menu in the bar (File, View, Help…). */\n+export type MenuDescriptor = {\n+  /** Stable key. */\n+  id: string\n+  label: string\n+  /** Rebuilt on each render, so labels/disabled/checked always reflect live app state. */\n+  build: (ctx: MenuContext) => MenuNode[]\n+}\n+\n+/** The single seam between the declarative descriptors and App's stateful callbacks:\n+    a menu item calls these, it never reaches into App directly. Extend this — and the\n+    value assembled in App — when a new menu needs a new capability. */\n+export type MenuContext = {\n+  /** Open the repository-creation page (the \"+\" tab). */\n+  newRepo(): void\n+  /** Open a repository through the OS folder picker. */\n+  openRepo(): void\n+  /** Close the active repository tab; a no-op when home/create is in front. */\n+  closeActiveTab(): void\n+  /** True when a repository tab is in the foreground (drives \"Close tab\" enablement). */\n+  hasActiveRepo: boolean\n+  /** Bring the home screen to the front. */\n+  goHome(): void\n+  /** Whether the dark theme is active. */\n+  isDark: boolean\n+  /** Flip the theme. */\n+  toggleTheme(): void\n+  /** Full window reload (same lever as F5). */\n+  reload(): void\n+  /** The running app version, e.g. \"0.13.0\". */\n+  version: string\n+  /** Open a URL in the system browser (never in-app; cf. main/window.ts). */\n+  openExternal(url: string): void\n+}\n","632aeb7313424fbd32 laceholder back, never the markers. */\n export function renderPicks(segments: ConflictSegment[], picks: Picks): string {\n   const out: string[] = []\n   for (const seg of segments) {\n     if (seg.kind === \"ctx\") out.push(...seg.lines)\n     else {\n       const refs = picks[seg.index] ?? []\n-      if (!refs.length) out.push(...seg.raw)\n+      if (!refs.length) out.push(CONFLICT_PLACEHOLDER)\n       else out.push(...refs.map((r) => seg[r.side][r.line]))\n     }\n   }\n   return out.join(\"\\n\")\n }\n+\n+/** What still blocks \"Mark as resolved\": placeholders (derived output, or left by hand)\n+    plus real marker blocks (a hand-edit can reintroduce them). */\n+export function unresolvedCount(text: string): number {\n+  const segments = parseConflicts(text)\n+  let n = conflictCount(segments)\n+  for (const seg of segments)\n+    if (seg.kind === \"ctx\") n += seg.lines.filter((l) => l.trim() === CONFLICT_PLACEHOLDER).length\n+  return n\n+}\n","4d1960433a23609fae1d7535a7c1c89a9283ebc8 src/renderer/src/features/conflict/conflict-view.tsx":"diff --git a/src/renderer/src/features/conflict/conflict-view.tsx b/src/renderer/src/features/conflict/conflict-view.tsx\nindex 0aa8205..556887e 100644\n--- a/src/renderer/src/features/conflict/conflict-view.tsx\n+++ b/src/renderer/src/features/conflict/conflict-view.tsx\n@@ -1,27 +1,30 @@\n /* Conflict resolution view — overlays the graph like DiffView (same slot, cf. graph-column).\n    Two aligned panes make the sides unmistakable: A (ours, the checked-out branch, blue) on\n    the left, B (theirs, the branch being merged in, green) on the right — labels come from\n-   MERGE_HEAD (merge-state query), falling back to the file's own conflict markers.\n+   MERGE_HEAD (merge-state query), falling back to the file's own conflict markers. Both\n+   panes are syntax-highlighted with the same lazy shiki core the diff view uses: each side\n+   is tokenized as one document (context + that side's lines), so the grammar sees real c ered code line: shiki spans when tokens are there, raw text otherwise. */\n+function CodeLine({ text, tokens }: { text: string; tokens?: TokenLine }) {\n+  if (!tokens || !tokens.some((t) => t.content)) return \u003c>{text || \" \"}\u003c/>\n+  return tokens.map((t, i) => (\n+    \u003cspan key={i} style={{ color: t.color }}>\n+      {t.content}\n+    \u003c/span>\n+  ))\n+}\n+\n+/** A run of context lines (same text both sides), highlighted with its pane's tokens. */\n+function PaneCell({\n+  lines,\n+  tokens,\n+  start,\n+  className,\n+}: {\n+  lines: string[]\n+  tokens: TokenLine[] | null\n+  start: number\n+  className?: string\n+}) {\n+  return (\n+    \u003cdiv className={cn(\"min-w-0 overflow-x-auto px-2 py-px\", MONO, className)}>\n+      {lines.map((l, i) => (\n+        \u003cdiv key={i} className=\"min-w-max\">\n+          \u003cCodeLine text={l} tokens={tokens?.[start + i]} />\n+        \u003c/div>\n+      ))}\n+    \u003c/div>\n+  )\n }\n \n /** Display labels of the two sides: branch names when a merge is in progress, otherwise\n@@ -72,6 +147,8 @@ function ChunkSide({\n   block,\n   side,\n   picks,\n+  tokens,\n+  start,\n   disabled,\n   onPicks,\n   className,\n@@ -79,6 +156,8 @@ function ChunkSide({\n   block: ConflictBlock\n   side: PickSide\n   picks: Picks\n+  tokens: TokenLine[] | null\n+  start: number\n   disabled: boolean\n   onPicks(next: Picks): void\n   className?: string\n@@ -126,7 +205,9 @@ function ChunkSide({\n               \u003cspan className=\"w-4 shrink-0 text-right text-[0.625rem] leading-normal text-muted-foreground tabular-nums\">\n                 {pos}\n               \u003c/span>\n-              \u003cpre className={cn(\"flex-1 px-1.5\", MONO, !picked && \"text-muted-foreground/70\")}>{l || \" \"}\u003c/pre>\n+              \u003cpre className={cn(\"flex-1 px-1.5\", MONO, !picked && \"opacity-55\")}>\n+                \u003cCodeLine text={l} tokens={tokens?.[start + line]} />\n+              \u003c/pre>\n             \u00  line: 1 })).toBeNull()\n   })\n })\n","f0fddcf7ef9d976da52eb4138652a47073ee6a2d src/renderer/src/features/conflict/conflict-parse.ts":"diff --git a/src/renderer/src/features/conflict/conflict-parse.ts b/src/renderer/src/features/conflict/conflict-parse.ts\nindex fd89572..fc667b3 100644\n--- a/src/renderer/src/features/conflict/conflict-parse.ts\n+++ b/src/renderer/src/features/conflict/conflict-parse.ts\n@@ -97,19 +97,71 @@ export function parseConflicts(text: string): ConflictSegment[] {\n export const conflictCount = (segments: ConflictSegment[]): number =>\n   segments.reduce((n, s) => (s.kind === \"conflict\" ? n + 1 : n), 0)\n \n-export type Side = \"ours\" | \"theirs\" | \"both\"\n+/* --- Click-ordered picks ---\n+   The selection model of the conflict view: per conflict, an ORDERED list of line\n+   references — the order is the click order, and it IS the order of the output region.\n+   No hardcoded A-before-B: checking B's chunk then A's yields B's lines then A's. A\n+   conflict with no picks keeps its raw markers in the output, which both leaves the\n+   resolve button blocked (markers still parse as a conflict) and makes every selection\n+   fully reversible — uncheck everything and the markers come back. */\n \n-/** The merged text with conflict `index` replaced by the chosen side (\"both\" keeps A then B,\n-    the order the markers already imply). Other blocks stay verbatim (`raw`), context too:\n-    parse → replace → join is byte-faithful everywhere but the resolved block. */\n-export function takeSide(text: string, index: number, side: Side): string {\n+export type PickSide = \"ours\" | \"theirs\"\n+export type LineRef = { side: PickSide; line: number }\n+/** keyed by conflict index; insertion order of each array = click order = output order */\n+export type Picks = Record\u003cnumber, LineRef[]>\n+\n+const sameRef = (a: LineRef, b: LineRef) => a.side === b.side && a.line === b.line\n+\n+export const isPicked = (picks: Picks, index: number, ref: LineRef): boolean =>\n+  (picks[index] ?? []).some((r) => sameRef(r, ref))\n+\n+/** 1-based position of the line in the conflict's output region, null if not picked. */\n+export function pickPosition(picks: Picks, index: number, ref: LineRef): number | null {\n+  const at = (picks[index] ?? []).findIndex((r) => sameRef(r, ref))\n+  return at \u003c 0 ? null : at + 1\n+}\n+\n+/** The per-line +/- button: appends at the end of the click order, or removes. */\n+export function toggleLine(picks: Picks, index: number, ref: LineRef): Picks {\n+  const cur = picks[index] ?? []\n+  const next = cur.some((r) => sameRef(r, ref)) ? cur.filter((r) => !sameRef(r, ref)) : [...cur, ref]\n+  return { ...picks, [index]: next }\n+}\n+\n+/** The chunk checkbox: on appends the side's not-yet-picked lines (in file order, as one\n+    run at the end of the click order — re-checking after another side lands after it);\n+    off removes every line of the side, wherever the clicks had put them. */\n+export function setSide(picks: Picks, block: ConflictBlock, side: PickSide, on: boolean): Picks {\n+  const cur = picks[block.index] ?? []\n+  if (!on) return { ...picks, [block.index]: cur.filter((r) => r.side !== side) }\n+  const have = new Set(cur.filter((r) => r.side === side).map((r) => r.line))\n+  const added: LineRef[] = []\n+  for (let line = 0; line \u003c block[side].length; line++) if (!have.has(line)) added.push({ side, line })\n+  return { ...picks, [block.index]: [...cur, ...added] }\n+}\n+\n+/** Checkbox state of one side of one block. An empty side (deleted here) is \"none\":\n+    there is nothing to pick, the view disables its checkbox. */\n+export function sideState(picks: Picks, block: ConflictBlock, side: PickSide): \"none\" | \"some\" | \"all\" {\n+  const total = block[side].length\n+  if (!total) return \"none\"\n+  const n = new Set(\n+    (picks[block.index] ?? []).filter((r) => r.side === side).map((r) => r.line)\n+  ).size\n+  return n === 0 ? \"none\" : n === total ? \"all\" : \"some\"\n+}\n+\n+/** The merged output: context verbatim, each picked conflict replaced by its picked lines\n+    in click order, each untouched conflict kept verbatim (markers included). */\n+export function renderPicks(segments: ConflictSegment[], picks: Picks): string {\n   const out: string[] = []\n-  for (const seg of parseConflicts(text)) {\n+  for (const seg of segments) {\n     if (seg.kind === \"ctx\") out.push(...seg.lines)\n-    else if (seg.index !== index) out.push(...seg.raw)\n-    else if (side === \"ours\") out.push(...seg.ours)\n-    else if (side === \"theirs\") out.push(...seg.theirs)\n-    else out.push(...seg.ours, ...seg.theirs)\n+    else {\n+      const refs = picks[seg.index] ?? []\n+      if (!refs.length) out.push(...seg.raw)\n+      else out.push(...refs.map((r) => seg[r.side][r.line]))\n+    }\n   }\n   return out.join(\"\\n\")\n }\n","f0fddcf7ef9d976da52eb4138652a47073ee6a2d src/renderer/src/features/conflict/conflict-view.tsx":"diff --git a/src/renderer/src/features/conflict/conflict-view.tsx b/src/renderer/src/features/conflict/conflict-view.tsx\nindex 58bbfa0..0aa8205 100644\n--- a/src/renderer/src/features/conflict/conflict-view.tsx\n+++ b/src/renderer/src/features/conflict/conflict-view.tsx\n@@ -1,33 +1,56 @@\n /* Conflict resolution view — overlays the graph like DiffView (same slot, cf. graph-column).\n    Two aligned panes make the sides unmistakable: A (ours, the checked-out branch, blue) on\n    the left, B (theirs, the branch being merged in, green) on the right — labels come from\n-   MERGE_HEAD (merge-state query), falling back to the file's own conflict markers. Below,\n-   the merged output: an editable buffer seeded from the working file, patched by the\n-   per-conflict \"Take A/B/both\" actions, and hand-editable — it's the single source of truth,\n-   the panes re-derive from it on every change. \"Mark as resolved\" writes that buffer to the\n-   working file and stages it (`git add`), which is git's own \n+  /* same query as the home screen (shared key): the configured root is the default\n+     destination, refreshed on every return to this page */\n+  const { data: repos } = useQuery({ queryKey: homeKeys.repos, queryFn: () => host.repos() })\n+  useEffect(() => {\n+    if (active) void queryClient.invalidateQueries({ queryKey: homeKeys.repos })\n+  }, [active, queryClient])\n+\n+  const [dir, setDir] = useState\u003cstring | null>(null)\n+  const dest = dir ?? repos?.root ?? null\n+\n+  const [localName, setLocalName] = useState(\"\")\n+  const [bareName, setBareName] = useState(\"\")\n+  const [url, setUrl] = useState(\"\")\n+  const [cloneName, setCloneName] = useState(\"\")\n+  /* the clone name follows the URL until the user takes it over */\n+  const [cloneNameEdited, setCloneNameEdited] = useState(false)\n+\n+  const [busy, setBusy] = useState\u003cKind | null>(null)\n+  const [errors, setErrors] = useState\u003cPartial\u003cRecord\u003cKind, string>>>({})\n+  /* bare repos don't open as a tab (no working tree): a confirmation replaces the navigation */\n+  const [barePath, setBarePath] = useState\u003cstring | null>(null)\n+\n+  const chooseDir = useCallback(async () => {\n+    const picked = await host.chooseCreateDir()\n+    if (picked) setDir(picked)\n+  }, [])\n+\n+  const run = useCallback(async (kind: Kind, fn: () => Promise\u003cvoid>) => {\n+    setBusy(kind)\n+    setErrors((e) => ({ ...e, [kind]: undefined }))\n+    try {\n+      await fn()\n+    } catch (e) {\n+      setErrors((prev) => ({ ...prev, [kind]: describeError(e) }))\n+    } finally {\n+      setBusy(null)\n+    }\n+  }, [])\n+\n+  const createLocal = () =>\n+    run(\"local\", async () => {\n+      const repo = await host.initRepo(dest!, localName.trim())\n+      setLocalName(\"\")\n+      onOpened(repo)\n+    })\n+\n+  const createBare = () =>\n+    run(\"bare\", async () => {\n+      setBarePath(null)\n+      setBarePath(await host.initBare(dest!, bareName.trim()))\n+      setBareName(\"\")\n+    })\n+\n+  const clone = () =>\n+    run(\"clone\", async () => {\n+      const repo = await host.cloneRepo(dest!, url.trim(), cloneName.trim())\n+      setUrl(\"\")\n+      setCloneName(\"\")\n+      setCloneNameEdited(false)\n+      onOpened(repo)\n+    })\n+\n+  const setUrlAndName = (value: string) => {\n+    setUrl(value)\n+    if (!cloneNameEdited) setCloneName(nameFromUrl(value))\n+  }\n+\n+  const formCls = \"flex flex-col gap-2 rounded-md border px-2.5 py-2.5\"\n+  const rowCls = \"flex items-center gap-2\"\n+  const labelCls = \"w-24 shrink-0 text-xs text-muted-foreground\"\n+\n+  const failure = (kind: Kind) =>\n+    errors[kind] && (\n+      \u003cBadge color=\"danger\" shape=\"squared\" className=\"self-start\">\n+        {errors[kind]}\n+      \u003c/Badge>\n+    )\n+\n+  return (\n+    \u003cdiv className=\"flex-1 overflow-auto\">\n+      \u003cdiv className=\"mx-auto flex w-full max-w-2xl flex-col gap-7 px-6 py-10\">\n+        \u003cdiv className=\"flex items-center gap-3 px-2.5\">\n+          \u003cMark className=\"size-7\" />\n+          \u003cdiv className=\"min-w-0 flex-1\">\n+            \u003ch2 className=\"text-sm font-semibold tracking-tight\">{messages.create.title}\u003c/h2>\n+            \u003cp className=\"text-xs text-muted-foreground\">{messages.create.intro}\u003c/p>\n+          \u003c/div>\n+        \u003c/div>\n+\n+        \u003cSection\n+          icon={FolderLibraryIcon}\n+          title={messages.create.destination}\n+          hint={dest ? messages.create.destinationHint : messages.create.noDestination}\n+        >\n+          \u003cdiv className={cn(rowCls, \"px-2.5\")}>\n+            \u003cp className=\"min-w-0 flex-1 truncate text-xs text-muted-foreground\">{dest ?? \"—\"}\u003c/p>\n+            \u003cButton variant=\"outline\" size=\"xs\" onClick={() => void chooseDir()}>\n+              {messages.home.choose}\n+            \u003c/Button>\n+          \u003c/div>\n+        \u003c/Section>\n+\n+        \u003cSection icon={FolderAddIcon} title={messages.create.localTitle} hint={messages.create.localHint}>\n+          \u003cform\n+            className={formCls}\n+            onSubmit={(e) => {\n+              e.preventDefault()\n+              void createLocal()\n+            }}\n+          >\n+            \u003clabel className={rowCls}>\n+              \u003cspan className={labelCls}>{messages.create.name}\u003c/span>\n+              \u003cInput value={localName} onChange={(e) => setLocalName(e.target.value)} />\n+            \u003c/label>\n+            \u003cdiv className={rowCls}>\n+              \u003cspan className={labelCls} />\n+              \u003cButton type=\"submit\" size=\"sm\" disabled={!dest || !localName.trim() || busy !== null}>\n+                {messages.create.create}\n+              \u003c/Button>\n+              {busy === \"local\" && \u003cAsyncHint>{messages.create.creating}\u003c/AsyncHint>}\n+            \u003c/div>\n+            {failure(\"local\")}\n+          \u003c/form>\n+        \u003c/Section>\n+\n+        \u003cSection icon={CloudServerIcon} title={messages.create.bareTitle} hint={messages.create.bareHint}>\n+          \u003cform\n+            className={formCls}\n+            onSubmit={(e) => {\n+              e.preventDefault()\n+              void createBare()\n+            }}\n+          >\n+            \u003clabel className={rowCls}>\n+              \u003cspan className={labelCls}>{messages.create.name}\u003c/span>\n+              \u003cInput value={bareName} onChange={(e) => setBareName(e.target.value)} />\n+            \u003c/label>\n+            \u003cdiv className={rowCls}>\n+              \u003cspan className={labelCls} />\n+              \u003cButton type=\"submit\" size=\"sm\" disabled={!dest || !bareName.trim() || busy !== null}>\n+                {messages.create.create}\n+              \u003c/Button>\n+              {busy === \"bare\" && \u003cAsyncHint>{messages.create.creating}\u003c/AsyncHint>}\n+            \u003c/div>\n+            {failure(\"bare\")}\n+            {barePath && (\n+              \u003cBadge color=\"success\" shape=\"squared\" className=\"self-start\">\n+                {messages.create.createdAt(barePath)}\n+              \u003c/Badge>\n+            )}\n+          \u003c/form>\n+        \u003c/Section>\n+\n+        \u003cSection icon={FolderDownloadIcon} title={messages.create.cloneTitle} hint={messages.create.cloneHint}>\n+          \u003cform\n+            className={formCls}\n+            onSubmit={(e) => {\n+              e.preventDefault()\n+              void clone()\n+            }}\n+          >\n+            \u003clabel className={rowCls}>\n+              \u003cspan className={labelCls}>{messages.create.url}\u003c/span>\n+              \u003cInput\n+                value={url}\n+                onChange={(e) => setUrlAndName(e.target.value)}\n+                placeholder={messages.create.urlPlaceholder}\n+              />\n+            \u003c/label>\n+            \u003clabel className={rowCls}>\n+              \u003cspan className={labelCls}>{messages.create.name}\u003c/span>\n+              \u003cInput\n+                value={cloneName}\n+                onChange={(e) => {\n+                  setCloneName(e.target.value)\n+                  setCloneNameEdited(true)\n+                }}\n+              />\n+            \u003c/label>\n+            \u003cdiv className={rowCls}>\n+              \u003cspan className={labelCls} />\n+              \u003cButton type=\"submit\" size=\"sm\" disabled={!dest || !url.trim() || !cloneName.trim() || busy !== null}>\n+                {messages.create.clone}\n+              \u003c/Button>\n+              {busy === \"clone\" && \u003cAsyncHint>{messages.create.cloning}\u003c/AsyncHint>}\n+            \u003c/div>\n+            {failure(\"clone\")}\n+          \u003c/form>\n+        \u003c/Section>\n+      \u003c/div>\n+    \u003c/div>\n+  )\n+}\n","4f0752735774eef26548c94dae27a095980fb078 src/renderer/src/features/home/home-screen.tsx":"diff --git a/src/renderer/src/features/home/home-screen.tsx b/src/renderer/src/features/home/home-screen.tsx\nindex 742b0b8..0083904 100644\n--- a/src/renderer/src/features/home/home-screen.tsx\n+++ b/src/renderer/src/features/home/home-screen.tsx\n@@ -13,6 +13,7 @@ import { Badge } from \"@/components/ui/badge\"\n import { Button } from \"@/components/ui/button\"\n import { Empty, EmptyContent, EmptyDescription, EmptyHeader, EmptyMedia, EmptyTitle } from \"@/components/ui/empty\"\n import { LABEL_CLS } from \"@/components/ui/typography\"\n+import { homeKeys } from \"@/features/home/keys\"\n \n type Props = {\n   active: boolean\n@@ -58,11 +59,6 @@ function Section({\n   )\n }\n \n-const homeKeys = {\n-  repos: [\"home\", \"repos\"] as const,\n-  scan: (root: string | null) => [\"home\", \"scan\", root] as const,\n-}\n-\n export function HomeScreen({ active, onOpened }: Props) {\n   const [error, setError] = useState\u003cstring | null>(null)\n   const queryClient = useQueryClient()\n","4f0752735774eef26548c94dae27a095980fb078 src/renderer/src/features/home/keys.ts":"diff --git a/src/renderer/src/features/home/keys.ts b/src/renderer/src/features/home/keys.ts\nnew file mode 100644\nindex 0000000..e6ed2e9\n--- /dev/null\n+++ b/src/renderer/src/features/home/keys.ts\n@@ -0,0 +1,8 @@\n+/* Query keys of the home screen, in their own module: the creation page (features/create)\n+   shares `repos` to read the same root — and a component file exporting constants would\n+   break Fast Refresh (react-refresh/only-export-components). */\n+\n+export const homeKeys = {\n+  repos: [\"home\", \"repos\"] as const,\n+  scan: (root: string | null) => [\"home\", \"scan\", root] as const,\n+}\n","4f0752735774eef26548c94dae27a095980fb078 src/renderer/src/lib/errors.ts":"diff --git a/src/renderer/src/lib/errors.ts b/src/renderer/src/lib/errors.ts\nindex d803896..cce8c2c 100644\n--- a/src/renderer/src/lib/errors.ts\n+++ b/src/renderer/src/lib/errors.ts\n@@ -8,6 +8,7 @@ const MESSAGES: Record\u003cErrorPayload[\"code\"], (detail?: string) => string> = {\n   NOT_A_REPO: () => \"Not a git repository (or git not found)\",\n   NO_REPO: () => \"This repository is no longer open\",\n   NOT_ALLOWED: () => \"Path not allowed\",\n+  EXISTS: (d) => (d ? `Already exists: ${d}` : \"The destination already exists\"),\n   BAD_ARG: (d) => (d ? `Invalid argument: ${d}` : \"Invalid argument\"),\n   BUSY: () => \"An operation is already in progress\",\n   MERGE_CONFLICT: (d) => (d ? `Conflict in: ${d}` : \"The merge ended in conflict\"),\n","4f0752735774eef26548c94dae27a095980fb078 src/renderer/src/lib/git.ts":"diff --git a/src/renderer/src/lib/git.ts b/src/renderer/src/lib/git.ts\nindex 1dca897..9701384 100644\n--- a/src/renderer/src/lib/git.ts\n+++ b/src/renderer/src/lib/git.ts\n@@ -59,6 +59,10 @@ export const host = {\n   close: bridge.close,\n   chooseRoot: bridge.chooseRoot,\n   scanRoot: bridge.scanRoot,\n+  chooseCreateDir: bridge.chooseCreateDir,\n+  initRepo: bridge.initRepo,\n+  initBare: bridge.initBare,\n+  cloneRepo: bridge.cloneRepo,\n }\n \n /* The preload now handles unsubscription itself (`ipcRenderer.off`, see src/preload):\n","4f0752735774eef26548c94dae27a095980fb078 src/renderer/src/lib/messages.ts":"diff --git a/src/renderer/src/lib/messages.ts b/src/renderer/src/lib/messages.ts\nindex 515e074..fea2787 100644\n--- a/src/renderer/src/lib/messages.ts\n+++ b/src/renderer/src/lib/messages.ts\n@@ -73,6 +73,64 @@ export const messages = {\n     },\n   },\n \n+  create: {\n+    get title() {\n+      return t`Create a repository`\n+    },\n+    get intro() {\n+      return t`Create a local repository, a bare remote repository, or clone an existing one.`\n+    },\n+    get destination() {\n+      return t`Destination folder`\n+    },\n+    get destinationHint() {\n+      return t`New repositories and clones are created inside this folder.`\n+    },\n+    get noDestination() {\n+      return t`Choose a destination folder first.`\n+    },\n+    get localTitle() {\n+      return t`Local repository`\n+    },\n+    get localHint() {\n+      return t`Initialize an empty repository in a new folder.`\n+    },\n+    get bareTitle() {\n+      return t`Remote repository (bare)`\n+    },\n+    get bareHint() {\n+      return t`A repository without a working tree, ready to be used as a remote.`\n+    },\n+    get cloneTitle() {\n+      return t`Clone a repository`\n+    },\n+    get cloneHint() {\n+      return t`Clone an existing repository from a URL or a local path.`\n+    },\n+    get name() {\n+      return t`Name`\n+    },\n+    get url() {\n+      return t`URL`\n+    },\n+    get urlPlaceholder() {\n+      return t`https://… or git@…`\n+    },\n+    get create() {\n+      return t`Create`\n+    },\n+    get clone() {\n+      return t`Clone`\n+    },\n+    get creating() {\n+      return t`creating…`\n+    },\n+    get cloning() {\n+      return t`cloning…`\n+    },\n+    createdAt: (path: string) => t`Repository created: ${path}`,\n+  },\n+\n   repo: {\n     get clickCommitForDetail() {\n       return t`Click a commit for its detail.`\n","4f0752735774eef26548c94dae27a095980fb078 src/shared/errors.ts":"diff --git a/src/shared/errors.ts b/src/shared/errors.ts\nindex 264b631..6473399 100644\n--- a/src/shared/errors.ts\n+++ b/src/shared/errors.ts\n@@ -22,6 +22,7 @@ export type ErrorCode =\n   | \"NOT_A_REPO\"\n   | \"NO_REPO\"\n   | \"NOT_ALLOWED\"\n+  | \"EXISTS\"\n   | \"BAD_ARG\"\n   | \"BUSY\"\n   | \"MERGE_CONFLICT\"\n","4f0752735774eef26548c94dae27a095980fb078 src/shared/ipc-contract.ts":"diff --git a/src/shared/ipc-contract.ts b/src/shared/ipc-contract.ts\nindex 4e7da15..1d8c7b0 100644\n--- a/src/shared/ipc-contract.ts\n+++ b/src/shared/ipc-contract.ts\n@@ -23,6 +23,7 @@ import type {\n   OpEvent,\n   OpName,\n   OpenResult,\n+  Repo,\n   RepoRef,\n   Stash,\n   StashAct,\n@@ -43,6 +44,18 @@ export type InvokeChannels = {\n   \"root:choose\": () => Promise\u003cstring | null>\n   \"root:scan\": () => Promis
