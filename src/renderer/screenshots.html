rong one.\n - Folders (`feature/`, nested `ui/`) start collapsed; expand via the folder trigger\n   before targeting leaves.\n+- **Merge conflicts**: the mock worktree ships a merge in progress (`feature/cost-optim`\n+  (B) into `develop` (A)) with two conflicted files — `threshold.ts` (UU, two blocks, one\n+  diff3-style) and `params.ts` (AA, no base). Click the \"Uncommitted changes\" graph row,\n+  then a file under CONFLICTS: the resolution view overlays the graph. Per-conflict\n+  `Take A` / `Take B` / `Take A then B` buttons patch the editable merged output\n+  (`getByLabel(\"Merged output — editable\")`); \"Mark as resolved\" enables once no markers\n+  remain and moves the file to STAGED. Escape closes the overlay.\n - `window.__changed()` in the console simulates an external `.git` change.\n \n ## Gotchas\n","02b697c22acb9f943fc355fd3226642885ed72f5 src/main/git/ops.ts":"diff --git a/src/main/git/ops.ts b/src/main/git/ops.ts\nindex 099763d..a0158d6 100644\n--- a/src/main/git/ops.ts\n+++ b/src/main/git/ops.ts\n@@ -8,9 +8,11 @@\n    to silently back off when the repo is busy, whereas an explicit user action must throw\n    (BUSY). */\n \n+import { writeFile } from \"node:fs/promises\"\n+\n import { AppError, decodeError } from \"../../shared/errors.ts\"\n import type { BranchAct, OpEvent, OpName, StashAct } from \"../../shared/types.ts\"\n-import { assertPaths, withLock, type RepoHandle } from \"../repos.ts\"\n+import { assertPaths, inRepo, withLock, type RepoHandle } from \"../repos.ts\"\n import { mute } from \"../watcher.ts\"\n import { OP_TIMEOUT } from \"./exec.ts\"\n import { finishFlow } from \"./flow.ts\"\n@@ -207,6 +209,40 @@ export async function commit(r: RepoHandle, message: string, amend: boolean): Pr\n   })\n }\n \n+/* --- Merge conflicts ---\n+   The merged output the user validated becomes the working file, then `git add` clears the\n+   path's conflict stages: that's git's own definition of \"resolved\". The write and the add\n+   stay under c\u003c HEAD\\nx\\n=======\\ny\\n>>>>>>> feature/x\\n`\n+    const segs = parseConflicts(text)\n+    expect(conflictCount(segs)).toBe(2)\n+    expect(segs.filter((s) => s.kind === \"conflict\").map((s) => s.index)).toEqual([0, 1])\n+  })\n+\n+  it(\"drops the diff3 base section from both sides\", () => {\n+    const text = [\"\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\", \"ours\", \"||||||| merged common ancestors\", \"base\", \"=======\", \"theirs\", \">>>>>>> other\"].join(\n+      \"\\n\"\n+    )\n+    const [seg] = parseConflicts(text)\n+    expect(seg).toMatchObject({ kind: \"conflict\", ours: [\"ours\"], theirs: [\"theirs\"] })\n+  })\n+\n+  it(\"tolerates empty sides and empty labels\", () => {\n+    const text = [\"\u003c\u003c\u003c\u003c\u003c\u003c\u003c\", \"=======\", \"theirs only\", \">>>>>>>\"].join(\"\\n\")\n+    const [seg] = parseConflicts(text)\n+    expect(seg).toMatchObject({ kind: \"conflict\", ours: [], theirs: [\"theirs only\"], oursLabel: \"\", theirsLabel: \"\" })\n+  })\n+\n+  it(\"tolerates CRLF marker lines without touching content lines\", () => {\n+    const text = [\"\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\\r\", \"ours\\r\", \"=======\\r\", \"theirs\\r\", \">>>>>>> x\\r\", \"\"].join(\"\\n\")\n+    const [seg] = parseConflicts(text)\n+    expect(seg).toMatchObject({ kind: \"conflict\", ours: [\"ours\\r\"], theirs: [\"theirs\\r\"], oursLabel: \"HEAD\" })\n+  })\n+\n+  it(\"treats an unterminated block as plain context\", () => {\n+    const text = [\"a\", \"\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\", \"b\", \"c\"].join(\"\\n\")\n+    expect(parseConflicts(text)).toEqual([{ kind: \"ctx\", lines: [\"a\", \"\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\", \"b\", \"c\"] }])\n+  })\n+\n+  it(\"does not read a marker mid-line or shorter than 7 characters\", () => {\n+    const text = [\"x \u003c\u003c\u003c\u003c\u003c\u003c\u003c y\", \"\u003c\u003c\u003c\u003c\u003c\u003c six\", \"======= not a sep either without an open block\"].join(\"\\n\")\n+    expect(conflictCount(parseConflicts(text))).toBe(0)\n+  })\n+})\n+\n+describe(\"takeSide\", () => {\n+  it(\"keeps A, keeps B, or keeps both in marker order\", () => {\n+    expect(takeSide(SIMPLE, 0, \"ours\")).toBe(\"const a = 1\\nconst b = 2\\nconst c = 4\")\n+    expect(takeSide(SIMPLE, 0, \"theirs\")).toBe(\"const a = 1\\nconst b = 3\\nconst c = 4\")\n+    expect(takeSide(SIMPLE, 0, \"both\")).toBe(\"const a = 1\\nconst b = 2\\nconst b = 3\\nconst c = 4\")\n+  })\n+\n+  it(\"only touches the targeted block and preserves the trailing newline\", () => {\n+    const text = `${SIMPLE}\\n\u003c\u003c\u003c\u003c\u003c\u003c\u003c HEAD\\nx\\n=======\\ny\\n>>>>>>> feature/x\\n`\n+    const out = takeSide(text, 1, \"theirs\")\n+    expect(out).toBe(`${SIMPLE}\\ny\\n`)\n+    /* the remaining block is intact and renumbered from 0 */\n+    expect(conflictCount(parseConflicts(out))).toBe(1)\n+  })\n+})\n","02b697c22acb9f943fc355fd3226642885ed72f5 src/renderer/src/features/conflict/conflict-parse.ts":"diff --git a/src/renderer/src/features/conflict/conflict-parse.ts b/src/renderer/src/features/conflict/conflict-parse.ts\nnew file mode 100644\nindex 0000000..fd89572\n--- /dev/null\n+++ b/src/renderer/src/features/conflict/conflict-parse.ts\n@@ -0,0 +1,115 @@\n+/* Pure parser for git conflict markers — the working file is the single source of truth of\n+   the conflict view: the A/B panes and the per-conflict actions all derive from the merged\n+   text, re-parsed after every edit. No git call here; runnable under Node as-is (unit-test\n+   surface, same policy as main/git/parse.ts).\n+\n+   Grammar (git merge, `checkout --conflict=merge` and diff3 style):\n+     \u003c\u003c\u003c\u003c\u003c\u003c\u003c \u003clabel A>\n+     …ours lines…\n+     ||||||| \u003clabel base>     (diff3 only — kept out of both panes, :1: already carries it)\n+     …base lines…\n+     =======\n+     …theirs lines…\n+     >>>>>>> \u003clabel B>\n+   Markers are exactly 7 characters at column 0; a trailing \\r (CRLF file) is tolerated on\n+   the marker line without touching the content lines. A block left unterminated at EOF is\n+   not a conflict — its raw lines flow back as context rather than being dropped. */\n+\n+export type ConflictBlock = {\n+  kind: \"conflict\"\n+  /** position among the file's conflicts — the handle `takeSide` targets */\n+  index: number\n+  /** side A: what the current branch had (index stage 2) */\n+  ours: string[]\n+  /** side B: what the merged-in branch brings (index stage 3) */\n+  theirs: string[]\n+  /** labels carried by the markers (\"HEAD\", a branch name, a hash) — may be empty */\n+  oursLabel: string\n+  theirsLabel: string\n+  /** the block verbatim, markers included — what serialization keeps for untouched blocks */\n+  raw: string[]\n+}\n+\n+export type ConflictSegment = { kind: \"ctx\"; lines: string[] } | ConflictBlock\n+\n+const OURS = /^\u003c{7}(?: (.*?))?\\r?$/\n+const BASE = /^\\|{7}(?: .*)?\\r?$/\n+const SEP = /^={7}\\r?$/\n+const THEIRS = /^>{7}(?: (.*?))?\\r?$/\n+\n+export function parseConflicts(text: string): ConflictSegment[] {\n+  const lines = text.split(\"\\n\")\n+  const segments: ConflictSegment[] = []\n+  let ctx: string[] = []\n+  let index = 0\n+\n+  const flushCtx = () => {\n+    if (ctx.length) segments.push({ kind: \"ctx\", lines: ctx })\n+    ctx = []\n+  }\n+\n+  for (let i = 0; i \u003c lines.length; i++) {\n+    const open = OURS.exec(lines[i])\n+    if (!open) {\n+      ctx.push(lines[i])\n+      continue\n+    }\n+    /* candidate block: only committed once the three markers are found, in order */\n+    const raw: string[] = [lines[i]]\n+    const ours: string[] = []\n+    const theirs: string[] = []\n+    let theirsLabel = \"\"\n+    let state: \"ours\" | \"base\" | \"theirs\" = \"ours\"\n+    let closed = -1\n+    for (let j = i + 1; j \u003c lines.length; j++) {\n+      const l = lines[j]\n+      raw.push(l)\n+      if (state !== \"theirs\" && SEP.test(l)) {\n+        state = \"theirs\"\n+      } else if (state === \"ours\" && BASE.test(l)) {\n+        state = \"base\"\n+      } else if (state === \"theirs\") {\n+        const close = THEIRS.exec(l)\n+        if (close) {\n+          theirsLabel = close[1] ?? \"\"\n+          closed = j\n+          break\n+        }\n+        theirs.push(l)\n+      } else if (state === \"ours\") {\n+        ours.push(l)\n+      }\n+      /* state === \"base\": stage 1 content, dropped — neither pane shows it */\n+    }\n+    if (closed \u003c 0) {\n+      /* unterminated: not a conflict, the raw lines are ordinary content */\n+      ctx.push(lines[i])\n+      continue\n+    }\n+    flushCtx()\n+    segments.push({ kind: \"conflict\", index: index++, ours, theirs, oursLabel: open[1] ?? \"\", theirsLabel, raw })\n+    i = closed\n+  }\n+  flushCtx()\n+  return segments\n+}\n+\n+export const conflictCount = (segments: ConflictSegment[]): number =>\n+  segments.reduce((n, s) => (s.kind === \"conflict\" ? n + 1 : n), 0)\n+\n+export type Side = \"ours\" | \"theirs\" | \"both\"\n+\n+/** The merged text with conflict `index` replaced by the chosen side (\"both\" keeps A then B,\n+    the order the markers already imply). Other blocks stay verbatim (`raw`), context too:\n+    parse → replace → join is byte-faithful everywhere but the resolved block. */\n+export function takeSide(text: string, index: number, side: Side): string {\n+  const out: string[] = []\n+  for (const seg of parseConflicts(text)) {\n+    if (seg.kind === \"ctx\") out.push(...seg.lines)\n+    else if (seg.index !== index) out.push(...seg.raw)\n+    else if (side === \"ours\") out.push(...seg.ours)\n+    else if (side === \"theirs\") out.push(...seg.theirs)\n+    else out.push(...seg.ours, ...seg.theirs)\n+  }\n+  return out.join(\"\\n\")\n+}\n","02b697c22acb9f943fc355fd3226642885ed72f5 src/renderer/src/features/conflict/conflict-queries.ts":"diff --git a/src/renderer/src/features/conflict/conflict-queries.ts b/src/renderer/src/features/conflict/conflict-queries.ts\nnew file mode 100644\nindex 0000000..e048d91\n--- /dev/null\n+++ b/src/renderer/src/features/conflict/conflict-queries.ts\n@@ -0,0 +1,25 @@\n+/* Conflict feature queries: the merge-in-progress labels (A/B) and the per-file conflict\n+   content. `mergeState` tracks the repo closely — it's part of `invalidateRepo` (any mutation\n+   or external change can start/end a merge). The `conflict` key is NOT invalidated globally:\n+   the view seeds an editable buffer from it, and a background refetch clobbering in-progress\n+   edits would be worse than a stale base — resolveConflict invalidates it explicitly. */\n+\n+import { keepPreviousData, useQuery } from \"@tanstack/react-query\"\n+\n+import type { RepoApi } from \"@/lib/git\"\n+import { queryKeys } from \"@/lib/queries\"\n+\n+export function useMergeStateQuery(api: RepoApi, id: number) {\n+  return useQuery({\n+    queryKey: queryKeys.mergeState(id),\n+    queryFn: () => api.mergeState(),\n+    placeholderData: keepPreviousData,\n+  })\n+}\n+\n+export function useConflictQuery(api: RepoApi, id: number, path: string) {\n+  return useQuery({\n+    queryKey: queryKeys.conflict(id, path),\n+    queryFn: () => api.conflict(path),\n+  })\n+}\n","02b697c22acb9f943fc355fd3226642885ed72f5 src/renderer/src/features/conflict/conflict-view.tsx":"diff --git a/src/renderer/src/features/conflict/conflict-view.tsx b/src/renderer/src/features/conflict/conflict-view.tsx\nnew file mode 100644\nindex 0000000..58bbfa0\n--- /dev/null\n+++ b/src/renderer/src/features/conflict/conflict-view.tsx\n@@ -0,0 +1,197 @@\n+/* Conflict resolution view — overlays the graph like DiffView (same slot, cf. graph-column).\n+   Two aligned panes make the sides unmistakable: A (ours, the checked-out branch, blue) on\n+   the left, B (theirs, the branch being merged in, green) on the right — labels come from\n+   MERGE_HEAD (merge-state query), falling back to the file's own conflict markers. Below,\n+   the merged output: an editable buffer seeded from the working file, patched by the\n+   per-conflict \"Take A/B/both\" actions, and hand-editable — it's the single source of truth,\n+   the panes re-derive from it on every change. \"Mark as resolved\" writes that buffer to the\n+   working file and stages it (`git add`), which is git's own definition of resolved. */\n+\n+import { useEffect, useMemo, useRef, useState } from \"react\"\n+import { Cancel01Icon } from \"@hugeicons/core-free-icons\"\n+\n+import type { FileChange, MergeState, RepoApi } from \"@/lib/git\"\n+import { messages } from \"@/lib/messages\"\n+import { cn } from \"@/lib/utils\"\n+import { conflictCount, parseConflicts, takeSide, type ConflictSegment, type Side } from \"./conflict-parse\"\n+import { useConflictQuery, useMergeStateQuery } from \"./conflict-queries\"\n+import { AsyncHint } from \"@/components/ui/async-hint\"\n+import { Badge } from \"@/components/ui/badge\"\n+import { Button } from \"@/components/ui/button\"\n+import { GitCmd } from \"@/components/ui/git-cmd\"\n+import { IconButton } from \"@/components/ui/icon-button\"\n+import { Textarea } from \"@/components/ui/textarea\"\n+\n+/* A = info (blue), B = success (green) — never the red/green of diffs: neither side is\n+   \"removed\", they're two competing additions. */\n+const SIDE_A = \"bg-info/12\"\n+const SIDE_B = \"bg-success/12\"\n+\n+const CELL = \"min-w-0 overflow-x-auto px-2 py-px font-mono text-xs leading-normal whitespace-pre [tab-size:4]\"\n+\n+function PaneCell({ lines, className }: { lines: string[]; className?: string }) {\n+  return \u003cpre className={cn(CELL, className)}>{lines.join(\"\\n\")}\u003c/pre>\n+}\n+\n+/** Display labels of the two sides: branch names when a merge is in progress, otherwise\n+    whatever the markers carry (\"HEAD\", a hash), otherwise the generic ours/theirs. */\n+function sideLabels(ms: MergeState | undefined, segments: ConflictSegment[]): { a: string; b: string } {\n+  const block = segments.find((s) => s.kind === \"conflict\")\n+  return {\n+    a: ms?.ours || block?.oursLabel || \"HEAD\",\n+    b: ms?.theirs || block?.theirsLabel || \"MERGE_HEAD\",\n+  }\n+}\n+\n+type Props = {\n+  api: RepoApi\n+  repoId: number\n+  file: FileChange\n+  onClose(): void\n+  onResolve(path: string, content: string): Promise\u003cvoid>\n+}\n+\n+export function ConflictView({ api, repoId, file, onClose, onResolve }: Props) {\n+  const root = useRef\u003cHTMLDivElement>(null)\n+  const { data: cf = null, isError: error } = useConflictQuery(api, repoId, file.path)\n+  const { data: ms } = useMergeStateQuery(api, repoId)\n+\n+  /* `edited` shadows the fetched working file: null = untouched. The buffer survives pane\n+     re-renders but not a close/reopen — deliberately, the file on disk is the durable copy. */\n+  const [edited, setEdited] = useState\u003cstring | null>(null)\n+  const [saving, setSaving] = useState(false)\n+  const text = edited ?? cf?.merged ?? \"\"\n+\n+  const segments = useMemo(() => parseConflicts(text), [text])\n+  const remaining = conflictCount(segments)\n+  const labels = sideLabels(ms, segments)\n+\n+  /* Same focus contract as DiffView: the overlay takes the keyboard on open (Escape lives\n+     in repo-view's shortcut handler) and hands it back on close. */\n+  useEffect(() => {\n+    const prev = document.activeElement as HTMLElement | null\n+    root.current?.focus()\n+    return () => prev?.focus?.()\n+  }, [])\n+\n+  const take = (index: number, side: Side) => setEdited(takeSide(text, index, side))\n+\n+  const sideHeader = (letter: \"A\" | \"B\", label: string, hint: string, deleted: boolean, cls: string) => (\n+    \u003cdiv className={cn(\"sticky top-0 z-1 flex items-baseline gap-2 border-b bg-background px-2 py-1.5\", cls)}>\n+      \u003cBadge color={letter === \"A\" ? \"info\" : \"success\"} shape=\"squared\" className=\"font-semibold\">\n+        {letter === \"A\" ? messages.conflict.sideA(label) : messages.conflict.sideB(label)}\n+      \u003c/Badge>\n+      \u003cspan className=\"truncate text-[0.625rem] text-muted-foreground\">\n+        {hint}\n+        {deleted && ` · ${messages.conflict.deletedOnThisSide}`}\n+      \u003c/span>\n+    \u003c/div>\n+  )\n+\n+  return (\n+    \u003cdiv ref={root} tabIndex={-1} className=\"flex min-h-0 flex-1 flex-col px-4.5 py-4 outline-none\">\n+      \u003cdiv className=\"mb-2 flex shrink-0 items-center justify-between gap-2\">\n+        \u003cspan className=\"flex min-w-0 items-baseline gap-2\">\n+          \u003cspan className=\"text-xs break-all text-muted-foreground\">{file.path}\u003c/span>\n+          \u003cBadge color=\"danger\" shape=\"squared\" className=\"shrink-0 tabular-nums\">\n+            {file.st}\n+          \u003c/Badge>\n+        \u003c/span>\n+        \u003cIconButton label={messages.conflict.close} icon={Cancel01Icon} onClick={onClose} />\n+      \u003c/div>\n+\n+      {error ? (\n+        \u003cp className=\"shrink-0 text-xs text-muted-foreground\">{messages.conflict.unavailable}\u003c/p>\n+      ) : !cf ? (\n+        \u003cAsyncHint className=\"shrink-0 py-1\">{messages.conflict.loading}\u003c/AsyncHint>\n+      ) : (\n+        \u003c>\n+          {/* --- The two sides, aligned segment by segment: each pair of cells shares a grid\n+              row, so a 2-line A block faces a 5-line B block without manual padding --- */}\n+          \u003cdiv className=\"min-h-0 flex-[3] overflow-y-auto rounded-md border\">\n+            \u003cdiv className=\"grid grid-cols-2\">\n+              {sideHeader(\"A\", labels.a, messages.conflict.oursHint, cf.ours === null, \"\")}\n+              {sideHeader(\"B\", labels.b, messages.conflict.theirsHint, cf.theirs === null, \"border-l\")}\n+              {segments.map((seg, i) =>\n+                seg.kind === \"ctx\" ? (\n+                  \u003cdiv key={i} className=\"col-span-2 grid grid-cols-subgrid\">\n+                    \u003cPaneCell lines={seg.lines} />\n+                    \u003cPaneCell lines={seg.lines} className=\"border-l\" />\n+                  \u003c/div>\n+                ) : (\n+                  \u003cdiv key={i} className=\"col-span-2 grid grid-cols-subgrid\">\n+                    \u003cdiv className=\"col-span-2 flex items-center gap-1 border-y bg-muted/60 px-2 py-0.5\">\n+                      \u003cspan className=\"text-[0.625rem] font-medium text-muted-foreground\">\n+                        {messages.conflict.conflictN(seg.index + 1)}\n+                      \u003c/span>\n+                      \u003cspan className=\"ms-auto flex gap-1\">\n+                        \u003cButton variant=\"ghost\" size=\"sm\" className=\"h-5 text-info\" onClick={() => take(seg.index, \"ours\")}>\n+                          {messages.conflict.takeA}\n+                        \u003c/Button>\n+                        \u003cButton\n+                          variant=\"ghost\"\n+                          size=\"sm\"\n+                          className=\"h-5 text-success\"\n+                          onClick={() => take(seg.index, \"theirs\")}\n+                        >\n+                          {messages.conflict.takeB}\n+                        \u003c/Button>\n+                        \u003cButton variant=\"ghost\" size=\"sm\" className=\"h-5\" onClick={() => take(seg.index, \"both\")}>\n+                          {messages.conflict.takeBoth}\n+                        \u003c/Button>\n+                      \u003c/span>\n+                    \u003c/div>\n+                    \u003cPaneCell lines={seg.ours} className={SIDE_A} />\n+                    \u003cPaneCell lines={seg.theirs} className={cn(SIDE_B, \"border-l\")} />\n+                  \u003c/div>\n+                )\n+              )}\n+            \u003c/div>\n+          \u003c/div>\n+\n+          {/* --- Merged output: the editable buffer that \"Mark as resolved\" will write --- */}\n+          \u003cdiv className=\"mt-3 flex min-h-0 flex-[2] shrink-0 flex-col\">\n+            \u003cdiv className=\"mb-1.5 flex shrink-0 items-center justify-between gap-2\">\n+              \u003cspan className=\"text-[0.625rem] font-medium tracking-wide text-muted-foreground uppercase\">\n+                {messages.conflict.mergedOutput}\n+              \u003c/span>\n+              {edited !== null && (\n+                \u003cButton variant=\"ghost\" size=\"sm\" className=\"h-auto py-0.5\" onClick={() => setEdited(null)}>\n+                  {messages.conflict.restoreFile}\n+                \u003c/Button>\n+              )}\n+            \u003c/div>\n+            \u003cTextarea\n+              aria-label={messages.conflict.mergedOutput}\n+              value={text}\n+              onChange={(e) => setEdited(e.target.value)}\n+              spellCheck={false}\n+              className=\"min-h-0 flex-1 resize-none font-mono text-xs leading-normal whitespace-pre [tab-size:4]\"\n+            />\n+            \u003cdiv className=\"mt-2 flex shrink-0 items-center justify-between gap-3\">\n+              \u003cspan className={cn(\"text-xs\", remaining ? \"text-destructive\" : \"text-success\")}>\n+                {remaining ? messages.conflict.remaining(remaining) : messages.conflict.noMarkersLeft}\n+              \u003c/span>\n+              \u003cButton\n+                className=\"h-auto flex-col gap-0 px-3 py-1\"\n+                disabled={remaining > 0 || saving}\n+                aria-busy={saving}\n+                onClick={async () => {\n+                  setSaving(true)\n+                  try {\n+                    await onResolve(file.path, text)\n+                  } finally {\n+                    setSaving(false)\n+                  }\n+                }}\n+              >\n+                {messages.conflict.markResolved}\n+                \u003cGitCmd cmd={`git add -- ${file.path}`} className=\"text-primary-foreground/70\" />\n+              \u003c/Button>\n+            \u003c/div>\n+          \u003c/div>\n+        \u003c/>\n+      )}\n+    \u003c/div>\n+  )\n+}\n","02b697c22acb9f943fc355fd3226642885ed72f5 src/renderer/src/features/graph/react/graph-column.tsx":"diff --git a/src/renderer/src/features/graph/react/graph-column.tsx b/src/renderer/src/features/graph/react/graph-column.tsx\nindex 9c2733f..3f358a4 100644\n--- a/src/renderer/src/features/graph/react/graph-column.tsx\n+++ b/src/renderer/src/features/graph/react/graph-column.tsx\n@@ -6,6 +6,7 @@ import { useRepoStore, useRepoStoreApi } from \"@/features/repo/repo-store\"\n import { messages } from \"@/lib/messages\"\n import { cn } from \"@/lib/utils\"\n import { Badge } from \"@/components/ui/badge\"\n+import { ConflictView } from \"@/features/conflict/conflict-view\"\n import { DiffView } from \"@/features/diff/diff-view\"\n import { ErrorBoundary } from \"@/app/error-boundary\"\n import type { GraphCallbacks } from \"@/features/graph/controller\"\n@@ -34,6 +35,9 @@ export function GraphColumn() {\n   const diffMode = useRepoStore((s) => s.ui.diffMode)\n   const setDiffMode = useRepoStore((s) => s.setDiffMode)\n   const closeDiff = useRepoStore((s) => s.closeDiff)\n+  const conflict = useRepoStore((s) => s.ui.conflict)\n+  const closeConflict = useRepoStore((s) => s.closeConflict)\n+  const resolveConflict = useRepoStore((s) => s.resolveConflict)\n   const showWorktree = useRepoStore((s) => s.showWorktree)\n \n   const { data: rawWt } = useWorktreeQuery(api, repoId)\n@@ -112,6 +116,19 @@ export function GraphColumn() {\n             \u003c/ErrorBoundary>\n           \u003c/div>\n         )}\n+        {conflict && (\n+          \u003cdiv data-amont-keep-focus className=\"absolute inset-0 z-2 flex flex-col bg-background\">\n+            \u003cErrorBoundary key={`${conflict.path}:${diffNonce}`} onReset={() => setDiffNonce((n) => n + 1)}>\n+              \u003cConflictView\n+                api={api}\n+                repoId={repoId}\n+                file={conflict}\n+                onClose={closeConflict}\n+                onResolve={resolveConflict}\n+ tml`: one repo, HEAD on `develop` (ahead 2), `feature/…` folders,\n+remotes, tags, one stash, ~25k synthetic commits (exercises virtualization).\n+\n+Drive it with Playwright (`executablePath: \"/opt/pw-browsers/chromium\"` on remote\n+runners; install `playwright-core` in a scratch dir, not the repo). Test light and dark\n+via `colorScheme` on the browser context.\n+\n+## Flows worth driving\n+\n+- **Refs sidebar**: rows are `.amont-refrow` inside `nav[data-amont-keep-focus]`.\n+  Click focuses a branch (lit = `data-lit`), Ctrl+click is additive, double-click\n+  checks out. `data-run` (start/mid/end/solo) marks contiguous lit runs — set by\n+  `refs-focus-paint.ts` after any click inside the nav.\n+- **Filter**: `getByPlaceholder(\"Filter branches\")` — beware, the toolbar has a second\n+  `input[type=search]` (\"Filter commits\"); a bare `input[type=\"search\"]` selector is\n+  ambiguous or hits the wrong one.\n+- Folders (`feature/`, nested `ui/`) start collapsed; expand via the folder trigger\n+  before targeting leaves.\n+- `window.__changed()` in the console simulates an external `.git` change.\n+\n+## Gotchas\n+\n+- Two rapid ref clicks race (each `focusRef` awaits graph work) — pause ~500ms between\n+  clicks when scripting.\n+- Ctrl+click after a plain click replaces the focus instead of adding to it — observed\n+  pre-existing on `ca1516d` (mock harness); not a regression signal by itself.\n+- `:focus-visible` styles don't show under programmatic `.focus()` — Tab into the list\n+  from the filter field instead.\n","3fa4ff8ef7da49b8f630177e3ff31d5695732cd9 src/renderer/src/app.css":"diff --git a/src/renderer/src/app.css b/src/renderer/src/app.css\nindex a6076e3..5c35098 100644\n--- a/src/renderer/src/app.css\n+++ b/src/renderer/src/app.css\n@@ -392,25 +392,19 @@\n   border-left-color: var(--destructive);\n }\n \n-/* Outline of a focused ref (and the current branch). Outside @layer for the same reason as the\n-   rail above: the row's `border-transparent` u       /* amont's real history, then a synthetic tail spliced onto its root so the harness
         still exercises virtualization (eviction, refetch, long jumps) at real scale.
         The tail is never visible in a screenshot — every shot sits near HEAD. */
      const C = D.REAL
      const TAIL = 25000
      const th = (i) => String(i + 1).padStart(40, "0")
      const root = C[C.length - 1]
      root.p = [th(0)]
      for (let i = 0; i < TAIL; i++) {
        C.push({
          h: th(i),
          p: i === TAIL - 1 ? [] : [th(i + 1)],
          d: "2026-06-15",
          a: i % 4 ? "Mathieu Guey" : "Claude",
          e: i % 4 ? D.ME : "noreply@anthropic.com",
          r: "",
          s: `chore: history checkpoint ${TAIL - i}`,
        })
      }

      const REPO = { id: 1, path: "/amont", name: "amont" }
      const RECENTS = [{ path: "/amont", name: "amont" }]
      let nextRepoId = 2
      const onOpListeners = new Set()
      const onChangedListeners = new Set()
      const onTraceListeners = new Set()
      window.__changed = (payload = { id: REPO.id }) => onChangedListeners.forEach((cb) => cb(payload))

      let wt = structuredClone(D.WT)
      const drop = (arr, paths) => arr.filter((f) => !paths.includes(f.path))
      let merging = true

      const genericDiff = (path) =>
        `diff --git a/${path} b/${path}\n--- a/${path}\n+++ b/${path}\n@@ -1,3 +1,3 @@\n-const value = 1\n+const value = 2\n `

      window.amont = {
        state: async () => ({ root: "/", recents: RECENTS, tabs: [REPO], active: REPO.id }),
        repos: async () => ({ root: "/", recents: RECENTS }),
        setTabs: async () => {},
        openDialog: async () => REPO,
        openPath: async () => REPO,
        close: async () => {},
        chooseRoot: async () => "/",
        scanRoot: async () => RECENTS,
        telemetryState: async () => ({ available: false, enabled: true }),
        setTelemetry: async () => {},
        chooseCreateDir: async () => "/projects",
        initRepo: async (_dir, name) => ({ id: nextRepoId++, path: `/projects/${name}`, name }),
        initBare: async (_dir, name) => `/projects/${name.endsWith(".git") ? name : name + ".git"}`,
        cloneRepo: async (_dir, _url, name) => ({ id: nextRepoId++, path: `/projects/${name}`, name }),
        log: async (_id, skip, count) => C.slice(skip, skip + count),
        total: async () => C.length,
        refs: async () => D.REFS,
        stashes: async () => [],
        stash: async () => {},
        files: async (_id, hash) => D.FILES[hash] ?? [{ st: "M", path: "src/renderer/src/app.tsx", old: null }],
        diff: async (_id, hash, _parent, path) => D.DIFFS[hash + " " + path] ?? genericDiff(path),
        status: async () => ({ branch: "master", head: C[0].h, ahead: 0, behind: 0 }),
        body: async (_id, hash) => D.BODIES[hash] ?? "",
        op: async () => {},
        onOp: (cb) => { onOpListeners.add(cb); return () => onOpListeners.delete(cb) },
        onChanged: (cb) => { onChangedListeners.add(cb); return () => onChangedListeners.delete(cb) },
        onTrace: (cb) => { onTraceListeners.add(cb); return () => onTraceListeners.delete(cb) },
        search: async () => [],
        flow: async () => null,
        branch: async () => {},
        checkout: async () => {},
        worktree: async () => structuredClone(wt),
        wtdiff: async (_id, p) => D.WTDIFF[p] ?? genericDiff(p),
        stage: async (_id, paths) => {
          const moved = [...wt.unstaged, ...wt.untracked].filter((f) => paths.includes(f.path))
          wt.unstaged = drop(wt.unstaged, paths)
          wt.untracked = drop(wt.untracked, paths)
          wt.staged.push(...moved.map((f) => ({ st: f.st === "?" ? "A" : f.st, path: f.path, old: null })))
        },
        unstage: async (_id, paths) => {
          const moved = wt.staged.filter((f) => paths.includes(f.path))
          wt.staged = drop(wt.staged, paths)
          wt.unstaged.push(...moved.map((f) => ({ st: "M", path: f.path })))
        },
        commit: async () => { wt.staged = []; merging = false },
        mergeState: async () => ({
          merging,
          ours: merging ? "master" : null,
          theirs: merging ? "feat/phase-6a-a11y" : null,
        }),
        conflict: async (_id, path) =>
          structuredClone(D.CONFLICTS[path] ?? { base: null, ours: null, theirs: null, merged: "" }),
        resolve: async (_id, path, content) => {
          D.CONFLICTS[path] = { ...D.CONFLICTS[path], merged: content }
          wt.conflicts = drop(wt.conflicts, [path])
          wt.staged.push({ st: "M", path, old: null })

        mergeAbort: async () => { merging = false; wt.conflicts = [] },
