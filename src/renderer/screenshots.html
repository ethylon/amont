ull},{"st":"M","path":"src/renderer/src/features/repo/toolbar.tsx","old":null},{"st":"M","path":"src/renderer/src/features/search/search-queries.ts","old":null},{"st":"M","path":"src/renderer/src/features/worktree/worktree-panel.tsx","old":null},{"st":"M","path":"src/renderer/src/lib/git.ts","old":null},{"st":"M","path":"src/renderer/src/lib/queries.ts","old":null},{"st":"M","path":"src/renderer/src/lib/telemetry.ts","old":null},{"st":"M","path":"src/renderer/src/main.tsx","old":null},{"st":"A","path":"src/shared/diff.test.ts","old":null},{"st":"A","path":"src/shared/diff.ts","old":null},{"st":"M","path":"src/shared/ipc-contract.ts","old":null},{"st":"M","path":"src/shared/types.ts","old":null}]},"BODIES":{"8541433577fb56b6cf66e0191d595f7ec2090d73":"Two user-tunable additions to the customization store (lib/customization),\nboth surfaced in the settings modal:\n\n- Custom prefixes: add a `PREFIX:` / `[PREFIX]` commit prefix and give it a\n  badge color per theme (defaulting to the neutral gray a `chore` uses). The\n  color rides a per-prefix `--amont-prefix-<key>` CSS var written for the\n  active theme, so custom badges follow theme flips and live edits without a\n  graph rebuild. parseSubject/typeColor consult a registry the store feeds.\n\n- Diff highlighting: the extension -> shiki grammar map that was hardcoded in\n  diff-view/shiki-tokens (`.csproj` -> xml, ...) now lives in settings as an\n  editable list, seeded with the former defaults. A new Diff section edits it;\n  the supported grammars are a single source of truth (shiki-langs.ts) the\n  loader table is type-checked against.\n\nThe Colors section now shows the light and dark pickers together instead of a\ntheme toggle, and resets both at once.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01SWJ2pqzaoEwErGm5A9yAhy","030bd6fdc35d29c8578ed00af4463b13faef1eb3":"fix(settings): repair color pickers and move access to File ▸ Settings","d810c8d577301acb000d4854a8e5495ed09f9e95":"button-group and separator (both untouched by this branch) already failed\nprettier --check . on master; settings-dialog picked up the same reflows.\nMechanical prettier --write, no behaviour change.","ed91a0240d0658ec94b6d0f4c19afee3b7a106ca":"Settings are app-wide, so accessing them through the fetch button-group's cog\ntied them to a repo tab. Drop the cog, add File > Settings, and lift the dialog\nfrom RepoView up to App so it opens even with no repository open.","c549c845d8c029a0ee4ebc861d0c761766a9244e":"getComputedStyle().color leaves oklch colors unresolved on Chromium, so the\ndefault-hex read-back parsed the oklch L/C/H triplet as if it were R/G/B and\nproduced garbage (#0100xx) swatches. Rasterise on a canvas instead, which\nresolves any CSS color down to sRGB bytes.","8cb3ba16d48e593f89128d98f8978f10be6e70ab":"fix(maintenance): sweep stranded pack files and stale transfer temporaries after gc","989e879313719bb7d0582745621559d17f983b10":"Expand settings dialog with customization and color sections","5ff57751ab030c6e1c3ee0f161d8e45eaedc98c3":"Turn the fetch-only settings dialog into a sectioned modal, reachable from the\nsame toolbar cog:\n\n- Customization: theme, language, UI + monospace fonts (enumerated via the Local\n  Font Access API, with an \"only monospace\" filter), a \"prefix as separate\n  column\" toggle, a \"show git commands\" toggle, and the crash-reports opt-out.\n- Colors: per-theme, per-role badge hues (feature/bugfix/hotfix/release/info/\n  refactor/polish) with a native picker and per-row + per-section reset.\n- Fetch: the original auto-fetch / interval / prune controls, unchanged.\n\nRenderer prefs live in a new reactive store (lib/customization.ts, localStorage),\napplied to <html> as CSS custom properties; the fonts route through new\n--amont-font-ui / --amont-font-mono override vars so a runtime override reaches\nthe inlined @theme font utilities. Fetch settings stay in the main-process\nregistry. The prefix-column and font changes drive a graph rebuild; colors are\npure CSS vars and repaint on their own. Adds a local-fonts permission handler\n(default-deny for everything else). The crash-reports toggle is shared with the\nhome screen via a small hook.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01R8hPc8Wm2x2fyFiFyg56Wk","8afb76b035b1b3d10e1077cd09aaf00da7eb4c7e":"Add user settings for auto-fetch behavior and prune option","f61eb4869c651fee6c129b05655b197968ed2291":"Replace the toolbar's fetch button with a fetch|cog ButtonGroup (the\nbutton-group primitive handles the joining); the cog opens a Settings modal\nexposing auto-fetch on/off, the auto-fetch interval, and prune on/off.\n\nRemove the hardcoded values these used to be: the 5-minute autofetch\ninterval (repos.ts) and the always-on `fetch --prune` (git/ops.ts). Both\nnow come from a centralized, reusable settings registry (shared/settings.ts)\nthat owns the defaults, coercion, and the UI metadata (interval presets).\n\nSettings persist in state.json (state.ts) and apply live: changing the\nautofetch on/off or interval re-arms every open repo's timer, prune is read\non the next fetch, and the toolbar's shown git command tracks the toggle.\nExposed over IPC (settings:get/set) and shared with the toolbar through a\nsingle TanStack query so the modal and the command label never diverge.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01FsfjHrgArLNCv1VXSrABH9","4e12b55ddae2fa1f4dcbd6383f0847f0668caab0":"Stream git progress to footer feed for fetch/pull/push","33ac53be17db6d42417b8a37c1b8b4ce68cc96f4":"The footer already shows a live NN% for Verify (fsck) via the git:progress\nchannel. Extend the same treatment to every other command that runs with\n--progress: the network operations fetch, pull and push.\n\n- ops.ts: forward each --progress command's streamed percentage to the\n  renderer through r.events.progress, tagged with the op name. Covers the\n  toolbar fetch/pull/push (runOp), the branch context-menu pull/push, and the\n  remote side of a branch delete. A background auto-fetch stays silent — no\n  live feed occupant, only its completion badge, as before.\n- ProgressEvent.op broadens from MaintKind to MaintKind | OpName (ProgressOp).\n- repo-store: track ops.opProgress, fed by the git:progress events for the\n  network ops and cleared when the op settles (onOp start/done/error and\n  runGitAction boundaries), so the percentage never outlives its command.\n- status-bar: a running network op takes the feed with its verb, a localized\n  label (Fetching/Pulling/Pushing) and the live percentage, mirroring Verify.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01QAPWSZNtNMfJTp7LHr99ed","d92b68a6d9b2e001aeec151c9bb8c6640cd991c0":"Fix graph reload after push by tracking ref-tip changes","31926ada1c60dcfbe450772d8a6e4dee251d00a9":"After a toolbar push the graph kept the \"commits to push\" tint and the\nremote-tracking marker in place: the git:op done handler only reloaded\non pull or on a fetch that counted new commits, and nothing else\nrefreshes behind our own commands (the watcher is muted after them and\ndoesn't cover refs/remotes anyway).\n\nThe done event now carries `changed` — the ref-tip snapshots taken\naround the command differ — and the renderer reloads any manual op on\nthat cue instead of guessing per op name. This also covers a fetch\nwhose only effect is pruning deleted remote branches or moving a remote\nref onto commits already known (`added` stays 0 there), and skips the\npointless reload after an up-to-date pull or push. Auto-fetch keeps its\nnon-intrusive badge-only behaviour.\n\nCo-Authored-By: Claude Fable 5 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01MhQhd6xNfxJCSbxGjMpyys","d3cb784e5296850d6b78433ab248ae13ffa46bbc":"Add polish commit type with rose color and diamond icon","9e65394cbc0f3fc7341d3203f6da53771fe47bf7":"i18n: internationalize remaining hardcoded user-facing strings","0404e542871dbbd3248caf34bfeaf98fd821a246":"Follow-up to the merged wording pass (#100): route the last user-facing\nstrings that bypassed the Lingui catalogue through messages.*, add the\nmatching catalogue entries, and translate them (fr).\n\nNew catalogue entries (messages.ts + en.po + fr.po):\n- app.close / app.loading — dialog primitive's sr-only close label\n  (rendered in every modal) and the base Spinner's aria-label.\n- repo.fetch — the toolbar Fetch button (Pull/Push reuse refs.pull/push,\n  same action; OPS labels become thunks so messages.* isn't read at\n  module scope before setupI18n).\n- detail.stash — the stash term row in the commit detail list.\n- worktree.description — the commit-description textarea (aria-label +\n  placeholder).\n- graph.commits — the commit-graph listbox accessible name.\n- console.aCommand — the fallback command name in the console's\n  screen-reader failure announcement (was a stray French \"commande\"\n  literal in the English source).\n\nKept as-is in French, consistent with the app's git-term treatment:\nFetch, Commits, stash (like Pull/Push, commit/commits, Stash).\n\ntypecheck, lint (0 errors), and the 267 tests all pass; `lingui extract`\nreports 0 missing.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_014wXKJErz9gf5FzLRVHPvXK","e6019891e43e29e0a1f843410344d57b8dfeb278":"`polish(scope): …` and `polish: …` subjects rendered as plain text — the\ntype wasn't in the Conventional Commits table, so no badge. Recognize it\nand give it a distinct identity: a rose --polish token (light + dark) and\nthe diamond glyph, a finishing-touch hue kept clear of the red destructive\nso it doesn't read as an alert.\n\n- commit-parse: polish → CONVENTIONAL, TYPE_COLOR (polish), TYPE_ICON (Diamond02)\n- badge: new `polish` color variant driven by --polish\n- app.css: --polish token wired through @theme, :root and .dark\n- mock: a polish commit in the local-ahead chain so the badge is previewable\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01TAqDqNA7z3uiviAV4DC16P","82875f3afdac1a4bb78af4accef1cb7fa81f290e":"Use forced branch deletion (-D) instead of safe deletion (-d)","b5008b306dff9e4e351f5001ab5aaeecf28dd9f2":"The delete-branch flow already gates the destructive action behind a\nconfirmation modal, so git's refusal to delete an unmerged branch with\n`-d` was only a dead end for the user. Switch the actual command to `-D`\nso a confirmed delete always goes through, and align the command shown in\nthe dialog, the context-menu hint, and the surrounding doc comments.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01XpmdQNgpYLXEPAXxCSF6jN","f4377b5b5a423f95102b844e4ea676bc09349c15":"Claude/bloc hunk wording e4rsri","6026b3ee15aceb40466501a154e396e7e7337455":"fix(refs): align git-command subtext colour to its action","f81310b86691afa2074fa6f35bf177c673ce6b9f":"Two user-facing labels bypassed the Lingui catalogue while identical\nactions elsewhere already go through it:\n\n- refs-tree.tsx: the remote/tag checkout context-menu item hardcoded\n  \"Checkout\", so it showed English even in French (the local-branch\n  menu in refs-menu.tsx already uses messages.refs.checkout, and this\n  RefRow already calls useLocale() precisely for its checkout menu).\n  Now renders \"Basculer\" in French.\n- stash-section.tsx: the sidebar \"Stash\" RefGroup title was a raw\n  literal; every other RefGroup caller passes a messages.* value. Route\n  it through messages.worktree.stash for consistency (output unchanged —\n  \"Stash\" is kept as-is in both locales).\n\nBoth reuse existing catalogue entries, so no msgid changes.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_014wXKJErz9gf5FzLRVHPvXK","24143950c7aae2265915d773680585bfbff3a7ca":"i18n(flow): translate start-branch base selector label (\"from\")","39cde39a4526025d2923edcb12fe1417a5d1bd79":"The feature flow indicators (banner, cockpit card, start banner, sidebar shortcut) all pull their glyph from FLOW_META, which used GitBranchIcon — the odd one out. bugfix/release/hotfix already share the icon of their commit-type badge; feature now does too, using the feat badge's SparklesIcon.","9c5264ac7536e70d17ac7c3c4487ba8838f85ca2":"The French catalogue rendered git's \"hunk\" three different ways on the\ndiff view — \"Abandonner le bloc\" (Discard hunk) sat right next to\n\"Indexer le hunk\" / \"Désindexer le hunk\" (Stage/Unstage hunk) in the\nsame hunk-header row. Unify on \"bloc\", parallel to \"la ligne\"\n(Stage/Unstage/Discard line) and consistent with the app's habit of\ntranslating the staging vocabulary (Indexer, Désindexer, Abandonner,\ndossier, ligne).\n\nWhile auditing the fr catalogue, also:\n- normalize the lone curly apostrophe (\"Fermer l'onglet\") to the\n  straight apostrophe used by the 13 other apostrophes in the file;\n- render \"tag\" as \"tag\" in \"Version tag prefix\" (was the only\n  \"étiquette\"), matching \"tag\" kept everywhere else (Tags, tag attendu).\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_014wXKJErz9gf5FzLRVHPvXK","499390a354cf4297c8c22a23cd3f597a99f8f5ad":"The delete-branch context-menu item showed its git-command subtext muted\n(gray) while the delete-branch modal showed it red, and the merge-abort\nbutton paired a red caption with a gray subtext. Unify the rule: the subtext\nis a muted (70%) tint of the action's colour — gray for neutral actions,\ndestructive/70 for destructive ones — matching the destructive buttons/modals\nand the primary mark-resolved button that already followed it.\n\n- GitCmd: destructive menu items now tint the subtext destructive/70 instead\n  of forcing muted-foreground, covering delete-branch, stash drop, worktree\n  remove/prune and the worktree block menu in one place.\n- delete-branch modal: keep the destructive/70 subtext.\n- merge-abort button: tint its subtext to match its red caption.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01Va6nM1GU8N2h5zdiHBG7mc","455380fb1091f58465a8fd8e6280a260a5c20bc9":"The flow-start banner's base-branch connector (messages.gitflow.from) and the\nselect's aria-label (Start point for the {kind} branch) were added with the\n\"choose start branch\" feature but never extracted into the catalogs. With no\ncatalog entry, Lingui rendered the raw message-ID hash (e.g. \"GtmO8/\") instead\nof text, in both English and French.\n\nAdd both strings to en.po and fr.po. French: \"from\" -> \"à partir de\",\n\"Start point for the {kind} branch\" -> \"Point de départ de la branche {kind}\".\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01Y69eAFzmW7aXkLSN8v8zsC","343b34d28d0bbc73da97ebf17141ad5f371a9a9a":"The delete-branch confirmation modal rendered the git command subtext in\nred (text-destructive/70), while the branch context-menu delete item shows\nthe same subtext muted (gray). GitCmd is designed as muted mono subtext and\neven forces text-muted-foreground in destructive menu items, so gray is the\ncanonical style. Drop the override so the modal matches the context menu.\n\nCo-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>\nClaude-Session: https://claude.ai/code/session_01Va6nM1GU8N2h5zdiHBG7mc","6891761df7d48dae6be88935d01855d49b601d80":"feat(flow): choose start branch when starting a flow","2402a63acba1ca55938eb7a1e98e420d125c9f53":"The inline flow-start banner now exposes a base-branch selector. Default per kind mirrors git-flow's own (hotfix off master, feature/bugfix/release off develop) with trunk-name fallbacks. The base is validated main-side against the same -injection/BRANCH guard as the name.","ba43b04af87b6e692a3dacbd5ac8aeafb21927f4":"feat(graph): add type icons to commit badges","5a166f98c48b7972c5e09db5772b87ecfa6f7f42":"feat(worktree): stream live commit progress in the commit button","06201091a1ac9b0a687de908573010473db6a8ee":"While a commit runs, show a spinner on the caption line and roll the button\nsubtext through each step git streams (pre-commit hook / lint-staged tasks)\ninstead of only echoing them to the console.\n\n- New RollingText: single-line ticker, old line rolls up and out while the next\n  rises from below, clipped so the button never changes height. Reduced-motion\n  falls back to a cross-fade.\n- commitStep() cleans each trace line: strips ANSI, drops [COMPLETED]/[FAILED]\n  markers, unwraps [STARTED] <title>.\n- Keep the button legible while busy (aria-busy:opacity-100); disabled still\n  blocks the click.","c5d9f07f1b29690625fcb2550dddfef36bf9681b":"feat(worktree): per-folder discard in staging panel","6ba4b849ab3ce1931d0f8ca45d5e798207a501ec":"fix(graph): reload graph on manual fetch so fetched commits appear","c7ff459c854eb87a5376f4cc4a946cf24918a0da":"feat(graph): reveal open-worktree action on row hover in the message column","3383c7919af5e6931d06418b8de1784808654311":"Move the linked-worktree open button out of the branch column, where it sat\nas an always-visible chip, into the subject column as a hover-revealed action.\n\n- Only linked worktrees get a button: the main tree, the current tab's worktree\n  and prunable ones are filtered out at ingestion (loader.ts).\n- The button is out of flow until the row is hovered or holds the keyboard\n  cursor, so it never shortens the commit message.\n- Branch-column width no longer measures worktree names (measure.ts).","d6d52059033a784fe0013308589b3d5b7fc9f7d3":"feat(refs): confirm branch deletion with optional remote delete","6b82845ee40a7ec6c80e81ce18143daf3f74e6ef":"fix(worktrees): hide redundant branch label and show main worktree row","3b8d4aaf2de1f3da188bb1190e6115dfb72c71c0":"The sidebar rendered each worktree's folder name and its branch in two\ncolumns; \"git worktree add\" names the folder after the branch, so both\ncolumns showed the same string and looked duplicated. Hide the branch\nlabel when it equals the folder name.\n\nAlso surface the main worktree as a row, but only once at least one\nlinked worktree exists — a lone main is the repo itself, nothing to\nmanage there.","7140f32d9490be3046d174b20980ee5233e009e5":"Right-clicking a branch's Delete now opens a confirmation modal instead of\ndeleting outright. The modal carries a checkbox to also delete the tracked\nremote branch, shown only when an upstream exists and enabled only while that\nremote branch still lives (disabled with a hint once gone).\n\nDeletion moves off the generic repo:branch passthrough onto its own\nrepo:branchDelete channel: local git branch -d, then push --delete of the\nupstream when opted in, run only after the local delete succeeds. Kept -d\n(never -D) so git still guards unmerged commits.","5c19e0a25a922157500e5c5f4e71e893f183acde":"feat(flow): tint the start button to match the banner color","443796f69ff75ae6b0a25ad31f234780b675de15":"style(footer): git console button autowidth"},"DIFFS":{"fa12195818499f1cfcaaff40cfc0640a25f7391c src/renderer/src/features/diff/diff-view.tsx":"diff --git a/src/renderer/src/features/diff/diff-view.tsx b/src/renderer/src/features/diff/diff-view.tsx\nindex a6edbf5..41d2b69 100644\n--- a/src/renderer/src/features/diff/diff-view.tsx\n+++ b/src/renderer/src/features/diff/diff-view.tsx\n@@ -18,6 +18,7 @@ import { useDiffQuery } from \"@/features/diff/diff-queries\"\n import { WtDiffBody } from \"@/features/diff/wt-diff-body\"\n import { imageExt, isTextImage } from \"@/features/diff/image-diff-queries\"\n import { ImageDiffView } from \"@/features/diff/image-diff-view\"\n+import { getLangAliases, useLangAliasSig } from \"@/lib/customization\"\n import { messages } from \"@/lib/messages\"\n import { isDark, useTheme } from \"@/lib/theme\"\n import { AsyncHint } from \"@/components/ui/async-hint\"\n@@ -39,16 +40,6 @@ export type DiffCtx = { hash: string; parent: string | null } | { wt: \"staged\" |\n const DIFF_BODY =\n   \"amont-diffbody min-h-0 flex-auto overflow-auto rounded-md font-mono text-xs leading-normal [tab-size:4]\"\n \n-/* in-house extensions -> shiki grammar; MSBuild project/props files are XML */\n-const LANG_ALIASES: Record<string, string> = {\n-  jet: \"sql\",\n-  csproj: \"xml\",\n-  props: \"xml\",\n-  targets: \"xml\",\n-  slnx: \"xml\",\n-  svg: \"xml\",\n-}\n-\n /* Shiki coloring on top of the diff2html render.\n    <ins>/<del> segments (word-diff) are preserved by redistributing the tokens.\n    The highlighter (shiki/core + the JS regex engine, cf. shiki-highlighter.ts) is loaded\n@@ -60,7 +51,7 @@ const LANG_ALIASES: Record<string, string> = {\n async function shikiPass(body: HTMLElement, signal: AbortSignal) {\n   let lang = body.querySelector(\".d2h-file-wrapper\")?.getAttribute(\"data-lang\")\n   if (!lang || lang === \"txt\") return\n-  lang = LANG_ALIASES[lang] || lang\n+  lang = getLangAliases()[lang] || lang\n   const ctns = [...body.querySelectorAll<HTMLElement>(\".d2h-code-line-ctn\")]\n   if (!ctns.length) return\n \n@@ -205,6 +196,9 @@ export function DiffView({ api, repoId, ctx, file, view, onViewChange, onClose }\n   /* the diff is painted outside the `.dark` class (diff2html + shiki receive the theme hardcoded):\n      an explicit re-render on every toggle, otherwise it stays frozen on the theme it opened with */\n   const dark = useTheme()\n+  /* re-run the highlight effect when the extension→grammar map changes (shikiPass reads the live\n+     map); a stable signature keeps unrelated customization edits from re-highlighting the diff */\n+  const langSig = useLangAliasSig()\n \n   /* The diff overlays the graph: we bring focus to it on open (Escape and close\n      reachable from the > import(\"shiki/langs/typescript.mjs\"),\n   tsx: () => import(\"shiki/langs/tsx.mjs\"),\n   javascript: () => import(\"shiki/langs/javascript.mjs\"),\n@@ -77,7 +80,7 @@ const langLoaders: Record<string, () => Promise<{ default: LanguageRegistration[\n   lua: () => import(\"shiki/langs/lua.mjs\"),\n   r: () => import(\"shiki/langs/r.mjs\"),\n   dart: () => import(\"shiki/langs/dart.mjs\"),\n-}\n+} satisfies Record<ShikiLang, () => Promise<{ default: LanguageRegistration[] }>>\n \n /* Shiki resolves short aliases (js, ts, py, rb, sh, yml, md, cs, kt…) from the `aliases`\n    field INSIDE each grammar's registration — which only exists once that grammar is loaded.\n@@ -136,11 +139,11 @@ const langLoads = new Map<string, Promise<void>>()\n     highlighter, fetching it on first use. Returns null for a language this app doesn't ship —\n     the caller renders plain, exactly like the old eager-load fallback. */\n async function ensureLang(highlighter: HighlighterCore, lang: string): Promise<string | null> {\n-  const id = langLoaders[lang] ? lang : SHIKI_ALIASES[lang]\n+  const id = lang in langLoaders ? (lang as ShikiLang) : SHIKI_ALIASES[lang]\n   if (!id) return null\n   let load = langLoads.get(id)\n   if (!load) {\n-    load = highlighter.loadLanguage(langLoaders[id]())\n+    load = highlighter.loadLanguage(langLoaders[id as ShikiLang]())\n     load.catch(() => langLoads.delete(id))\n     langLoads.set(id, load)\n   }\n","fa12195818499f1cfcaaff40cfc0640a25f7391c src/renderer/src/features/diff/shiki-langs.ts":"diff --git a/src/renderer/src/features/diff/shiki-langs.ts b/src/renderer/src/features/diff/shiki-langs.ts\nnew file mode 100644\nindex 0000000..846d574\n--- /dev/null\n+++ b/src/renderer/src/features/diff/shiki-langs.ts\n@@ -0,0 +1,50 @@\n+/* The shiki grammar ids this app ships, mirrored from shiki-highlighter.ts's `langLoaders` keys.\n+   Kept in its own tiny, dependency-free module so the settings UI can offer them as choices WITHOUT\n+   importing shiki-hi  \"info\" | \"refactor\" | \"polish\"\n+\n+export const COLOR_ROLES: readonly ColorRole[] = [\n+  \"success\",\n+  \"warning\",\n+  \"danger\",\n+  \"release\",\n+  \"info\",\n+  \"refactor\",\n+  \"polish\",\n+]\n+\n+/** role → the app.css custom property carrying its hue. */\n+const ROLE_VAR: Record<ColorRole, string> = {\n+  success: \"--success\",\n+  warning: \"--warning\",\n+  danger: \"--destructive\",\n+  release: \"--release\",\n+  info: \"--info\",\n+  refactor: \"--refactor\",\n+  polish: \"--polish\",\n+}\n+\n+export type ThemeKey = \"light\" | \"dark\"\n+type ColorMap = Partial<Record<ColorRole, string>>\n+\n+export interface Customization {\n+  /** UI (sans) font family; `null` = the bundled default (Geist) */\n+  fontUi: string | null\n+  /** monospace font family; `null` = the bundled default (Geist Mono) */\n+  fontMono: string | null\n+  /** restrict the mono picker to monospace families */\n+  monoOnly: boolean\n+  /** detect a `feat:`/`[TAG]` prefix and lift it into its own graph column */\n+  showPrefixColumn: boolean\n+  /** show the underlying git command as subtext on actions (cf. components/ui/git-cmd) */\n+  showGitCommands: boolean\n+  /** per-theme hex overrides of the badge hues; a missing entry = the app.css default */\n+  colors: Record<ThemeKey, ColorMap>\n+}\n+\n+export const CUSTOMIZATION_DEFAULTS: Customization = {\n+  fontUi: null,\n+  fontMono: null,\n+  monoOnly: false,\n+  showPrefixColumn: true,\n+  showGitCommands: true,\n+  colors: { light: {}, dark: {} },\n+}\n+\n+const KEY = \"amont.customization\"\n+const HEX = /^#[0-9a-fA-F]{6}$/\n+\n+/** Rebuild a valid Customization from any stored value (older shape, corrupt, `null`) — same\n+    defensive posture as coerceSettings in shared/settings.ts. */\n+function coerce(value: unknown): Customization {\n+  const src = value && typeof value === \"object\" ? (value as Record<string, unknown>) : {}\n+  const str = (v: unknown) => (typeof v === \"string\" && v.trim() ? v : null)\n+  const bool = (v: unknown, d: boolean) => (typeof v === \"boolean\" ? v : d)\n+  const colorMap = (v: unknown): ColorMap => {\n+    const out: ColorMap = {}\n+    if (v && typeof v === \"object\") {\n+      for (const role of COLOR_ROLES) {\n+        const hex = (v as Record<string, unknown>)[role]\n+        if (typeof hex === \"string\" && HEX.test(hex)) out[role] = hex.toLowerCase()\n+      }\n+    }\n+    return out\n+  }\n+  const colors = src.colors && typeof src.colors === \"object\" ? (src.colors as Record<string, unknown>) : {}\n+  return {\n+    fontUi: str(src.fontUi),\n+    fontMono: str(src.fontMono),\n+    monoOnly: bool(src.monoOnly, CUSTOMIZATION_DEFAULTS.monoOnly),\n+    showPrefixColumn: bool(src.showPrefixColumn, CUSTOMIZATION_DEFAULTS.showPrefixColumn),\n+    showGitCommands: bool(src.showGitCommands, CUSTOMIZATION_DEFAULTS.showGitCommands),\n+    colors: { light: colorMap(colors.light), dark: colorMap(colors.dark) },\n+  }\n+}\n+\n+function load(): Customization {\n+  try {\n+    const raw = localStorage.getItem(KEY)\n+    return coerce(raw ? JSON.parse(raw) : null)\n+  } catch {\n+    return coerce(null)\n+  }\n+}\n+\n+let current: Customization = load()\n+\n+export const getCustomization = (): Customization => current\n+\n+const listeners = new Set<() => void>()\n+\n+export function onCustomizationChange(cb: () => void): () => void {\n+  listeners.add(cb)\n+  return () => void listeners.delete(cb)\n+}\n+\n+function persist(): void {\n+  try {\n+    localStorage.setItem(KEY, JSON.stringify(current))\n+  } catch {\n+    /* quota/full disk: the live value still holds for this session */\n+  }\n+}\n+\n+/** Quote a family name for a CSS font-family value / canvas font (installed families often have\n+    spaces); strip quotes and backslashes so the value can't break out of the string. */\n+const quote = (family: string) => `\"${family.replace(/[\"\\\\]/g, \"\")}\"`\n+\n+/** Apply the current customization to <html>: the font override vars plus the active theme's color\n+    overrides. Idempotent — each field is set or removed — so it's safe to call on every change. */\n+export function applyCustomization(): void {\n+  const { style } = document.documentElement\n+  if (current.fontUi) style.setProperty(\"--amont-font-ui\", quote(current.fontUi))\n+  else style.removeProperty(\"--amont-font-ui\")\n+  if (current.fontMono) style.setProperty(\"--amont-font-mono\", quote(current.fontMono))\n+  else style.removeProperty(\"--amont-font-mono\")\n+\n+  const overrides = current.colors[isDark() ? \"dark\" : \"light\"]\n+  for (const role of COLOR_ROLES) {\n+    const hex = overrides[role]\n+    if (hex) style.setProperty(ROLE_VAR[role], hex)\n+    else style.removeProperty(ROLE_VAR[role])\n+  }\n+}\n+\n+/* Colors are theme-scoped: a light↔dark flip must swap which override set is live. Re-applying the\n+   fonts at the same time is a harmless no-op. */\n+onThemeChange(applyCustomization)\n+\n+function commit(next: Customization): void {\n+  current = next\n+  persist()\n+  applyCustomization()\n+  listeners.forEach((f) => f())\n+}\n+\n+/** Patch the flat fields (fonts, toggles). Colors go through the dedicated helpers below. */\n+export function setCustomization(patch: Partial<Omit<Customization, \"colors\">>): void {\n+  commit({ ...current, ...patch })\n+}\n+\n+/** Set one role's hex override for a theme. */\n+export function setColor(theme: ThemeKey, role: ColorRole, hex: string): void {\n+  commit({\n+    ...current,\n+    colors: { ...current.colors, [theme]: { ...current.colors[theme], [role]: hex.toLowerCase() } },\n+  })\n+}\n+\n+/** Clear one role (or, with no role, the whole theme) back to the app.css default. */\n+export function resetColor(theme: ThemeKey, role?: ColorRole): void {\n+  if (!role) {\n+    commit({ ...current, colors: { ...current.colors, [theme]: {} } })\n+    return\n+  }\n+  const next = { ...current.colors[theme] }\n+  delete next[role]\n+  commit({ ...current, colors: { ...current.colors, [theme]: next } })\n+}\n+\n+/** Reset the flat fields (fonts + toggles) to defaults; colors keep their own reset. */\n+export function resetCustomization(): void {\n+  commit({ ...CUSTOMIZATION_DEFAULTS, colors: current.colors })\n+}\n+\n+/* --- Getters for non-React consumers (the imperative graph render) --- */\n+export const getShowPrefixColumn = (): boolean => current.showPrefixColumn\n+export const getShowGitCommands = (): boolean => current.showGitCommands\n+\n+/* --- React hooks --- */\n+export function useCustomization(): Customization {\n+  return useSyncExternalStore(onCustomizationChange, getCustomization)\n+}\n+\n+export function useShowGitCommands(): boolean {\n+  return useSyncExternalStore(onCustomizationChange, getShowGitCommands)\n+}\n+\n+/* --- Default hex read-back (for the native color inputs) --- */\n+\n+let defaultsCache: Record<ThemeKey, Record<ColorRole, string>> | null = null\n+\n+/** Hex of each role for both themes as authored in app.css, read once with any live override\n+    stripped and both theme classes probed. `<input type=color>` needs a `#rrggbb`, and the tokens\n+    are oklch — so we let the browser resolve each to rgb, then hex. Synchronous (no paint between\n+    the class toggles), and memoized since the stylesheet defaults don't change. */\n+export function defaultColorHexes(): Record<ThemeKey, Record<ColorRole, string>> {\n+  if (defaultsCache) return defaultsCache\n+  const root = document.documentElement\n+  const saved = COLOR_ROLES.map((r) => [ROLE_VAR[r], root.style.getPropertyValue(ROLE_VAR[r])] as const)\n+  for (const [v] of saved) root.style.removeProperty(v)\n+  const wasDark = root.classList.contains(\"dark\")\n+  const read = (): Record<ColorRole, string> =>\n+    Object.fromEntries(\n+      COLOR_ROLES.map((r) => [r, toHex(getComputedStyle(root).getPropertyValue(ROLE_VAR[r]).trim())])\n+    ) as Record<ColorRole, string>\n+  root.classList.remove(\"dark\")\n+  const light = read()\n+  root.classList.add(\"dark\")\n+  const dark = read()\n+  root.classList.toggle(\"dark\", wasDark)\n+  for (const [v, val] of saved) if (val) root.style.setProperty(v, val)\n+  defaultsCache = { light, dark }\n+  return defaultsCache\n+}\n+\n+/** Effective hex of a role for a theme: the override if set, otherwise the app.css default. */\n+export function colorHex(theme: ThemeKey, role: ColorRole): string {\n+  return current.colors[theme][role] ?? defaultColorHexes()[theme][role]\n+}\n+\n+/** Resolve any CSS color string (oklch, rgb, named…) to `#rrggbb` via a throwaway element. */\n+function toHex(color: string): string {\n+  const probe = document.createElement(\"span\")\n+  probe.style.color = color\n+  probe.style.display = \"none\"\n+  document.body.appendChild(probe)\n+  const rgb = getComputedStyle(probe).color\n+  probe.remove()\n+  const parts = rgb.match(/\\d+(?:\\.\\d+)?/g)?.map(Number) ?? [0, 0, 0]\n+  const h = (n: number) => Math.round(Math.max(0, Math.min(255, n))).toString(16).padStart(2, \"0\")\n+  return `#${h(parts[0])}${h(parts[1])}${h(parts[2])}`\n+}\n+\n+/* --- System fonts (Local Font Access API) --- */\n+\n+/** `window.queryLocalFonts` is Electron/Chromium-only and gated by the `local-fonts` permission\n+    (granted in main/window.ts). Absent in the mock browser harness or when denied → returns [],\n+    and the picker falls back to showing just the current value. When `monoOnly`, keep only families\n+    that measure as monospace. */\n+export async function listFonts(monoOnly: boolean): Promise<string[]> {\n+  const query = (window as unknown as { queryLocalFonts?: () => Promise<Array<{ family: string }>> }).queryLocalFonts\n+  if (!query) return []\n+  let fonts: Array<{ family: string }>\n+  try {\n+    fonts = await query.call(window)\n+  } catch {\n+    return []\n+  }\n+  const families = [...new Set(fonts.map((f) => f.family))].sort((a, b) => a.localeCompare(b))\n+  return monoOnly ? families.filter(isMonospace) : families\n+}\n+\n+/** Monospace test: the API exposes no generic-family flag, so probe glyph advance — a font is\n+    monospace iff a narrow and a wide glyph render at the same width (two pairs, to be safe). */\n+const monoCache = new Map<string, boolean>()\n+let probeCtx: CanvasRenderingContext2D | null = null\n+\n+function isMonospace(family: string): boolean {\n+  const cached = monoCache.get(family)\n+  if (cached !== undefined) return cached\n+  probeCtx ??= document.createElement(\"canvas\").getContext(\"2d\")\n+  let mono = false\n+  if (probeCtx) {\n+    probeCtx.font = `32px ${quote(family)}`\n+    const w = (s: string) => probeCtx!.measureText(s).width\n+    mono = w(\"i\") === w(\"W\") && w(\"l\") === w(\"m\")\n+  }\n+  monoCache.set(family, mono)\n+  return mono\n+}\n","989e879313719bb7d0582745621559d17f983b10 src/renderer/src/lib/messages.ts":"diff --git a/src/renderer/src/lib/messages.ts b/src/renderer/src/lib/messages.ts\nindex 524489d..6af9c98 100644\n--- a/src/renderer/src/lib/messages.ts\n+++ b/src/renderer/src/lib/messages.ts\n@@ -631,7 +631,20 @@ export const messages = {\n       return t`Settings`\n     },\n     get intro() {\n-      return t`Fetch behavior, applied to every repository.`\n+      return t`Appearance, colors, and fetch behavior.`\n+    },\n+    /* left-nav sections */\n+    get sectionCustomization() {\n+      return t`Customization`\n+    },\n+    get sectionColors() {\n+      return t`Colors`\n+    },\n+    get sectionFetch() {\n+      return t`Fetch`\n+    },\n+    get resetDefaults() {\n+      return t`Reset to defaults`\n     },\n     get autoFetch() {\n       return t`Auto-fetch`\n@@ -660,6 +673,71 @@ export const messages = {\n     },\n   },\n \n+  /* Settings ▸ Customization (renderer prefs — cf. lib/customization.ts, lib/theme.ts, lib/i18n.ts) */\n+  customization: {\n+    get fontUi() {\n+      return t`Interface font`\n+    },\n+    get fontMono() {\n+      return t`Monospace font`\n+    },\n+    /** the \"use the bundled default\" option in the font pickers */\n+ gistry\n+   (shared/settings.ts, which drives git); persisted as one JSON blob in localStorage.\n+\n+   Mirrors lib/theme.ts: a module-held live value, a subscriber set, a useSyncExternalStore hook,\n+   and an apply step that writes CSS custom properties on <html>. Colors are theme-dependent\n+   (app.css defines distinct light/dark oklch tokens), so `applyCustomization` writes the *active*\n+   theme's overrides and re-runs on every theme flip (onThemeChange). Fonts route through\n+   `--amont-font-ui`/`--amont-font-mono` (cf. app.css) so a runtime override reaches the inlined\n+   font utilities. */\n+\n+import { useSyncExternalStore } from \"react\"\n+\n+import { isDark, onThemeChange } from \"@/lib/theme\"\n+\n+/** Editable badge hues, surfaced to the user as feature / bugfix / hotfix / release / info /\n+    refactor / polish. `danger` is the shadcn `--destructive` token; the rest are amont's own. */\n+export type ColorRole = \"success\" | \"warning\" | \"danger\" | \"release\" | \"info\" | \"refactor\" | \"polish\"\n+\n+export const COLOR_ROLES: readonly ColorRole[] = [\n+  \"success\",\n+  \"warning\",\n+  \"danger\",\n+  \"release\",\n+  \"info\",\n+  \"refactor\",\n+  \"polish\",\n+]\n+\n+/** role → the app.css custom property carrying its hue. */\n+const ROLE_VAR: Record<ColorRole, string> = {\n+  success: \"--success\",\n+  warning: \"--warning\",\n+  danger: \"--destructive\",\n+  release: \"--release\",\n+  info: \"--info\",\n+  refactor: \"--refactor\",\n+  polish: \"--polish\",\n+}\n+\n+export type ThemeKey = \"light\" | \"dark\"\n+type ColorMap = Partial<Record<ColorRole, string>>\n+\n+export interface Customization {\n+  /** UI (sans) font family; `null` = the bundled default (Geist) */\n+  fontUi: string | null\n+  /** monospace font family; `null` = the bundled default (Geist Mono) */\n+  fontMono: string | null\n+  /** restrict the mono picker to monospace families */\n+  monoOnly: boolean\n+  /** detect a `feat:`/`[TAG]` prefix and lift it into its own graph column */\n+  showPrefixColumn: boolean\n+  /** show the underlying git command as subtext on actions (cf. components/ui/git-cmd) */\n+  showGitCommands: boolean\n+  /** per-theme hex overrides of the badge hues; a missing entry = the app.css default */\n+  colors: Record<ThemeKey, ColorMap>\n+}\n+\n+export const CUSTOMIZATION_DEFAULTS: Customization = {\n+  fontUi: null,\n+  fontMono: null,\n+  monoOnly: false,\n+  showPrefixColumn: true,\n+  showGitCommands: true,\n+  colors: { light: {}, dark: {} },\n+}\n+\n+const KEY = \"amont.customization\"\n+const HEX = /^#[0-9a-fA-F]{6}$/\n+\n+/** Rebuild a valid Customization from any stored value (older shape, corrupt, `null`) — same\n+    defensive posture as coerceSettings in shared/settings.ts. */\n+function coerce(value: unknown): Customization {\n+  const src = value && typeof value === \"object\" ? (value as Record<string, unknown>) : {}\n+  const str = (v: unknown) => (typeof v === \"string\" && v.trim() ? v : null)\n+  const bool = (v: unknown, d: boolean) => (typeof v === \"boolean\" ? v : d)\n+  const colorMap = (v: unknown): ColorMap => {\n+    const out: ColorMap = {}\n+    if (v && typeof v === \"object\") {\n+      for (const role of COLOR_ROLES) {\n+        const hex = (v as Record<string, unknown>)[role]\n+        if (typeof hex === \"string\" && HEX.test(hex)) out[role] = hex.toLowerCase()\n+      }\n+    }\n+    return out\n+  }\n+  const colors = src.colors && typeof src.colors === \"object\" ? (src.colors as Record<string, unknown>) : {}\n+  return {\n+    fontUi: str(src.fontUi),\n+    fontMono: str(src.fontMono),\n+    monoOnly: bool(src.monoOnly, CUSTOMIZATION_DEFAULTS.monoOnly),\n+    showPrefixColumn: bool(src.showPrefixColumn, CUSTOMIZATION_DEFAULTS.showPrefixColumn),\n+    showGitCommands: bool(src.showGitCommands, CUSTOMIZATION_DEFAULTS.showGitCommands),\n+    colors: { light: colorMap(colors.light), dark: colorMap(colors.dark) },\n+  }\n+}\n+\n+function load(): Customization {\n+  try {\n+    const raw = localStorage.getItem(KEY)\n+    return coerce(raw ? JSON.parse(raw) : null)\n+  } catch {\n+    return coerce(null)\n+  }\n+}\n+\n+let current: Customization = load()\n+\n+export const getCustomization = (): Customization => current\n+\n+const listeners = new Set<() => void>()\n+\n+export function onCustomizationChange(cb: () => void): () => void {\n+  listeners.add(cb)\n+  return () => void listeners.delete(cb)\n+}\n+\n+function persist(): void {\n+  try {\n+    localStorage.setItem(KEY, JSON.stringify(current))\n+  } catch {\n+    /* quota/full disk: the live value still holds for this session */\n+  }\n+}\n+\n+/** Quote a family name for a CSS font-family value / canvas font (installed families often have\n+    spaces); strip quotes and backslashes so the value can't break out of the string. */\n+const quote = (family: string) => `\"${family.replace(/[\"\\\\]/g, \"\")}\"`\n+\n+/** Apply the current customization to <html>: the font override vars plus the active theme's color\n+    overrides. Idempotent — each field is set or removed — so it's safe to call on every change. */\n+export function applyCustomization(): void {\n+  const { style } = document.documentElement\n+  if (current.fontUi) style.setProperty(\"--amont-font-ui\", quote(current.fontUi))\n+  else style.removeProperty(\"--amont-font-ui\")\n+  if (current.fontMono) style.setProperty(\"--amont-font-mono\", quote(current.fontMono))\n+  else style.removeProperty(\"--amont-font-mono\")\n+\n+  const overrides = current.colors[isDark() ? \"dark\" : \"light\"]\n+  for (const role of COLOR_ROLES) {\n+    const hex = overrides[role]\n+    if (hex) style.setProperty(ROLE_VAR[role], hex)\n+    else style.removeProperty(ROLE_VAR[role])\n+  }\n+}\n+\n+/* Colors are theme-scoped: a light↔dark flip must swap which override set is live. Re-applying the\n+   fonts at the same time is a harmless no-op. */\n+onThemeChange(applyCustomization)\n+\n+function commit(next: Customization): void {\n+  current = next\n+  persist()\n+  applyCustomization()\n+  listeners.forEach((f) => f())\n+}\n+\n+/** Patch the flat fields (fonts, toggles). Colors go through the dedicated helpers below. */\n+export function setCustomization(patch: Partial<Omit<Customization, \"colors\">>): void {\n+  commit({ ...current, ...patch })\n+}\n+\n+/** Set one role's hex override for a theme. */\n+export function setColor(theme: ThemeKey, role: ColorRole, hex: string): void {\n+  commit({\n+    ...current,\n+    colors: { ...current.colors, [theme]: { ...current.colors[theme], [role]: hex.toLowerCase() } },\n+  })\n+}\n+\n+/** Clear one role (or, with no role, the whole theme) back to the app.css default. */\n+export function resetColor(theme: ThemeKey, role?: ColorRole): void {\n+  if (!role) {\n+    commit({ ...current, colors: { ...current.colors, [theme]: {} } })\n+    return\n+  }\n+  const next = { ...current.colors[theme] }\n+  delete next[role]\n+  commit({ ...current, colors: { ...current.colors, [theme]: next } })\n+}\n+\n+/** Reset the flat fields (fonts + toggles) to defaults; colors keep their own reset. */\n+export function resetCustomization(): void {\n+  commit({ ...CUSTOMIZATION_DEFAULTS, colors: current.colors })\n+}\n+\n+/* --- Getters for non-React consumers (the imperative graph render) --- */\n+export const getShowPrefixColumn = (): boolean => current.showPrefixColumn\n+export const getShowGitCommands = (): boolean => current.showGitCommands\n+\n+/* --- React hooks --- */\n+export function useCustomization(): Customization {\n+  return useSyncExternalStore(onCustomizationChange, getCustomization)\n+}\n+\n+export function useShowGitCommands(): boolean {\n+  return useSyncExternalStore(onCustomizationChange, getShowGitCommands)\n+}\n+\n+/* --- Default hex read-back (for the native color inputs) --- */\n+\n+let defaultsCache: Record<ThemeKey, Record<ColorRole, string>> | null = null\n+\n+/** Hex of each role for both themes as authored in app.css, read once with any live override\n+    stripped and both theme classes probed. `<input type=color>` needs a `#rrggbb`, and the tokens\n+    are oklch — so we let the browser resolve each to rgb, then hex. Synchronous (no paint between\n+    the class toggles), and memoized since the stylesheet defaults don't change. */\n+export function defaultColorHexes(): Record<ThemeKey, Record<ColorRole, string>> {\n+  if (defaultsCache) return defaultsCache\n+  const root = document.documentElement\n+  const saved = COLOR_ROLES.map((r) => [ROLE_VAR[r], root.style.getPropertyValue(ROLE_VAR[r])] as const)\n+  for (const [v] of saved) root.style.removeProperty(v)\n+  const wasDark = root.classList.contains(\"dark\")\n+  const read = (): Record<ColorRole, string> =>\n+    Object.fromEntries(\n+      COLOR_ROLES.map((r) => [r, toHex(getComputedStyle(root).getPropertyValue(ROLE_VAR[r]).trim())])\n+    ) as Record<ColorRole, string>\n+  root.classList.remove(\"dark\")\n+  const light = read()\n+  root.classList.add(\"dark\")\n+  const dark = read()\n+  root.classList.toggle(\"dark\", wasDark)\n+  for (const [v, val] of saved) if (val) root.style.setProperty(v, val)\n+  defaultsCache = { light, dark }\n+  return defaultsCache\n+}\n+\n+/** Effective hex of a role for a theme: the override if set, otherwise the app.css default. */\n+export function colorHex(theme: ThemeKey, role: ColorRole): string {\n+  return current.colors[theme][role] ?? defaultColorHexes()[theme][role]\n+}\n+\n+/** Resolve any CSS color string (oklch, rgb, named…) to `#rrggbb` via a throwaway element. */\n+function toHex(color: string): string {\n+  const probe = document.createElement(\"span\")\n+  probe.style.color = color\n+  probe.style.display = \"none\"\n+  document.body.appendChild(probe)\n+  const rgb = getComputedStyle(probe).color\n+  probe.remove()\n+  const parts = rgb.match(/\\d+(?:\\.\\d+)?/g)?.map(Number) ?? [0, 0, 0]\n+  const h = (n: number) => Math.round(Math.max(0, Math.min(255, n))).toString(16).padStart(2, \"0\")\n+  return `#${h(parts[0])}${h(parts[1])}${h(parts[2])}`\n+}\n+\n+/* --- System fonts (Local Font Access API) --- */\n+\n+/** `window.queryLocalFonts` is Electron/Chromium-only and gated by the `local-fonts` permission\n+    (granted in main/window.ts). Absent in the mock browser harness or when denied → returns [],\n+    and the picker falls back to showing just the current value. When `monoOnly`, keep only families\n+    that measure as monospace. */\n+export async function listFonts(monoOnly: boolean): Promise<string[]> {\n+  const query = (window as unknown as { queryLocalFonts?: () => Promise<Array<{ family: string }>> }).queryLocalFonts\n+  if (!query) return []\n+  let fonts: Array<{ family: string }>\n+  try {\n+    fonts = await query.call(window)\n+  } catch {\n+    return []\n+  }\n+  const families = [...new Set(fonts.map((f) => f.family))].sort((a, b) => a.localeCompare(b))\n+  return monoOnly ? families.filter(isMonospace) : families\n+}\n+\n+/** Monospace test: the API exposes no generic-family flag, so probe glyph advance — a font is\n+    monospace iff a narrow and a wide glyph render at the same width (two pairs, to be safe). */\n+const monoCache = new Map<string, boolean>()\n+let probeCtx: CanvasRenderingContext2D | null = null\n+\n+function isMonospace(family: string): boolean {\n+  const cached = monoCache.get(family)\n+  if (cached !== undefined) return cached\n+  probeCtx ??= document.createElement(\"canvas\").getContext(\"2d\")\n+  let mono = false\n+  if (probeCtx) {\n+    probeCtx.font = `32px ${quote(family)}`\n+    const w = (s: string) => probeCtx!.measureText(s).width\n+    mono = w(\"i\") === w(\"W\") && w(\"l\") === w(\"m\")\n+  }\n+  monoCache.set(family, mono)\n+  return mono\n+}\n","5ff57751ab030c6e1c3ee0f161d8e45eaedc98c3 src/renderer/src/lib/messages.ts":"diff --git a/src/renderer/src/lib/messages.ts b/src/renderer/src/lib/messages.ts\nindex 524489d..6af9c98 100644\n--- a/src/renderer/src/lib/messages.ts\n+++ b/src/renderer/src/li ,\n+  DialogHeader,\n+  DialogTitle,\n+} from \"@/components/ui/dialog\"\n+\n+/* App-wide settings (shared/settings.ts): fetch behavior, applied to every repository. Opened from\n+   the toolbar's fetch button-group (the cog). Each control writes through host.setSettings the\n+   moment it changes — the main process persists it and re-arms the open repos' autofetch timers\n+   live — so there's no Save button, only Close. Every value and choice comes from the SETTINGS\n+   registry, never hardcoded here.\n+\n+   State lives in the shared `settings` query (queries.ts), not local: the toolbar reads the same\n+   cache for its fetch-command label, so toggling prune updates the label in the same frame. */\n+export function SettingsDialog({ onClose }: { onClose: () => void }) {\n+  const queryClient = useQueryClient()\n+  const { data: settings } = useQuery({\n+    queryKey: queryKeys.settings(),\n+    queryFn: () => host.getSettings(),\n+    staleTime: Infinity,\n+  })\n+\n+  /* optimistic: write the query cache at once (the modal and toolbar reflect it), then persist.\n+     A failed write is harmless — the cache reloads from the persisted truth next open. */\n+  const patch = useCallback(\n+    (p: Partial<Settings>) => {\n+      queryClient.setQueryData(queryKeys.settings(), (s: Settings | undefined) => (s ? { ...s, ...p } : s))\n+      void host.setSettings(p)\n+    },\n+    [queryClient]\n+  )\n+\n+  return (\n+    <Dialog open onOpenChange={(open) => !open && onClose()}>\n+      <DialogContent className=\"sm:max-w-md\">\n+        <DialogHeader>\n+          <DialogTitle>{messages.settings.title}</DialogTitle>\n+          <DialogDescription>{messages.settings.intro}</DialogDescription>\n+        </DialogHeader>\n+\n+        {settings && (\n+          <div className=\"grid gap-4\">\n+            {/* Auto-fetch on/off */}\n+            <label className=\"flex cursor-pointer items-start gap-2.5 text-xs\">\n+              <Checkbox\n+                checked={settings.autoFetch}\n+                onCheckedChange={(v) => patch({ autoFetch: v === true })}\n+                className=\"mt-0.5\"\n+              />\n+              <span className=\"min-w-0\">\n+                <span className=\"block font-medium\">{messages.settings.autoFetch}</span>\n+                <span className=\"block text-[0.625rem] text-muted-foreground\">{messages.settings.autoFetchHint}</span>\n+              </span>\n+            </label>\n+\n+            {/* Interval — only meaningful while auto-fetch is on, so it dims and locks with it */}\n+            <div className={cn(\"flex items-center justify-between gap-3\", !settings.autoFetch && \"opacity-50\")}>\n+              <span className=\"text-xs font-medium\">{messages.settings.interval}</span>\n+              <div className=\"flex items-center gap-1.5\">\n+                <ToggleGroup\n+                  spacing={0}\n+                  variant=\"outline\"\n+                  size=\"sm\"\n+                  disabled={!settings.autoFetch}\n+                  value={[String(settings.autoFetchIntervalMin)]}\n+                  onValueChange={(v) => {\n+                    /* single-select: an empty array is a deselect click on the active item — keep\n+                       the current value (a controlled group, so it never actually clears) */\n+                    const n = Number(v[0])\n+                    if (Number.isFinite(n)) patch({ autoFetchIntervalMin: n })\n+                  }}\n+                >\n+                  {SETTINGS.autoFetchIntervalMin.options.map((n) => (\n+                    <ToggleGroupItem key={n} value={String(n)} className=\"tabular-nums\">\n+                      {n}\n+                    </ToggleGroupItem>\n+                  ))}\n+                </ToggleGroup>\n+                <span className=\"text-[0.625rem] text-muted-foreground\">{messages.settings.minutesUnit}</span>\n+              </div>\n+            </div>\n+\n+            {/* Prune on fetch */}\n+            <la plantage anonymes\"\n \n+msgid \"Settings\"\n+msgstr \"Réglages\"\n+\n msgid \"Show sidebar\"\n msgstr \"Afficher la barre latérale\"\n \n","8afb76b035b1b3d10e1077cd09aaf00da7eb4c7e src/shared/ipc-contract.ts":"diff --git a/src/shared/ipc-contract.ts b/src/shared/ipc-contract.ts\nindex 8315161..10c74a6 100644\n--- a/src/shared/ipc-contract.ts\n+++ b/src/shared/ipc-contract.ts\n@@ -10,6 +10,7 @@\n    structured error (`shared/errors.ts`) instead of a pre-formatted French string — same\n    payload, message reconstructed on the renderer side. */\n \n+import type { Settings } from \"./settings\"\n import type {\n   BlobData,\n   BlobRef,\n@@ -61,6 +62,11 @@ export type InvokeChannels = {\n   \"telemetry:state\": () => Promise<{ available: boolean; enabled: boolean }>\n   \"telemetry:set\": (enabled: boolean) => Promise<void>\n \n+  /* User settings (cf. shared/settings.ts). `get` reads the live values; `set` applies a partial\n+     patch, coerced main-side. Auto-fetch changes re-arm the open repos' timers immediately. */\n+  \"settings:get\": () => Promise<Settings>\n+  \"settings:set\": (patch: Partial<Settings>) => Promise<void>\n+\n   /* Creation page (the \"+\" in the tab strip). The renderer never supplies an arbitrary\n      destination: `create:chooseDir` shows the system picker and main remembers the choice —\n      same confinement model as `openable` (cf. main/state.ts, main/create.ts). */\n@@ -197,6 +203,8 @@ export type Bridge = {\n   scanRoot: InvokeChannels[\"root:scan\"]\n   telemetryState: InvokeChannels[\"telemetry:state\"]\n   setTelemetry: InvokeChannels[\"telemetry:set\"]\n+  getSettings: InvokeChannels[\"settings:get\"]\n+  setSettings: InvokeChannels[\"settings:set\"]\n   chooseCreateDir: InvokeChannels[\"create:chooseDir\"]\n   initRepo: InvokeChannels[\"create:init\"]\n   initBare: InvokeChannels[\"create:bare\"]\n","8afb76b035b1b3d10e1077cd09aaf00da7eb4c7e src/shared/settings.ts":"diff --git a/src/shared/settings.ts b/src/shared/settings.ts\nnew file mode 100644\nindex 0000000..b947d1d\n--- /dev/null\n+++ b/src/shared/settings.ts\n@@ -0,0 +1,72 @@\n+/* Centralized settings registry — the single source of truth for user-tunable settings.\n+   Shared by both worlds: the main process reads it (autofetch timer in repos.ts, the fetch\n+   `--prune` flag in git/ops.ts) and the renderer reads it (the settings modal), so no default\n+   is hardcoded twice. Values that used to be inline constants (the 5-minute autofetch interval,\n+   the always-on `--prune`) now live here as descriptor defaults.\n+\n+   Each setting is described once, by a `Spec`, and everything else is derived from that registry:\n+   the default object, the runtime coercion of an untrusted persisted/renderer value, and the\n+   metadata the modal renders (interval bounds, preset choices). Adding a setting is one entry.\n+\n+   Persisted in state.json under `settings` (cf. main/state.ts). `coerceSettings()` rebuilds a\n+   valid object from anything — a corrupt file, an older shape, a malformed renderer patch —\n+   exactly as state.ts coerces its own persisted shape, so a bad value can never reach git. */\n+\n+export interface Settings {\n+  /** background auto-fetch on a timer; off clears the per-repo interval entirely */\n+  autoFetch: boolean\n+  /** delay between two auto-fetches, in minutes (only meaningful while `autoFetch` is on) */\n+  autoFetchIntervalMin: number\n+  /** `--prune` on fetch: drop remote-tracking refs whose upstream branch has been deleted */\n+  prune: boolean\n+}\n+\n+/** A boolean setting: on/off, one default. */\n+interface BoolSpec {\n+  kind: \"boolean\"\n+  default: boolean\n+}\n+\n+/** An integer setting: clamped to [min, max], with a set of preset choices for the UI. */\n+interface IntSpec {\n+  kind: \"int\"\n+  default: number\n+  min: number\n+  max: number\n+  /** preset values the settings modal offers as a segmented choice */\n+  options: readonly number[]\n+}\n+\n+type Spec = BoolSpec | IntSpec\n+\n+/** The registry: one descriptor per setting, keyed by its name. `satisfies` (rather than an\n+    explicit annotation) checks every `Settings` key is present and correctly shaped while keeping\n+    each entry's literal type — so the UI can read `autoFetchIntervalMin.options` without a cast. */\n+export const SETTINGS = {\n+  autoFetch: { kind: \"boolean\", default: true },\n+  autoFetchIntervalMin: { kind: \"int\", default: 5, min: 1, max: 1440, options: [1, 2, 5, 10, 15, 30, 60] },\n+  prune: { kind: \"boolean\", default: true },\n+} satisfies Record<keyof Settings, Spec>\n+\n+/** Coerce one untrusted value against its spec, falling back to the default when it doesn't fit. */\n+function coerce(spec: Spec, value: unknown): boolean | number {\n+  if (spec.kind === \"boolean\") return typeof value === \"boolean\" ? value : spec.default\n+  if (typeof value !== \"number\" || !Number.isFinite(value)) return spec.default\n+  return Math.min(spec.max, Math.max(spec.min, Math.round(value)))\n+}\n+\n+/** Rebuild a fully valid `Settings` from any input (persisted file, renderer patch, `{}`).\n+    Every key is taken from the registry, so unknown fields are dropped and missing ones default. */\n+export function coerceSettings(value: unknown): Settings {\n+  const src = value && typeof value === \"object\" ? (value as Record<string, unknown>) : {}\n+  const out = {} as Record<keyof Settings, boolean | number>\n+  for (const key of Object.keys(SETTINGS) as (keyof Settings)[]) out[key] = coerce(SETTINGS[key], src[key])\n+  return out as Settings\n+}\n+\n+/** Every setting at its registry default. Derived, not written twice — `coerceSettings({})` picks\n+    each `default` since no key fits. */\n+export const SETTINGS_DEFAULTS: Settings = coerceSettings({})\n+\n+/** The autofetch interval as a timer duration in milliseconds. */\n+export const autoFetchIntervalMs = (s: Settings): number => s.autoFetchIntervalMin * 60_000\n","f61eb4869c651fee6c129b05655b197968ed2291 src/main/git/ops.ts":"diff --git a/src/main/git/ops.ts b/src/main/git/ops.ts\nindex e32de2c..ae1e549 100644\n--- a/src/main/git/ops.ts\n+++ b/src/main/git/ops.ts\n@@ -13,6 +13,7 @@ import { writeFile } from \"node:fs/promises\"\n import { AppError, decodeError } from \"../../shared/errors.ts\"\n import type { BranchAct, OpEvent, OpName, StashAct, WorktreeAct } from \"../../shared/types.ts\"\n import { assertPaths, inRepo, withLock, type RepoHandle } from \"../repos.ts\"\n+import { getSettings } from \"../settings.ts\"\n import { mute } from \"../watcher.ts\"\n import { OP_TIMEOUT } from \"./exec.ts\"\n import { finishFlow } from \"./flow.ts\"\n@@ -21,7 +22,7 @@ import { ALL_REFS, BRANCH } from \"./parse.ts\"\n /* --- Network ---\n    --progress: without a TTY git stays silent about its progress; we force it so the console streams it. */\n const OPS: Record<OpName, string[]> = {\n-  fetch: [\"fetch\", \"--all\", \"--prune\", \"--progress\"],\n+  fetch: [\"fetch\", \"--all\", \"--progress\"],\n   pull: [\"pull\", \"--ff-only\", \"--progress\"],\n   push: [\"push\", \"--progress\"],\n }\n@@ -29,6 +30,12 @@ const OP_GROUP: Record<OpName, string> = { fetch: \"Fetch\", pull: \"Pull\", push: \"\n \n export const isOpName = (name: string): name is OpName => Object.hasOwn(OPS, name)\n \n+/* `--prune` on fetch is a user setting (settings.ts): drop remote-tracking refs whose upstream\n+   branch is gone. Read live at call time so a change in the settings modal takes effect on the\n+   very next fetch, no restart. The other ops carry no settings-driven flag. */\n+const opArgs = (name: OpName): string[] =>\n+  name === \"fetch\" && getSettings().prune ? [\"fetch\", \"--all\", \"--prune\", \"--progress\"] : OPS[name]\n+\n /* Operation header: brackets the stream at the level of the user action (a push, a pull,\n    auto-fetch, a checkout…), whereas `r.git()` only sees isolated commands. Background reads\n    (status, log pages) stay without a header, which visually sets them apart. */\n@@ -82,7 +89,7 @@ export async function runOp(r: RepoHandle, name: OpName, auto = false): Promise<\n     const before = await refTips(r)\n     /* stream `NN%` to the footer, like fsck (Verify) — but never for a background auto-fetch,\n        which stays non-intrusive (a badge on completion, no live feed occupant). */\n-    await r.git(OPS[name], { timeout: OP_TIMEOUT, onProgress: auto ? undefined : reportProgress(r, name) })\n+    await r.git(opArgs(name), { timeout: OP_TIMEOUT, onProgress: auto ? undefined : reportProgress(r, name) })\n     const after = await refTips(r)\n     const changed = after.join() !== before.join()\n     const added = changed && name === \"fetch\" ? await countNew(r, before) : 0\n","f61eb4869c651fee6c129b05655b197968ed2291 src/main/index.ts":"diff --git a/src/main/index.ts b/src/main/index.ts\nindex 86596b4..f68d8e7 100644\n--- a/src/main/index.ts\n+++ b/src/main/index.ts\n@@ -5,6 +5,7 @@ import { app } from \"electron\"\n \n import { registerIpc } from \"./ipc.ts\"\n import { hardenSession } from \"./security.ts\"\n+import { loadSettings } from \"./settings.ts\"\n import { loadState } from \"./state.ts\"\n import { applyTelemetryOptOut, initTelemetry } from \"./telemetry.ts\"\n import { initUpdater } from \"./updater.ts\"\n@@ -39,6 +40,9 @@ if (!gotLock) {\n       /* after loadState (reads the opt-out flag), before createWindow so a failure while\n          building the window is still reported */\n       applyTelemetryOptOut()\n+      /* also before createWindow: the renderer's app:state opens the restored tabs, and each\n+         repo arms its autofetch timer from these settings (repos.ts) */\n+      loadSettings()\n       hardenSession()\n       createWindow()\n       /* after createWindow: the updater pushes its events to the main window */\n","f61eb4869c651fee6c129b05655b197968ed2291 src/main/ipc.ts":"diff --git a/src/main/ipc.ts b/src/main/ipc.ts\nindex bf80ddc..44578f7 100644\n--- a/src/main/ipc.ts\n+++ b/src/main/ipc.ts\n@@ -18,6 +18,7 @@ import { BRANCH } from \"./git/parse.ts\"\n import * as queries from \"./git/queries.ts\"\n import * as repos from \"./repos.ts\"\n import { scan } from \"./scan.ts\"\n+import { getSettings, onSettingsChange, setSettings } from \"./settings.ts\"\n import { openable, persisted, saveState } from \"./state.ts\"\n import { setTelemetryEnabled, telemetryState } from \"./telemetry.ts\"\n import { checkForUpdates, installUpdate } from \"./updater.ts\"\n@@ -77,6 +78,10 @@ function withCancel<T>(\n \n export function registerIpc(): void {\n   repos.setAutofetch((r) => void ops.runOp(r, \"fetch\", true))\n+  /* an autofetch on/off or interval change re-arms the open repos' timers, live (repos.ts).\n+     Wired here rather than inside settings.ts, which must not depend on repos.ts (it already\n+     reads getSettings() the other way). */\n+  onSettingsChange(() => repos.rescheduleAutofetch())\n \n   /* --- Application state ---\n      Called once at renderer startup (cf. boot() in lib/git.ts). Idempotent: a\n@@ -150,6 +155,11 @@ export function registerIpc(): void {\n   handle(\"telemetry:state\", () => Promise.resolve(telemetryState()))\n   handle(\"telemetry:set\", (_ev, enabled) => setTelemetryEnabled(enabled === true))\n \n+  /* User settings (cf. settings.ts). `set` takes a partial patch and coerces the merged result\n+     to a valid shape (settings.ts) — a malformed field from the renderer can never reach git. */\n+  handle(\"settings:get\", () => Promise.resolve(getSettings()))\n+  handle(\"settings:set\", (_ev, patch) => setSettings(patch && typeof patch === \"object\" ? patch : {}))\n+\n   /* Auto-update (cf. updater.ts) : l'invoke déclenche, le retour passe par `update:status`. */\n   handle(\"update:check\", () => checkForUpdates())\n   handle(\"update:install\", () => installUpdate())\n","f61eb4869c651fee6c129b05655b197968ed2291 src/main/repos.ts":"diff --git a/src/main/repos.ts b/src/main/repos.ts\nindex 2904581..0c5c08e 100644\n--- a/src/main/repos.ts\n+++ b/src/main/repos.ts\n@@ -13,9 +13,11 @@ import { resolve, sep } from \"node:path\"\n import type { ChildProcess } from \"node:child_process\"\n \n import { AppError } from \"../shared/errors.ts\"\n+import { autoFetchIntervalMs } from \"../shared/settings.ts\"\n import type { DistributiveOmit, OpEvent, ProgressEvent, Repo, Stash, TraceLine } from \"../shared/types.ts\"\n import { createGitRunner, killAll, type GitRunner } from \"./git/exec.ts\"\n import { basename } from \"./util.ts\"\n+import { getSettings } from \"./settings.ts\"\n import { remember } from \"./state.ts\"\n import { watchGit, type Watchable } from \"./watcher.ts\"\n \n@@ -32,7 +34,7 @@ export interface RepoHooks {\n \n /* Open repos, main side only. */\n export interface RepoHandle extends Watchable {\n-  /** autofetch interval; `null` = none (never the case after opening, cf. createRepo) */\n+  /** autofetch timer; `null` when auto-fetch is off or its interval isn't armed (cf. scheduleAutofetch) */\n   timer: NodeJS.Timeout | null\n   id: number\n   path: string\n@@ -112,7 +114,20 @@ export function setAutofetch(fn: AutofetchFn): void {\n   autofetch = fn\n }\n \n-const AUTOFETCH_MS = 5 * 60_000\n+/** (Re)arm a repo's autofetch timer from the current settings (settings.ts): off clears it,\n+    on (re)starts it at the configured interval. Idempotent — always clears the old timer first. */\n+function scheduleAutofetch(r: RepoHandle): void {\n+  if (r.timer) clearInterval(r.timer)\n+  r.timer = null\n+  const settings = getSettings()\n+  if (settings.autoFetch) r.timer = setInterval(() => autofetch?.(r), autoFetchIntervalMs(settings))\n+}\n+\n+/** Re-arm every open repo after an autofetch setting changed (on/off or interval). Called by\n+    ipc.ts through onSettingsChange — a live change takes effect without reopening a tab. */\n+export function rescheduleAutofetch(): void {\n+  for (const r of repos.values()) scheduleAutofetch(r)\n+}\n \n /* --- Lifecycle --- */\n \n@@ -175,7 +190,7 @@ async function createRepo(path: string, hooks: (id: number) => RepoHooks): Promi\n     diffNoIndex: runner.diffNoIndex,\n     gitBuffer: runner.gitBuffer,\n   }\n-  r.timer = setInterval(() => autofetch?.(r), AUTOFETCH_MS)\n+  scheduleAutofetch(r)\n   watchGit(r)\n   repos.set(r.id, r)\n   remember(path)\n","f61eb4869c651fee6c129b05655b197968ed2291 src/main/settings.ts":"diff --git a/src/main/settings.ts b/src/main/settings.ts\nnew file mode 100644\nindex 0000000..e2037a4\n--- /dev/null\n+++ b/src/main/settings.ts\n@@ -0,0 +1,37 @@\n+/* User settings, main side (cf. shared/settings.ts — the registry, and state.ts — persistence).\n+   Holds the single live copy every consumer reads: repos.ts arms the autofetch timer from it,\n+   git/ops.ts reads `prune` at fetch time. Same shape as telemetry.ts: an in-memory value applied\n+   from the persisted state after loadState(), mutated through one setter that persists and notifies.\n+\n+   `onChange` lets ipc.ts re-arm the open repos' timers when the autofetch settings move, without\n+   this module importing repos.ts (which would cycle: repos.ts already reads getSettings()). */\n+\n+import { coerceSettings, SETTINGS_DEFAULTS, type Settings } from \"../shared/settings.ts\"\n+import { persisted, saveState } from \"./state.ts\"\n+\n+let current: Settings = SETTINGS_DEFAULTS\n+\n+/** Apply the persisted settings once loadState() has run (before any repo opens, cf. index.ts).\n+    Coerces the stored value into a valid shape — a corrupt or older file falls back to defaults. */\n+export function loadSettings(): void {\n+  current = coerceSettings(persisted.settings)\n+}\n+\n+/** The live settings. Read on every autofetch tick and every fetch, so a change takes effect at once. */\n+export const getSettings = (): Settings => current\n+\n+let onChange: ((s: Settings) => void) | null = null\n+\n+/** Notified after each `setSettings`, so the caller (ipc.ts) can react — re-arm the timers. */\n+export function onSettingsChange(fn: (s: Settings) => void create:chooseDir\"]\n   initRepo: InvokeChannels[\"create:init\"]\n   initBare: InvokeChannels[\"create:bare\"]\n","f61eb4869c651fee6c129b05655b197968ed2291 src/shared/settings.ts":"diff --git a/src/shared/settings.ts b/src/shared/settings.ts\nnew file mode 100644\nindex 0000000..b947d1d\n--- /dev/null\n+++ b/src/shared/settings.ts\n@@ -0,0 +1,72 @@\n+/* Centralized settings registry — the single source of truth for user-tunable settings.\n+   Shared by both worlds: the main process reads it (autofetch timer in repos.ts, the fetch\n+   `--prune` flag in git/ops.ts) and the renderer reads it (the settings modal), so no default\n+   is hardcoded twice. Values that used to be inline constants (the 5-minute autofetch interval,\n+   the always-on `--prune`) now live here as descriptor defaults.\n+\n+   Each setting is described once, by a `Spec`, and everything else is derived from that registry:\n+   the default object, the runtime coercion of an untrusted persisted/renderer value, and the\n+   metadata the modal renders (interval bounds, preset choices). Adding a setting is one entry.\n+\n+   Persisted in state.json under `settings` (cf. main/state.ts). `coerceSettings()` rebuilds a\n+   valid object from anything — a corrupt file, an older shape, a malformed renderer patch —\n+   exactly as state.ts coerces its own persisted shape, so a bad value can never reach git. */\n+\n+export interface Settings {\n+  /** background auto-fetch on a timer; off clears the per-repo interval entirely */\n+  autoFetch: boolean\n+  /** delay between two auto-fetches, in minutes (only meaningful while `autoFetch` is on) */\n+  autoFetchIntervalMin: number\n+  /** `--prune` on fetch: drop remote-tracking refs whose upstream branch has been deleted */\n+  prune: boolean\n+}\n+\n+/** A boolean setting: on/off, one default. */\n+interface BoolSpec {\n+  kind: \"boolean\"\n+  default: boolean\n+}\n+\n+/** An integer setting: clamped to [min, max], with a set of preset choices for the UI. */\n+interface IntSpec {\n+  kind: \"int\"\n+  default: number\n+  min: number\n+  max: number\n+  /** preset values the settings modal offers as a segmented choice */\n+  options: readonly number[]\n+}\n+\n+type Spec = BoolSpec | IntSpec\n+\n+/** The registry: one descriptor per setting, keyed by its name. `satisfies` (rather than an\n+    explicit annotation) checks every `Settings` key is present and correctly shaped while keeping\n+    each entry's literal type — so the UI can read `autoFetchIntervalMin.options` without a cast. */\n+export const SETTINGS = {\n+  autoFetch: { kind: \"boolean\", default: true },\n+  autoFetchIntervalMin: { kind: \"int\", default: 5, min: 1, max: 1440, options: [1, 2, 5, 10, 15, 30, 60] },\n+  prune: { kind: \"boolean\", default: true },\n+} satisfies Record<keyof Settings, Spec>\n+\n+/** Coerce one untrusted value against its spec, falling back to the default when it doesn't fit. */\n+function coerce(spec: Spec, value: unknown): boolean | number {\n+  if (spec.kind === \"boolean\") return typeof value === \"boolean\" ? value : spec.default\n+  if (typeof value !== \"number\" || !Number.isFinite(value)) return spec.default\n+  return Math.min(spec.max, Math.max(spec.min, Math.round(value)))\n+}\n+\n+/** Rebuild a fully valid `Settings` from any input (persisted file, renderer patch, `{}`).\n+    Every key is taken from the registry, so unknown fields are dropped and missing ones default. */\n+export function coerceSettings(value: unknown): Settings {\n+  const src = value && typeof value === \"object\" ? (value as Record<string, unknown>) : {}\n+  const out = {} as Record<keyof Settings, boolean | number>\n+  for (const key of Object.keys(SETTINGS) as (keyof Settings)[]) out[key] = coerce(SETTINGS[key], src[key])\n+  return out as Settings\n+}\n+\n+/** Every setting at its registry default. Derived, not written twice — `coerceSettings({})` picks\n+    each `default` since no key fits. */\n+export const SETTINGS_DEFAULTS: Settings = coerceSettings({})\n+\n+/** The autofetch interval as a timer duration in milliseconds. */\n+export const autoFetchIntervalMs = (s: Settings): number => s.autoFetchIntervalMin * 60_000\n","a7155a89f0c7fc88e309a36b241ab143ab295287 src/renderer/src/components/ui/primitives/button-group.tsx":"diff --git a/src/renderer/src/components/ui/primitives/button-group.tsx b/src/renderer/src/components/ui/primitives/button-group.tsx\nnew file mode 100644\nindex 0000000..12e4d0c\n--- /dev/null\n+++ b/src/renderer/src/components/ui/primitives/button-group.tsx\n@@ -0,0 +1,87 @@\n+import { mergeProps } from \"@base-ui/react/merge-props\"\n+import { useRender } from \"@base-ui/react/use-render\"\n+import { cva, type VariantProps } from \"class-variance-authority\"\n+\n+import { cn } from \"@/lib/utils\"\n+import { Separator } from \"@/components/ui/primitives/separator\"\n+\n+const buttonGroupVariants = cva(\n+  \"flex w-fit items-stretch *:focus-visible:relative *:focus-visible:z-10 has-[>[data-slot=button-group]]:gap-2 has-[select[aria-hidden=true]:last-child]:[&>[data-slot=select-trigger]:last-of-type]:rounded-r-md [&>[data-slot=select-trigger]:not([class*='w-'])]:w-fit [&>input]:flex-1\",\n+  {\n+    variants: {\n+      orientation: {\n+        horizontal:\n+          \"*:data-slot:rounded-r-none [&>[data-slot]:not(:has(~[data-slot]))]:rounded-r-md! [&>[data-slot]~[data-slot]]:rounded-l-none [&>[data-slot]~[data-slot]]:border-l-0\",\n+        vertical:\n+          \"flex-col *:data-slot:rounded-b-none [&>[data-slot]:not(:has(~[data-slot]))]:rounded-b-md! [&>[data-slot]~[data-slot]]:rounded-t-none [&>[data-slot]~[data-slot]]:border-t-0\",\n+      },\n+    },\n+    defaultVariants: {\n+      orientation: \"horizontal\",\n+    },\n+  }\n+)\n+\n+function ButtonGroup({\n+  className,\n+  orientation,\n+  ...props\n+}: React.ComponentProps<\"div\"> & VariantProps<typeof buttonGroupVariants>) {\n+  return (\n+    <div\n+      role=\"group\"\n+      data-slot=\"button-group\"\n+      data-orientation={orientation}\n+      className={cn(buttonGroupVariants({ orientation }), className)}\n+      {...props}\n+    />\n+  )\n+}\n+\n+function ButtonGroupText({\n+  className,\n+  render,\n+  ...props\n+}: useRender.ComponentProps<\"div\">) {\n+  return useRender({\n+    defaultTagName: \"div\",\n+    props: mergeProps<\"div\">(\n+      {\n+        className: cn(\n+          \"flex items-center gap-2 rounded-md border bg-muted px-2.5 text-xs/relaxed font-medium [&_svg]:pointer-events-none [&_svg:not([class*='size-'])]:size-4\",\n+          className\n+        ),\n+      },\n+      props\n+    ),\n+    render,\n+    state: {\n+      slot: \"button-group-text\",\n+    },\n+  })\n+}\n+\n+function ButtonGroupSeparator({\n+  className,\n+  orientation = \"vertical\",\n+  ...props\n+}: React.ComponentProps<typeof Separator>) {\n+  return (\n+    <Separator\n+      data-slot=\"button-group-separator\"\n+      orientation={orientation}\n+      className={cn(\n+        \"relative self-stretch bg-input data-horizontal:mx-px data-horizontal:w-auto data-vertical:my-px data-vertical:h-auto\",\n+        className\n+      )}\n+      {...props}\n+    />\n+  )\n+}\n+\n+export {\n+  ButtonGroup,\n+  ButtonGroupSeparator,\n+  ButtonGroupText,\n+  buttonGroupVariants,\n+}\n","a7155a89f0c7fc88e309a36b241ab143ab295287 src/renderer/src/components/ui/primitives/separator.tsx":"diff --git a/src/renderer/src/components/ui/primitives/separator.tsx b/src/renderer/src/components/ui/primitives/separator.tsx\nindex c891b37..4f65961 100644\n--- a/src/renderer/src/components/ui/primitives/separator.tsx\n+++ b/src/renderer/src/components/ui/primitives/separator.tsx\n@@ -1,10 +1,12 @@\n-\"use client\"\n-\n import { Separator as SeparatorPrimitive } from \"@base-ui/react/separator\"\n \n import { cn } from \"@/lib/utils\"\n \n-function Separator({ className, orientation = \"horizontal\", ...props }: SeparatorPrimitive.Props) {\n+function Separator({\n+  className,\n+  orientation = \"horizontal
