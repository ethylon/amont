/features/maintenance/health\"\n \n+/** Live footer label of a running network op, the counterpart of MAINT_RUNNING for fetch/pull/push. */\n+const OP_RUNNING: Record<OpName, () => string> = {\n+  fetch: () => messages.ops.fetching,\n+  pull: () => messages.ops.pulling,\n+  push: () => messages.ops.pushing,\n+}\n+\n export type OpState = {\n   text: string\n   color: \"neutral\" | \"primary\" | \"success\" | \"danger\"\n@@ -24,6 +32,8 @@ type Props = {\n   /** work type of the current branch, `null` outside a flow (master, detached HEAD…) */\n   flow: BranchFlow | null\n   opState: OpState | null\n+  /** live `NN%` of the running network op (fetch/pull/push), streamed from git's `--progress` */\n+  opProgress: { op: OpName; percent: number } | null\n   stats: Stats | null\n   /** live database-maintenance progress (Verify/Compact), cf. features/maintenance */\n   maint: MaintState | null\n@@ -34,11 +44,14 @@ type Props = {\n \n const nf = new Intl.NumberFormat()\n \n-/* A single feed occupant at a time, by priority: a running maintenance op, then operation\n-   feedback (errors, \"new commits\" + Reload — auto-cleared by the store), then a settled\n-   maintenance result, then the health hint. `null` hands the feed back to the console line. */\n-function feedEntry({ opState, maint, health, onCompact }: Props): FeedEntry | null {\n+/* A single feed occupant at a time, by priority: a running maintenance op, then a running\n+   network op (its live `--progress` percentage), then operation feedback (errors, \"new commits\" +\n+   Reload — auto-cleared by the store), then a settled maintenance result, then the health hint.\n+   `null` hands the feed back to the console line. */\n+function feedEntry({ opState, opProgress, maint, health, onCompact }: Props): FeedEntry | null {\n   if (maint?.running) return { tone: \"busy\", verb: maint.op, text: MAINT_RUNNING[maint.op](), percent: maint.percent }\n+  if (opProgress)\n+    return { tone: \"busy\", verb: opProgress.op, text: OP_RUNNING[opProgress.op](), percent: opProgress.percent }\n   if (opState) return { tone: opState.color, text: opState.text, action: opState.action }\n   if (maint?.result) return { tone: maint.result.ok ? \"success\" : \"danger\", verb: maint.op, text: maint.result.text }\n   if (health?.needsCompaction)\n","33ac53be17db6d42417b8a37c1b8b4ce68cc96f4 src/renderer/src/lib/messages.ts":"diff --git a/src/renderer/src/lib/messages.ts b/src/renderer/src/lib/messages.ts\nindex 3a0522e..c00cf89 100644\n--- a/src/renderer/src/lib/messages.ts\n+++ b/src/renderer/src/lib/messages.ts\n@@ -209,6 +209,20 @@ export const messages = {\n     },\n   },\n \n+  /* footer feed while a network op runs — the live `--progress` occupant (fetch/pull/push),\n+     the counterpart of maintenance's \"Verifying database…\" (cf. features/repo/status-bar) */\n+  ops: {\n+    get fetching() {\n+      return t`Fetching…`\n+    },\n+    get pulling() {\n+      return t`Pulling…`\n+    },\n+    get pushing() {\n+      return t`Pushing…`\n+    },\n+  },\n+\n   console: {\n     get ready() {\n       return t`Ready`\n","33ac53be17db6d42417b8a37c1b8b4ce68cc96f4 src/renderer/src/locales/en.po":"diff --git a/src/renderer/src/locales/en.po b/src/renderer/src/locales/en.po\nindex 76b3d53..1055996 100644\n--- a/src/renderer/src/locales/en.po\n+++ b/src/renderer/src/locales/en.po\n@@ -397,6 +397,9 @@ msgstr \"Feature prefix\"\n msgid \"Fetch\"\n msgstr \"Fetch\"\n \n+msgid \"Fetching…\"\n+msgstr \"Fetching…\"\n+\n msgid \"File\"\n msgstr \"File\"\n \n@@ -679,12 +682,18 @@ msgstr \"Publish release {name}\"\n msgid \"Pull\"\n msgstr \"Pull\"\n \n+msgid \"Pulling…\"\n+msgstr \"Pulling…\"\n+\n msgid \"Push\"\n msgstr \"Push\"\n \n msgid \"Push to « {upstream} »\"\n msgstr \"Push to « {upstream} »\"\n \n+msgid \"Pushing…\"\n+msgstr \"Pushing…\"\n+\n msgid \"Ready\"\n msgstr \"Ready\"\n \n","33ac53be17db6d42417b8a37c1b8b4ce68cc96f4 src/renderer/src/locales/fr.po":"diff --git a/src/renderer/src/locales/fr.po b/src/renderer/src/locales/fr.po\nindex d55ec20..cfa0c74 100644\n--- a/src/renderer/src/locales/fr.po\n+++ b/src/renderer/src/locales/fr.po\n@@ -397,6 +397,9 @@ msgstr \"Préfixe feature\"\n msgid \"Fetch\"\n msgstr \"Fetch\"\n \n+msgid \"Fetching…\"\n+msgstr \"Récupération…\"\n+\n msgid \"File\"\n msgstr \"Fichier\"\n \n@@ -679,12 +682,18 @@ msgstr \"Publier la release {name}\"\n msgid \"Pull\"\n msgstr \"Pull\"\n \n+msgid \"Pulling…\"\n+msgstr \"Réception…\"\n+\n msgid \"Push\"\n msgstr \"Push\"\n \n msgid \"Push to « {upstream} »\"\n msgstr \"Push vers « {upstream} »\"\n \n+msgid \"Pushing…\"\n+msgstr \"Envoi…\"\n+\n msgid \"Ready\"\n msgstr \"Prêt\"\n \n","33ac53be17db6d42417b8a37c1b8b4ce68cc96f4 src/shared/types.ts":"diff --git a/src/shared/types.ts b/src/shared/types.ts\nindex 45cca12..3669fed 100644\n--- a/src/shared/types.ts\n+++ b/src/shared/types.ts\n@@ -212,8 +212,13 @@ export type CountObjects = {\n /** Long-running database maintenance: `git fsck --full` (verify) / `git gc` (compact). */\n export type MaintKind = \"fsck\" | \"gc\"\n \n-/** Live progress of a maintenance run, streamed from git's stderr (`NN%`). */\n-export type ProgressEvent = { id: number; op: MaintKind; percent: number }\n+/** Operations that stream a determinate `NN%` from git's stderr (`--progress`): the two\n+    maintenance jobs and the three network ops (fetch/pull/push). `gc` never reports one. */\n+export type ProgressOp = MaintKind | OpName\n+\n+/** Live progress of a `--progress` run, streamed from git's stderr (`NN%`). Consumed by the\n+    maintenance modal (fsck/gc) and the footer feed (fetch/pull/push), cf. features/repo. */\n+export type ProgressEvent = { id: number; op: ProgressOp; percent: number }\n \n /* L'auto-update (main/updater.ts). `origin` distingue le check silencieux du démarrage du\n    check manuel (Help ▸ Check for updates) : le renderer n'affiche les états intermédiaires\n","d92b68a6d9b2e001aeec151c9bb8c6640cd991c0 src/main/git/ops.test.ts":"diff --git a/src/main/git/ops.test.ts b/src/main/git/ops.test.ts\nnew file mode 100644\nindex 0000000..93a4abb\n--- /dev/null\n+++ b/src/main/git/ops.test.ts\n@@ -0,0 +1,75 @@\n+/* Tests for the `done` payload of runOp (ops.ts): `changed` must reflect any ref-tip move —\n+   a push updating the remote-tracking ref, a prune-only fetch — while `added` keeps counting\n+   only a fetch's new commits. The renderer reloads the graph on `changed`: a `false` here\n+   used to leave the \"commits to push\" tint on after a successful push (missing-refresh bug).\n+\n+   `electron` is mocked out: ops.ts drags in repos.ts → state.ts, whose module scope imports\n+   `app` — none of it is exercised by runOp. */\n+import assert from \"node:assert/strict\"\n+import { describe, it, vi } from \"vitest\"\n+\n+vi.mock(\"electron\", () => ({ app: {} }))\n+\n+import type { DistributiveOmit, OpEvent, OpName } from \"../../shared/types.ts\"\n+import type { RepoHandle } from \"../repos.ts\"\n+import { runOp } from \"./ops.ts\"\n+\n+type Emitted = DistributiveOmit<OpEvent, \"id\">\n+\n+/** Minimal handle: `git` replays the ref-tip snapshots taken around the op and a canned\n+    rev-list count; the events go into `events` for inspection. */\n+function fakeRepo(before: string[], after: string[], newCommits = 0) {\n+  const events: Emitted[] = []\n+  let snapshots = 0\n+  const git = (args: string[]) =>\n+    Promise.resolve(\n+      args[0] === \"for-each-ref\"\n+        ? (snapshots++ === 0 ? before : after).join(\"\\n\")\n+        : args[0] === \"rev-list\"\n+          ? String(newCommits)\n+          : \"\"\n+    )\n+  const r = {\n+    running: null as OpName | null,\n+    muted: 0,\n+    dirty: false,\n+    gen: 0,\n+    events: { op: (p: Emitted) => events.push(p), trace: () => {} },\n+    git,\n+  }\n+  return { r: r as unknown as RepoHandle, events }\n+}\n+\n+const doneEvent = (events: Emitted[]) => events.find((e) => e.state === \"done\")\n+\n+describe(\"runOp `done` event: `changed` (graph reload cue) and `added` (badge counter)\", () => {\n+  it(\"push that moved the remote-tracking ref: changed, nothing counted\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\", \"bbb\"], [\"aaa\", \"ccc\"])\n+    await runOp(r, \"push\")\n+    assert.deepEqual(doneEvent(events), { op: \"push\", state: \"done\", auto: false, added: 0, changed: true })\n+  })\n+\n+  it(\"push already up to date: no move, no reload cue\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\", \"bbb\"], [\"aaa\", \"bbb\"])\n+    await runOp(r, \"push\")\n+    assert.deepEqual(doneEvent(events), { op: \"push\", state: \"done\", auto: false, added: 0, changed: false })\n+  })\n+\n+  it(\"prune-only fetch: a tip disappeared without any new commit\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\", \"bbb\"], [\"aaa\"], 0)\n+    await runOp(r, \"fetch\")\n+    assert.deepEqual(doneEvent(events), { op: \"fetch\", state: \"done\", auto: false, added: 0, changed: true })\n+  })\n+\n+  it(\"fetch that brought commits in: changed and counted\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\"], [\"aaa\", \"bbb\"], 3)\n+    await runOp(r, \"fetch\", true)\n+    assert.deepEqual(doneEvent(events), { op: \"fetch\", state: \"done\", auto: true, added: 3, changed: true })\n+  })\n+\n+  it(\"pull signals its move but never counts\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\"], [\"bbb\"], 5)\n+    await runOp(r, \"pull\")\n+    assert.deepEqual(doneEvent(events), { op: \"pull\", state: \"done\", auto: false, added: 0, changed: true })\n+  })\n+})\n","d92b68a6d9b2e001aeec151c9bb8c6640cd991c0 src/main/git/ops.ts":"diff --git a/src/main/git/ops.ts b/src/main/git/ops.ts\nindex a41a3e9..82e20bd 100644\n--- a/src/main/git/ops.ts\n+++ b/src/main/git/ops.ts\n@@ -68,15 +68,16 @@ export async function runOp(r: RepoHandle, name: OpName, auto = false): Promise<\n   groupTrace(r, auto ? \"Auto-fetch\" : OP_GROUP[name])\n   r.events.op({ op: name, state: \"start\", auto })\n   try {\n-    /* only fetch shows a counter; pull reloads the graph, push adds nothing */\n-    const before = name === \"fetch\" ? await refTips(r) : null\n+    /* `changed` compares the ref-tip snapshots around the command: it catches every move the\n+       renderer must redraw — new commits, but also a push updating the remote-tracking ref or\n+       a `--prune` deleting tips, both invisible to a commit count. `added` (fetch only, the\n+       walk isn't free) feeds the \"N new commits\" badge. */\n+    const before = await refTips(r)\n     await r.git(OPS[name], { timeout: OP_TIMEOUT })\n-    let added = 0\n-    if (before) {\n-      const after = await refTips(r)\n-      if (after.join() !== before.join()) added = await countNew(r, before)\n-    }\n-    r.events.op({ op: name, state: \"done\", auto, added })\n+    const after = await refTips(r)\n+    const changed = after.join() !== before.join()\n+    const added = changed && name === \"fetch\" ? await countNew(r, before) : 0\n+    r.events.op({ op: name, state: \"done\", auto, added, changed })\n   } catch (e) {\n     r.events.op({ op: name, state: \"error\", auto, ...errorPayload(e) })\n   } finally {\n","d92b68a6d9b2e001aeec151c9bb8c6640cd991c0 src/renderer/src/features/repo/repo-store.tsx":"diff --git a/src/renderer/src/features/repo/repo-store.tsx b/src/renderer/src/features/repo/repo-store.tsx\nindex 151a39a..b1e6ae0 100644\n--- a/src/renderer/src/features/repo/repo-store.tsx\n+++ b/src/renderer/src/features/repo/repo-store.tsx\n@@ -624,25 +624,27 @@ export function useRepoEvents(): void {\n           return s.showOp(describePayload(p), \"danger\")\n         }\n         invalidateRepo(queryClient, repoId)\n-        if (p.op === \"pull\") {\n+        /* Rien n'a bougé (push/pull « up to date », fetch sans nouveauté) : le graph est déjà\n+           juste, recharger ne ferait que secouer scroll et sélection pour rien. */\n+        if (!p.changed) return\n+        /* Une op manuelle est une action explicite : on recharge pour que le graph reflète les\n+           refs qui ont bougé — commits récupérés (pull), marqueurs « à pusher » et position du\n+           ref distant (push), branches élaguées (fetch --prune) —, le badge « N nouveaux\n+           commits » (fetch seul) ne servant plus que d'accusé de réception. Un auto-fetch reste\n+           non intrusif — badge cliquable seul, pour qu'un fetch d'arrière-plan n'arrache jamais\n+           le scroll ni la sélection à l'utilisateur ; sans nouveau commit (élagage pur), il n'a\n+           même pas de badge à montrer et le graph attend le prochain rechargement. */\n+        if (!p.auto) {\n+          if (p.added > 0) s.showOp(messages.app.newCommits(p.added), \"primary\")\n           await s.resetAndLoad()\n         } else if (p.added > 0) {\n-          /* Un fetch manuel est une action explicite « montre-moi l'amont » : on recharge pour que\n-             les commits récupérés (et les marqueurs de sync) apparaissent, le badge ne servant plus\n-             que d'accusé de réception. Un auto-fetch reste non intrusif — badge cliquable seul, pour\n-             qu'un fetch d'arrière-plan n'arrache jamais le scroll ni la sélection à l'utilisateur. */\n-          if (!p.auto) {\n-            s.showOp(messages.app.newCommits(p.added), \"primary\")\n-            await s.resetAndLoad()\n-          } else {\n-            s.showOp(messages.app.newCommits(p.added), \"primary\", {\n-              label: messages.app.reload,\n-              run: () => {\n-                s.clearOp()\n-                void s.resetAndLoad()\n-              },\n-            })\n-          }\n+          s.showOp(messages.app.newCommits(p.added), \"primary\", {\n+            label: messages.app.reload,\n+            run: () => {\n+              s.clearOp()\n+              void s.resetAndLoad()\n+            },\n+          })\n         }\n       }),\n     [repoId, queryClient, store]\n","d92b68a6d9b2e001aeec151c9bb8c6640cd991c0 src/shared/types.ts":"diff --git a/src/shared/types.ts b/src/shared/types.ts\nindex 9c25d4b..45cca12 100644\n--- a/src/shared/types.ts\n+++ b/src/shared/types.ts\n@@ -269,7 +269,16 @@ export type OpName = \"fetch\" | \"pull\" | \"push\"\n    without the JSON detour that `shared/errors.ts` requires on the invoke side. */\n export type OpEvent = { id: number } & (\n   | { op: OpName; state: \"start\"; auto: boolean }\n-  | { op: OpName; state: \"done\"; auto: boolean; added: number }\n+  | {\n+      op: OpName\n+      state: \"done\"\n+      auto: boolean\n+      /** commits brought in by a fetch — feeds the \"N new commits\" badge (0 for pull/push) */\n+      added: number\n+      /** any ref tip moved (push updates the remote-tracking ref, `--prune` removes tips\n+          without adding a commit): the renderer's cue to reload the graph */\n+      changed: boolean\n+    }\n   | ({ op: OpName; state: \"error\"; auto: boolean } & ErrorPayload)\n )\n \n","31926ada1c60dcfbe450772d8a6e4dee251d00a9 src/main/git/ops.test.ts":"diff --git a/src/main/git/ops.test.ts b/src/main/git/ops.test.ts\nnew file mode 100644\nindex 0000000..93a4abb\n--- /dev/null\n+++ b/src/main/git/ops.test.ts\n@@ -0,0 +1,75 @@\n+/* Tests for the `done` payload of runOp (ops.ts): `changed` must reflect any ref-tip move —\n+   a push updating the remote-tracking ref, a prune-only fetch — while `added` keeps counting\n+   only a fetch's new commits. The renderer reloads the graph on `changed`: a `false` here\n+   used to leave the \"commits to push\" tint on after a successful push (missing-refresh bug).\n+\n+   `electron` is mocked out: ops.ts drags in repos.ts → state.ts, whose module scope imports\n+   `app` — none of it is exercised by runOp. */\n+import assert from \"node:assert/strict\"\n+import { describe, it, vi } from \"vitest\"\n+\n+vi.mock(\"electron\", () => ({ app: {} }))\n+\n+import type { DistributiveOmit, OpEvent, OpName } from \"../../shared/types.ts\"\n+import type { RepoHandle } from \"../repos.ts\"\n+import { runOp } from \"./ops.ts\"\n+\n+type Emitted = DistributiveOmit<OpEvent, \"id\">\n+\n+/** Minimal handle: `git` replays the ref-tip snapshots taken around the op and a canned\n+    rev-list count; the events go into `events` for inspection. */\n+function fakeRepo(before: string[], after: string[], newCommits = 0) {\n+  const events: Emitted[] = []\n+  let snapshots = 0\n+  const git = (args: string[]) =>\n+    Promise.resolve(\n+      args[0] === \"for-each-ref\"\n+        ? (snapshots++ === 0 ? before : after).join(\"\\n\")\n+        : args[0] === \"rev-list\"\n+          ? String(newCommits)\n+          : \"\"\n+    )\n+  const r = {\n+    running: null as OpName | null,\n+    muted: 0,\n+    dirty: false,\n+    gen: 0,\n+    events: { op: (p: Emitted) => events.push(p), trace: () => {} },\n+    git,\n+  }\n+  return { r: r as unknown as RepoHandle, events }\n+}\n+\n+const doneEvent = (events: Emitted[]) => events.find((e) => e.state === \"done\")\n+\n+describe(\"runOp `done` event: `changed` (graph reload cue) and `added` (badge counter)\", () => {\n+  it(\"push that moved the remote-tracking ref: changed, nothing counted\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\", \"bbb\"], [\"aaa\", \"ccc\"])\n+    await runOp(r, \"push\")\n+    assert.deepEqual(doneEvent(events), { op: \"push\", state: \"done\", auto: false, added: 0, changed: true })\n+  })\n+\n+  it(\"push already up to date: no move, no reload cue\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\", \"bbb\"], [\"aaa\", \"bbb\"])\n+    await runOp(r, \"push\")\n+    assert.deepEqual(doneEvent(events), { op: \"push\", state: \"done\", auto: false, added: 0, changed: false })\n+  })\n+\n+  it(\"prune-only fetch: a tip disappeared without any new commit\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\", \"bbb\"], [\"aaa\"], 0)\n+    await runOp(r, \"fetch\")\n+    assert.deepEqual(doneEvent(events), { op: \"fetch\", state: \"done\", auto: false, added: 0, changed: true })\n+  })\n+\n+  it(\"fetch that brought commits in: changed and counted\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\"], [\"aaa\", \"bbb\"], 3)\n+    await runOp(r, \"fetch\", true)\n+    assert.deepEqual(doneEvent(events), { op: \"fetch\", state: \"done\", auto: true, added: 3, changed: true })\n+  })\n+\n+  it(\"pull signals its move but never counts\", async () => {\n+    const { r, events } = fakeRepo([\"aaa\"], [\"bbb\"], 5)\n+    await runOp(r, \"pull\")\n+    assert.deepEqual(doneEvent(events), { op: \"pull\", state: \"done\", auto: false, added: 0, changed: true })\n+  })\n+})\n","31926ada1c60dcfbe450772d8a6e4dee251d00a9 src/main/git/ops.ts":"diff --git a/src/main/git/ops.ts b/src/main/git/ops.ts\nindex a41a3e9..82e20bd 100644\n--- a/src/main/git/ops.ts\n+++ b/src/main/git/ops.ts\n@@ -68,15 +68,16 @@ export async function runOp(r: RepoHandle, name: OpName, auto = false): Promise<\n   groupTrace(r, auto ? \"Auto-fetch\" : OP_GROUP[name])\n   r.events.op({ op: name, state: \"start\", auto })\n   try {\n-    /* only fetch shows a counter; pull reloads the graph, push adds nothing */\n-    const before = name === \"fetch\" ? await refTips(r) : null\n+    /* `changed` compares the ref-tip snapshots around the command: it catches every move the\n+       renderer must redraw — new commits, but also a push updating the remote-tracking ref or\n+       a `--prune` deleting tips, both invisible to a commit count. `added` (fetch only, the\n+       walk isn't free) feeds the \"N new commits\" badge. */\n+    const before = await refTips(r)\n     await r.git(OPS[name], { timeout: OP_TIMEOUT })\n-    let added = 0\n-    if (before) {\n-      const after = await refTips(r)\n-      if (after.join() !== before.join()) added = await countNew(r, before)\n-    }\n-    r.events.op({ op: name, state: \"done\", auto, added })\n+    const after = await refTips(r)\n+    const changed = after.join() !== before.join()\n+    const added = changed && name === \"fetch\" ? await countNew(r, before) : 0\n+    r.events.op({ op: name, state: \"done\", auto, added, changed })\n   } catch (e) {\n     r.events.op({ op: name, state: \"error\", auto, ...errorPayload(e) })\n   } finally {\n","31926ada1c60dcfbe450772d8a6e4dee251d00a9 src/renderer/src/features/repo/repo-store.tsx":"diff --git a/src/renderer/src/features/repo/repo-store.tsx b/src/renderer/src/features/repo/repo-store.tsx\nindex 151a39a..b1e6ae0 100644\n--- a/src/renderer/src/features/repo/repo-store.tsx\n+++ b/src/renderer/src/features/repo/repo-store.tsx\n@@ -624,25 +624,27 @@ export function useRepoEvents(): void {\n           return s.showOp(describePayload(p), \"danger\")\n         }\n         invalidateRepo(queryClient, repoId)\n-        if (p.op === \"pull\") {\n+        /* Rien n'a bougé (push/pull « up to date », fetch sans nouveauté) : le graph est déjà\n+           juste, recharger ne ferait que secouer scroll et sélection pour rien. */\n+        if (!p.changed) return\n+        /* Une op manuelle est une action explicite : on recharge pour que le graph reflète les\n+           refs qui ont bougé — commits récupérés (pull), marqueurs « à pusher » et position du\n+           ref distant (push), branches élaguées (fetch --prune) —, le badge « N nouveaux\n+           commits » (fetch seul) ne servant plus que d'accusé de réception. Un auto-fetch reste\n+           non intrusif — badge cliquable seul, pour qu'un fetch d'arrière-plan n'arrache jamais\n+           le scroll ni la sélection à l'utilisateur ; sans nouveau commit (élagage pur), il n'a\n+           même pas de badge à montrer et le graph attend le prochain rechargement. */\n+        if (!p.auto) {\n+          if (p.added > 0) s.showOp(messages.app.newCommits(p.added), \"primary\")\n           await s.resetAndLoad()\n         } else if (p.added > 0) {\n-          /* Un fetch manuel est une action explicite « montre-moi l'amont » : on recharge pour que\n-             les commits récupérés (et les marqueurs de sync) apparaissent, le badge ne servant plus\n-             que d'accusé de réception. Un auto-fetch reste non intrusif — badge cliquable seul, pour\n-             qu'un fetch d'arrière-plan n'arrache jamais le scroll ni la sélection à l'utilisateur. */\n-          if (!p.auto) {\n-            s.showOp(messages.app.newCommits(p.added), \"primary\")\n-            await s.resetAndLoad()\n-          } else {\n-            s.showOp(messages.app.newCommits(p.added), \"primary\", {\n-              label: messages.app.reload,\n-              run: () => {\n-                s.clearOp()\n-                void s.resetAndLoad()\n-              },\n-            })\n-          }\n+          s.showOp(messages.app.newCommits(p.added), \"primary\", {\n+            label: messages.app.reload,\n+            run: () => {\n+              s.clearOp()\n+              void s.resetAndLoad()\n+            },\n+          })\n         }\n       }),\n     [repoId, queryClient, store]\n","31926ada1c60dcfbe450772d8a6e4dee251d00a9 src/shared/types.ts":"diff --git a/src/shared/types.ts b/src/shared/types.ts\nindex 9c25d4b..45cca12 100644\n--- a/src/shared/types.ts\n+++ b/src/shared/types.ts\n@@ -269,7 +269,16 @@ export type OpName = \"fetch\" | \"pull\" | \"push\"\n    without the JSON detour that `shared/errors.ts` requires on the invoke side. */\n export type OpEvent = { id: number } & (\n   | { op: OpName; state: \"start\"; auto: boolean }\n-  | { op: OpName; state: \"done\"; auto: boolean; added: number }\n+  | {\n+      op: OpName\n+      state: \"done\"\n+      auto: boolean\n+      /** commits brought in by a fetch — feeds the \"N new commits\" badge (0 for pull/push) */\n+      added: number\n+      /** any ref tip moved (push updates the remote-tracking ref, `--prune` removes tips\n+          without adding a commit): the renderer's cue to reload the graph */\n+      changed: boolean\n+    }\n   | ({ op: OpName; state: \"error\"; auto: boolean } & ErrorPayload)\n )\n \n","d3cb784e529  delete succeeds,\n    so a rejected local delete never reaches the remote. */\n@@ -157,7 +157,7 @@ export async function deleteBranch(r: RepoHandle, name: string, deleteRemote: bo\n     groupTrace(r, `Delete ${name}`)\n     try {\n       const upstream = deleteRemote ? await upstreamOf(r, name) : null\n-      await r.git([\"branch\", \"-d\", name])\n+      await r.git([\"branch\", \"-D\", name])\n       if (upstream)\n         await r.git([\"push\", \"--progress\", upstream.remote, \"--delete\", upstream.merge], { timeout: OP_TIMEOUT })\n     } finally {\n","82875f3afdac1a4bb78af4accef1cb7fa81f290e src/renderer/src/features/graph/render/measure.ts":"diff --git a/src/renderer/src/features/graph/render/measure.ts b/src/renderer/src/features/graph/render/measure.ts\nindex 6263445..c85a67a 100644\n--- a/src/renderer/src/features/graph/render/measure.ts\n+++ b/src/renderer/src/features/graph/render/measure.ts\n@@ -120,7 +120,7 @@ export function createMeasurer(inner: HTMLDivElement) {\n \n   /** Clears every measured maximum and its source. The maxima are monotone *within* a repo\n       (a column never jumps around on scroll or pagination), but they must not survive a\n-      rebuild: after a checkout or `branch -d`, a column should give back the width a since-gone\n+      rebuild: after a checkout or `branch -D`, a column should give back the width a since-gone\n       decoration was holding rather than keep the historical maximum forever. */\n   function reset() {\n     seenType.clear()\n","82875f3afdac1a4bb78af4accef1cb7fa81f290e src/renderer/src/features/refs/delete-branch-dialog.tsx":"diff --git a/src/renderer/src/features/refs/delete-branch-dialog.tsx b/src/renderer/src/features/refs/delete-branch-dialog.tsx\nindex a8dea2b..fb8d30f 100644\n--- a/src/renderer/src/features/refs/delete-branch-dialog.tsx\n+++ b/src/renderer/src/features/refs/delete-branch-dialog.tsx\n@@ -1,7 +1,8 @@\n-/* Confirmation before deleting a branch. Git's `-d` still guards unmerged commits, ion (with the \"delete remote too\" option) rather than deleting outright. */}\n       <ContextMenuItem variant=\"destructive\" disabled={r.head} onClick={() => ctx.onDeleteBranch(r)}>\n         <HugeiconsIcon icon={Delete02Icon} strokeWidth={2} />\n-        <MenuItemWithCmd label={messages.refs.deleteBranch} cmd={`git branch -d ${r.name}`} />\n+        <MenuItemWithCmd label={messages.refs.deleteBranch} cmd={`git branch -D ${r.name}`} />\n       </ContextMenuItem>\n     </ContextMenuContent>\n   )\n","82875f3afdac1a4bb78af4accef1cb7fa81f290e src/renderer/src/features/repo/repo-store.tsx":"diff --git a/src/renderer/src/features/repo/repo-store.tsx b/src/renderer/src/features/repo/repo-store.tsx\nindex ea00a89..151a39a 100644\n--- a/src/renderer/src/features/repo/repo-store.tsx\n+++ b/src/renderer/src/features/repo/repo-store.tsx\n@@ -133,7 +133,7 @@ export interface RepoStoreState {\n   doCommit(): Promise<void>\n   runStash(action: StashAct, name?: string): Promise<void>\n   runBranch(action: BranchAct, name: string): Promise<void>\n-  /** `git branch -d`, plus the remote branch when `deleteRemote` — reloads and badges like the rest */\n+  /** `git branch -D`, plus the remote branch when `deleteRemote` — reloads and badges like the rest */\n   deleteBranch(name: string, deleteRemote: boolean): Promise<void>\n   checkout(name: string): Promise<void>\n   runWt(act: WtAct, paths: string[]): Promise<void>\n","82875f3afdac1a4bb78af4accef1cb7fa81f290e src/renderer/src/lib/git.ts":"diff --git a/src/renderer/src/lib/git.ts b/src/renderer/src/lib/git.ts\nindex a0ea3be..8ac06fc 100644\n--- a/src/renderer/src/lib/git.ts\n+++ b/src/renderer/src/lib/git.ts\n@@ -127,7 +127,7 @@ export type RepoApi = {\n   flowPublish(kind: FlowKind, name: string): Promise<void>\n   /** merge into HEAD, pull/push of a given branch, or `git flow <type> finish` */\n   branch(action: BranchAct, name: string): Promise<void>\n-  /** `git branch -d <name>`, plus the `push --delete` of its upstream when ng a commit's message and file tree.\" src=\"docs/graph-light.png\" />\n+</picture>\n+\n+<sub>Every screenshot in this README is Amont browsing <strong>Amont's own repository</strong> —\n+the very history that produced the app you're looking at. It's turtles all the way down.</sub>\n+\n </div>\n \n-Amont renders a repository's commit history as a metro-map-style graph: branches as\n-lanes, merges as curves, refs as chips. It's built for repositories with tens to hundreds\n-of thousands of commits — the graph engine pages and virtualizes both the layout and the\n-DOM instead of rendering everything up front.\n+## Highlights\n \n-![Amont's main window: the commit graph with branch lanes and ref chips, the branches sidebar, and the detail panel showing a commit's message and file tree.](docs/graph-light.png)\n+|                                                                                                                                                                                                                                                               |                                                                                                                                                                                                               |\n+| ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n+| 🚇 **A graph built for scale** — the layout and the DOM are both virtualized: only the visible window of commits is laid out and mounted, pages are fetched as you scroll and evicted when you leave. A 100,000-commit history scrolls like a 100-commit one. | 🎨 **Diffs that read like code** — syntax-highlighted by Shiki (the same grammars as VS Code), unified or side-by-side, per file or whole commit. Images get a real viewer instead of `Binary files differ`.  |\n+| 🧬 **Stage exactly what you mean** — stage, unstage or discard a file, a folder, a hunk, or a single line, straight from a live interactive diff. Amend included, live commit progress included.                                                              | 🧩 **Conflicts, resolved by clicking** — aligned A/B panes, take a whole side, one chunk, or one line at a time, **in the order you click**. Picks and hand edits coexist in an editable, highlighted output. |\n+| 🔍 **Full-text commit search** — message, author, hash prefix, and (optionally) diff content via git's pickaxe. Long-distance jumps land instantly, virtualization included.                                                                                  | 🌊 **git-flow, first-class** — feature/release/hotfix branches get a context banner, a tinted one-click finish, start/publish from their own menu, and a start-branch picker.                                 |\n+| 🌳 **Linked worktrees** — a sidebar section, graph chips and context menus make `git worktree` a one-click affair: create, open as a tab, reveal, or remove.                                                                                                  | ⚡ **Live operations** — fetch, pull and push stream their progress into a unified status feed; background auto-fetch (with `--prune`) keeps the graph fresh on a timer you control.                          |\n+| 🩺 **Repository maintenance** — one-click healthcheck: `fsck`, `gc`, object counts, and a sweep for stranded pack files and stale transfer temporaries.                                                                                                       | 🔎 **Nothing up its sleeve** — mutation buttons preview the exact git command they will run, and a read-only console traces every command the app executes.                                                   |\n+| ⌨️ **Keyboard-first** — the graph, file lists, sidebar, menus and popovers are all fully operable without a mouse.                                                                                                                                            | 🎛️ **Make it yours** — light/dark themes, English/French UI (switchable at runtime), custom branch-prefix colors, configurable diff highlighting.                                                             |\n+| 🔄 **Updates itself** — silent startup check against GitHub Releases, downloads in the background, installs on quit or on \"Restart now\".                                                                                                                      | 🔒 **Sandboxed by design** — the UI runs with the Chromium sandbox on and a strict CSP; only the main process touches git, your disk, or the network.                                                         |\n \n-## Built for big histories\n+## The tour\n \n-The graph above is a 25,000-commit repository — Amont scrolls it without loading it. Only\n-the visible window of commits is laid out and mounted; pages are fetched as you scroll,\n-evicted when you leave, and refetched on return, so a long-distance jump (search hit,\n-ref click) lands instantly. Branch lanes, merge curves, tags, and stash entries are all\n-folded into one timeline, and selecting a commit opens its full message, co-authors,\n-and changed files in the detail panel.\n+### Built for big histories\n \n-## Diffs that read like code\n+The graph below is a ~25,000-commit timeline — Amont scrolls it without loading it. Pages\n+are fetched on demand, evicted when you leave, and refetched on return, so a long jump\n+(search hit, ref click) lands instantly. Branch lanes, merge curves, tags, stashes and\n+ahead/behind divergence are folded into one timeline; commit subjects carry type badges\n+(`feat`, `fix`, `style`, …) so the shape of the work reads at a glance. Selecting a commit\n+opens its full message, co-authors and changed files in the detail panel.\n \n-Diffs are syntax-highlighted (Shiki, same grammars as VS Code) and render unified or\n-side-by-side, for a single file or a whole commit. The two panes scroll together.\n+<picture>\n+  <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/graph-light.png\" />\n+  <img alt=\"The commit graph and detail panel in the dark theme.\" src=\"docs/graph-dark.png\" />\n+</picture>\n \n-![A side-by-side, syntax-highlighted diff of a TypeScript file, with the commit's detail panel on the right.](docs/diff-light.png)\n+### Diffs that read like code\n \n-## Stage and commit without leaving the graph\n+Unified or side-by-side, one file or the whole commit — the two panes scroll together, and\n+Shiki highlights everything with the same grammars VS Code uses. Binary images render in a\n+proper viewer.\n \n-The `Uncommitted changes` row at the top of the graph opens the staging panel: stage or\n-unstage files (or everything at once), review each change in a live diff, and commit or\n-amend — with the exact git command shown on the button before you run it.\n+<picture>\n+  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/diff-dark.png\" />\n+  <img alt=\"A side-by-side, syntax-highlighted diff of a TypeScript file, with the commit's detail panel on the right.\" src=\"docs/diff-light.png\" />\n+</picture>\n+\n+### Stage exactly what you mean\n \n-![The staging panel: unstaged and staged file trees, a live side-by-side diff of a modified file, and a commit message box with the Commit button.](docs/worktree-light.png)\n+The `Uncommitted changes` row at the top of the graph opens the staging panel: stage or\n+unstage files, folders, hunks or single lines from a live split diff, review everything,\n+then commit or amend — with the exact git command shown on the button before you run it.\n \n-## Resolve merge conflicts side by side\n+<picture>\n+  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/worktree-dark.png\" />\n+  <img alt=\"The staging panel: staged and unstaged file trees, a live side-by-side diff with per-hunk stage/discard actions, and the commit message box.\" src=\"docs/worktree-light.png\" />\n+</picture>\n \n-When a merge, rebase, or stash pop leaves conflicts, the conflicted files get their own\n-block in the staging panel and a banner naming both sides — **A** is the branch you're on\n-(_ours_), **B** the one being merged in (_theirs_). Opening a file lays the two versions out\n-in aligned, syntax-highlighted panes so it's always clear which change came from where.\n+<sub>Inception checkpoint: the diff being staged up there is <em>this README rewrite</em>,\n+mid-flight, next to its freshly reshot screenshots.</sub>\n \n-You build the resolution by picking: a checkbox in each pane header takes a whole side across\n-every conflict, a per-chunk checkbox takes one side of one conflict, and per-line `+`/`−`\n-buttons take individual lines. Lines land in the merged output **in the order you click\n-them** — no forced A-before-B — and each carries its position so that order stays visible.\n-The output is a normal, syntax-highlighted editor: picks and hand edits coexist, so you can\n-fine-tune the result and still keep clicking. `Mark as resolved` writes the file and stages\n-it once no conflict markers remain.\n+### Merge conflicts, resolved on your terms\n \n-![The conflict resolution view: the \"ours\" (A) and \"theirs\" (B) versions of a file in two aligned, syntax-highlighted panes with per-side and per-line pickers, above an editable merged output.](docs/conflict-light.png)\n+When a merge, rebase or stash pop leaves conflicts, the conflicted files get their own\n+block in the staging panel and a banner naming both sides — **A** is the branch you're on\n+(_ours_), **B** the one being merged in (_theirs_). Opening a file lays the two versions\n+out in aligned, syntax-highlighted panes.\n \n-## And more\n+You build the resolution by picking: a checkbox per pane takes a whole side, a per-chunk\n+checkbox takes one side of one conflict, and per-line `+`/`−` buttons take individual\n+lines — landing in the merged output **in the order you click them**, no forced\n+A-before-B. The output is a normal, highlighted editor: picks and hand edits coexist.\n+`Mark as resolved` writes the file and stages it once no conflict markers remain.\n \n-- **git-flow aware** — feature/release/hotfix branches get a context banner and a\n-  one-click finish.\n-- **Full-text commit search** — message, author, hash, optionally diff content.\n-- **A read-only git console** — every command the app runs is traced, for transparency.\n-- **Keyboard-first** — the graph, file lists, and popovers are all operable without a\n-  mouse.\n-- **Light and dark** — follows the OS, or pick one. Here's the graph again, in dark:\n+<picture>\n+  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/conflict-dark.png\" />\n+  <img alt=\"The conflict resolution view: the 'ours' (A) and 'theirs' (B) versions of a file in two aligned, syntax-highlighted panes with per-side and per-line pickers, above an editable merged output.\" src=\"docs/conflict-light.png\" />\n+</picture>\n \n-![The commit graph and detail panel in the dark theme.](docs/graph-dark.png)\n+### About these screenshots\n \n-> Screenshots are taken from Amont's own repository, driven through the mock harness\n-> (`pnpm mock`, then `/screenshots.html`) — with a synthetic tail appended to its history\n-> so the graph still exercises virtualization at ~25k commits.\n+They're not mockups. Every capture is the real renderer, driven through the built-in mock\n+harness (`pnpm mock`, then `/screenshots.html`), whose dataset is a snapshot of **this\n+repository's actual git history** — commits, branches, tags, diffs and all — with a\n+synthetic tail spliced below the real root so the graph still exercises virtualization at\n+~25k commits. When the history moves, the screenshots are reshot from it.\n \n ## Install\n \n-Download the latest installer from the [Releases](https://github.com/ethylon/amont/releases)\n-page and run it. There's no auto-update yet — check the releases page for new versions.\n+**[Download the installer from the latest release](https://github.com/ethylon/amont/releases/latest)**\n+and run it. From then on, Amont keeps itself up to date: it checks GitHub Releases at\n+startup, downloads updates in the background, and installs on quit — or immediately, when\n+you click _Restart now_.\n \n-**Platform**: Windows only for 1.0. The codebase has no macOS/Linux packaging target or\n-platform-specific lifecycle handling (app menu, `activate`, etc.) yet.\n+**Platform.** Windows only for 1.0 — the codebase has no macOS/Linux packaging target or\n+platform-specific lifecycle handling (app menu, `activate`, …) yet.\n \n-**About the SmartScreen warning**: released binaries are not code-signed. Windows will\n-show an \"unknown publisher\" warning (SmartScreen) when you run the installer — this is\n-expected, not a sign of tampering. See [CONTRIBUTING.md](CONTRIBUTING.md) for the signing\n-plan.\n+**About the SmartScreen warning.** Released binaries are not code-signed yet, so Windows\n+shows an \"unknown publisher\" warning when you run the installer — expected, not a sign of\n+tampering. Update integrity meanwhile relies on HTTPS to GitHub plus the `sha512` in\n+`latest.yml`. See [CONTRIBUTING.md](CONTRIBUTING.md) for the signing plan.\n \n ## Privacy\n \n Author avatars resolve either from the author's email if it's a GitHub noreply address (no\n-network request), or by querying Gravatar / `avatars.githubusercontent.com` directly — which\n-reveals the (hashed) author email and your IP address to those services. An author without an\n-avatar there falls back to a colored monogram.\n+network request), or by querying Gravatar / `avatars.githubusercontent.c          The tail is never visible in a screenshot — every shot sits near HEAD. */
      const C = D.REAL
      const TAIL = 25000
      const th = (i) => String(i + 1).padStart(40, "0")
      const root = C[C.length - 1]
      root.p = [th(0)]
      for (let i = 0; i < TAIL; i++) {
        C.push({
          h: th(i),
          p: i === TAIL - 1 ? [] : [th(i + 1)],
          d: "2026-06-15",
          a: i % 4 ? "Mathieu Guey" : "Claude",
          e: i % 4 ? D.ME : "noreply@anthropic.com",
          r: "",
          s: `chore: history checkpoint ${TAIL - i}`,
        })
      }

      const REPO = { id: 1, path: "/amont", name: "amont" }
      const RECENTS = [{ path: "/amont", name: "amont" }]
      let nextRepoId = 2
      const onOpListeners = new Set()
      const onChangedListeners = new Set()
      const onTraceListeners = new Set()
      const onProgressListeners = new Set()
      const onUpdateListeners = new Set()
      window.__changed = (payload = { id: REPO.id }) => onChangedListeners.forEach((cb) => cb(payload))

      let wt = structuredClone(D.WT)
      const drop = (arr, paths) => arr.filter((f) => !paths.includes(f.path))
      let merging = true

      const genericDiff = (path) =>
        `diff --git a/${path} b/${path}\n--- a/${path}\n+++ b/${path}\n@@ -1,3 +1,3 @@\n-const value = 1\n+const value = 2\n `
      /* repo:diff/repo:wtdiff ship `{text, totalLines}` (cf. src/shared/diff.ts) */
      const diffText = (text) => ({ text, totalLines: text.split("\n").length })

      window.amont = {
        state: async () => ({ root: "/", recents: RECENTS, tabs: [REPO], active: REPO.id }),
        repos: async () => ({ root: "/", recents: RECENTS }),
        setTabs: async () => {},
        openDialog: async () => REPO,
        openPath: async () => REPO,
        close: async () => {},
        chooseRoot: async () => "/",
        scanRoot: async () => RECENTS,
        telemetryState: async () => ({ available: false, enabled: true }),
        setTelemetry: async () => {},
        /* mirrors the SETTINGS registry defaults (shared/settings.ts), like mock.html */
        getSettings: async () => ({ autoFetch: true, autoFetchIntervalMin: 5, prune: true }),
        setSettings: async () => {},
        chooseCreateDir: async () => "/projects",
        initRepo: async (_dir, name) => ({ id: nextRepoId++, path: `/projects/${name}`, name }),
        initBare: async (_dir, name) => `/projects/${name.endsWith(".git") ? name : name + ".git"}`,
        cloneRepo: async (_dir, _url, name) => ({ id: nextRepoId++, path: `/projects/${name}`, name }),
        log: async (_id, skip, count) => C.slice(skip, skip + count),
        total: async () => C.length,
        refs: async () => D.REFS,
        stashes: async () => [],
        stash: async () => {},
        files: async (_id, hash) => D.FILES[hash] ?? [{ st: "M", path: "src/renderer/src/app.tsx", old: null }],
        diff: async (_id, hash, _parent, path) => diffText(D.DIFFS[hash + " " + path] ?? genericDiff(path)),
        status: async () => ({ branch: "master", head: D.REFS.find((r) => r.name === "master").tip, ahead: 0, behind: 0 }),
        body: async (_id, hash) => D.BODIES[hash] ?? "",
        op: async () => {},
        onOp: (cb) => { onOpListeners.add(cb); return () => onOpListeners.delete(cb) },
        onChanged: (cb) => { onChangedListeners.add(cb); return () => onChangedListeners.delete(cb) },
        onTrace: (cb) => { onTraceListeners.add(cb); return () => onTraceListeners.delete(cb) },
        onUpdate: (cb) => { onUpdateListeners.add(cb); return () => onUpdateListeners.delete(cb) },
        checkForUpdates: async () => {},
        installUpdate: async () => {},
        search: async () => [],
        flow: async () => null,
        branch: async () => {},
        checkout: async () => {},
        worktree: async () => structuredClone(wt),
        wtdiff: async (_id, p) => diffText(D.WTDIFF[p] ?? genericDiff(p)),
        stage: async (_id, paths) => {
          const moved = [...wt.unstaged, ...wt.untracked].filter((f) => paths.includes(f.path))
          wt.unstaged = drop(wt.unstaged, paths)
          wt.untracked = drop(wt.untracked, paths)
          wt.staged.push(...moved.map((f) => ({ st: f.st === "?" ? "A" : f.st, path: f.path, old: null })))
        },
        unstage: async (_id, paths) => {
          const moved = wt.staged.filter((f) => paths.includes(f.path))
          wt.staged = drop(wt.staged, paths)
          wt.unstaged.push(...moved.map((f) => ({ st: "M", path: f.path })))
        },
        commit: async () => { wt.staged = []; merging = false },
        headMessage: async () => {
          const head = C.find((c) => c.r.includes("HEAD ->"))
          return { subject: head?.s ?? "", body: (head && D.BODIES[head.h]) || "" }
        },
        branchDelete: async () => {},
        mergeState: async () => ({
          merging,
          ours: merging ? "master" : null,
          theirs: merging ? "feat/phase-6a-a11y" : null,
        }),
        conflict: async (_id, path) =>
          structuredClone(D.CONFLICTS[path] ?? { base: null, ours: null, theirs: null, merged: "" }),
        resolve: async (_id, path, content) => {
          D.CONFLICTS[path] = { ...D.CONFLICTS[path], merged: content }
          wt.conflicts = drop(wt.conflicts, [path])
          wt.staged.push({ st: "M", path, old: null })
        },
        mergeAbort: async () => { merging = false; wt.conflicts = [] },
        onProgress: (cb) => { onProgressListeners.add(cb); return () => onProgressListeners.delete(cb) },
        worktrees: async () => [],
        worktreeAct: async () => {},
        worktreeAdd: async (_id, branch) => ({ id: nextRepoId++, path: "/amont-worktrees/" + branch.split("/").pop(), name: branch.split("/").pop() }),
        worktreeOpen: async (_id, path) => ({ id: nextRepoId++, path, name: path.split("/").pop() }),
        worktreeReveal: async () => {},
        applyPatch: async () => {},
        discard: async (_id, paths, untracked) => { wt.unstaged = drop(wt.unstaged, paths); wt.untracked = drop(wt.untracked, untracked) },
        discardPatch: async () => {},
        blob: async () => ({ size: 68, bytes: Uint8Array.from(atob("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="), (c) => c.charCodeAt(0)) }),
        flowInfo: async () => null,
        flowInit: async () => null,
        flowStart: async () => {},
        flowPublish: async () => {},
        countObjects: async () => ({ count: 0, size: "0 bytes", inPack: 4200, packs: 1, sizePack: "18.20 MiB", prunePackable: 0, garbage: 0, sizeGarbage: "0 bytes" }),
        fsck: async () => {},
        gc: async () => {},
        fileIcon: async () => null,
        openFile: async () => "",
        cancel: async () => {},
      }

      await import("./src/main.tsx")
    </script>
  </body>
</html>
