      /* Verification harness: mounts the real renderer with a simulated git API.
     window.amont must exist before the import — lib/git.ts captures it on load. */
      /* `r` follows the `%D --decorate=full` format. Cases the row rendering must hold up to:
     branch + its remote + origin/HEAD (a single chip), orphan remote, too many tags, lone tag. */
      /* `users.noreply.github.com` address: avatar derived from the id, no API call needed */
      const ME = "1+octocat@users.noreply.github.com"
      /* Full SHAs (fix B1, AUDIT.md §2/§6): the main process no longer truncates to 8 characters, so
     the harness needs to stay representative. The short seeds below stay readable in this file —
     `sha()` extends them to 40 hex characters, the only form the renderer now accepts. */
      const sha = (s) => s.repeat(Math.ceil(40 / s.length)).slice(0, 40)
      /* repo:diff/repo:wtdiff ship `{text, totalLines}` (truncated main-side past
     DIFF_MAX_LINES, cf. src/shared/diff.ts) — the mock diffs are tiny, so total == shipped */
      const diffText = (text) => ({ text, totalLines: text.split("\n").length })
      /* A stash arrives from the log in its raw form: the entry commit (3 parents) followed by its
     plumbing — index, untracked — that the renderer has to fold back up (cf. foldStashes). */

        {
          h: sha("ee01aa02"),
          p: [sha("a1b2c3d4"), sha("ee02bb03"), sha("ee03cc04")],
          d: "2026-07-08",

        /* Diverged develop: three local commits (ahead, to push) and two remote-only ones under

        {
          h: sha("dd01aa11"),
          p: [sha("dd015555")],
          d: "2026-07-09",
          a: "Grace Hopper",
          e: ME,

      const TAIL = 25_000
      const th = (i) => sha(String(TAIL - i).padStart(8, "0")) // valid hex: digits only

          p: i === TAIL - 1 ? [] : [th(i + 1)],
          d: "2026-07-04",
          a: i % 3 ? "Grace Hopper" : "Ada Lovelace",
          e: i % 3 ? ME : "ada@analytical.engine",
          r: "",
          s: `chore: iteration ${TAIL - i}`,
        })
      }

      /* message body: description + co-authors, description only, none.
     None of the three co-authors has a Gravatar: they all fall back to their monogram
     (network avatars are off by default anyway, cf. lib/avatar). */
      const BODIES_SEED = {
        "5a6b7c8d":
          "The simplex was restarting from the trivial basis on every pricing iteration.\nThe basis is now kept between two solves: -40% on sparse matrices.\n\nCo-authored-by: Ada Lovelace <ada@analytical.engine>\nCo-authored-by: Alan Turing <alan@bletchley.uk>\nCo-authored-by: Claude <noreply@anthropic.com>\n",

          "A matrix with no rows passed validation and caused a division by zero\nin the lower-bound computation.\n",
      }
      const BODIES = Object.fromEntries(Object.entries(BODIES_SEED).map(([h, v]) => [sha(h), v]))

      let wt = {
        staged: [
          { st: "A", path: "src/solver/cost.ts", old: null },
          { st: "M", path: "src/solver/pricing.ts", old: null },
        ],
        unstaged: [
          { st: "M", path: "src/solver/constraints.ts" },
          { st: "D", path: "src/legacy/old.ts" },
        ],
        untracked: [
          { st: "?", path: "notes/todo.md" },
          { st: "?", path: "assets/fresh.svg" },
        ],
        conflicts: [
          { st: "UU", path: "src/solver/threshold.ts" },
          { st: "AA", path: "src/solver/params.ts" },
        ],
      }
      const drop = (arr, paths) => arr.filter((f) => !paths.includes(f.path))

      /* Working-tree diffs with real hunks for the partial-staging view. Each hunk is the
         array of its lines (header first); applyPatch moves whole hunks between the two
         sides, matched by their old-side start — a line-level patch moves its whole hunk,
         enough fidelity for the UI harness. Paths without an entry keep the generic stub. */
      const WT_DIFFS = {
        "src/solver/constraints.ts": {
          header: [
            "diff --git a/src/solver/constraints.ts b/src/solver/constraints.ts",
            "index 1111111..2222222 100644",
            "--- a/src/solver/constraints.ts",
            "+++ b/src/solver/constraints.ts",
          ],
          unstaged: [
            [
              "@@ -1,5 +1,5 @@",
              ' import { Matrix } from "./matrix"',
              " ",
              "-const MAX_ITER = 100",
              "+const MAX_ITER = 250",
              " const EPS = 1e-9",
              " ",
            ],
            [
              "@@ -12,6 +12,7 @@ export function normalize(m) {",
              " export function addRow(m, row) {",
              '   if (!row.length) throw new Error("empty row")',
              '+  if (row.some(Number.isNaN)) throw new Error("NaN in row")',
              "   m.rows.push(row)",
              "-  m.dirty = true",
              "+  m.dirty = m.rows.length > 1",
              "   return m",
              " }",
            ],
          ],
          staged: [],
        },
        "src/solver/pricing.ts": {
          header: [
            "diff --git a/src/solver/pricing.ts b/src/solver/pricing.ts",
            "index 3333333..4444444 100644",
            "--- a/src/solver/pricing.ts",
            "+++ b/src/solver/pricing.ts",
          ],
          unstaged: [],
          staged: [
            [
              "@@ -3,4 +3,5 @@",
              " export function price(basis) {",
              "-  return basis.cost",
              "+  const devex = basis.weights ?? 1",
              "+  return basis.cost * devex",
              " }",
              " ",
            ],
          ],
        },
      }
      const oldStartOf = (hunk) => Number(/^@@ -(\d+)/.exec(hunk[0])[1])
      /* re-derives the file's presence in each list from its remaining hunks */
      const syncWtLists = (path, entry) => {
        wt.unstaged = drop(wt.unstaged, [path])
        wt.staged = drop(wt.staged, [path])
        if (entry.unstaged.length) wt.unstaged.push({ st: "M", path })
        if (entry.staged.length) wt.staged.push({ st: "M", path, old: null })
      }
      /* MERGE_HEAD outlives the last resolved file (until commit or abort), like real git */
      let merging = true

      /* Simulated merge in progress: feature/cost-optim (B/theirs) into develop (A/ours).
     threshold.ts is a both-modified (UU) with two blocks — the first diff3-style, to
     exercise the base-section skip — params.ts a both-added (AA): no base stage. */
      const CONFLICTS = {
        "src/solver/threshold.ts": {
          base: "export const EPSILON = 1e-6\nexport const THRESHOLD = 0.5\n\nexport function clamp(x) {\n  return Math.max(0, Math.min(1, x))\n}\n",
          ours: "export const EPSILON = 1e-6\nexport const THRESHOLD = 0.75 // calibrated on the sparse suite\n\nexport function clamp(x) {\n  return Math.max(0, Math.min(1, x))\n}\n",
          theirs:
            "export const EPSILON = 1e-9\nexport const THRESHOLD = 0.6 // aligned with the cost model\n\nexport function clamp(x) {\n  return Math.max(0, Math.min(1, x))\n}\n",
          merged: [
            "<<<<<<< HEAD",
            "export const EPSILON = 1e-6",
            "||||||| a1b2c3d",
            "export const EPSILON = 1e-6 // (base)",
            "=======",
            "export const EPSILON = 1e-9",
            ">>>>>>> feature/cost-optim",
            "<<<<<<< HEAD",
            "export const THRESHOLD = 0.75 // calibrated on the sparse suite",
            "=======",
            "export const THRESHOLD = 0.6 // aligned with the cost model",
            ">>>>>>> feature/cost-optim",
            "",
            "export function clamp(x) {",
            "  return Math.max(0, Math.min(1, x))",
            "}",
            "",
          ].join("\n"),
        },
        "src/solver/params.ts": {
          base: null,
          ours: "export const PARAMS = { warmStart: true }\n",
          theirs: "export const PARAMS = { pricing: 'devex' }\n",
          merged: [
            "<<<<<<< HEAD",
            "export const PARAMS = { warmStart: true }",
            "=======",
            "export const PARAMS = { pricing: 'devex' }",
            ">>>>>>> feature/cost-optim",
            "",
          ].join("\n"),
        },
      }

      const REPO = { id: 1, path: "/mock/mock-repo", name: "mock-repo" }
      const RECENTS = [{ path: "/mock/mock-repo", name: "mock-repo" }]
      let nextRepoId = 2

      /* Linked worktrees: the main one (this tab), a live one on feature/cost-optim (chip in
         the graph + sidebar row), and a stale detached entry (prune path). */
      let worktrees = [
        {
          path: "/mock/mock-repo",
          head: sha("a1b2c3d4"),
          branch: "develop",
          main: true,
          current: true,
          locked: false,
          prunable: false,
        },
        {
          path: "/mock/mock-repo-worktrees/cost-optim",
          head: sha("5a6b7c8d"),
          branch: "feature/cost-optim",
          main: false,
          current: false,
          locked: false,
          prunable: false,
        },
        {
          path: "/mock/mock-repo-worktrees/spike",
          head: sha("4d5e6f70"),
          branch: null,
          main: false,
          current: false,
          locked: false,
          prunable: true,
        },
      ]

      /* One set of listeners per event channel, like the real preload (cf. onOp/onChanged/onTrace
     below). `window.__changed` can still be triggered by hand from the console to simulate a
     `.git` change (checkout/commit done outside the app): it notifies every current subscriber. */
      const onOpListeners = new Set()
      const onChangedListeners = new Set()
      const onTraceListeners = new Set()
      const onProgressListeners = new Set()
      const onUpdateListeners = new Set()
      window.__changed = (payload = { id: REPO.id }) => onChangedListeners.forEach((cb) => cb(payload))
      window.__update = (payload) => onUpdateListeners.forEach((cb) => cb(payload))

      /* Git-flow + HEAD are mutable so the Repository menu can be driven through its states.
         From the console: __setFlow(null) shows "Initialize Git Flow…"; __setBranch("feature/x")
         puts HEAD on a flow branch (promoted Finish/Publish + the flow banner). */
      let flowPrefixes = { feature: "feature/", bugfix: "bugfix/", release: "release/", hotfix: "hotfix/" }
      let currentBranch = "develop"
      /* object-DB shape; the initial `garbage: 1` trips the status-bar healthcheck until a gc runs */
      let counts = {
        count: 128,
        size: "512.00 KiB",
        inPack: 3400,
        packs: 2,
        sizePack: "12.40 MiB",
        prunePackable: 0,
        garbage: 1,
        sizeGarbage: "8.00 KiB",
      }
      window.__setFlow = (p = flowPrefixes) => {
        flowPrefixes = p
        window.__changed()
      }
      window.__setBranch = (b) => {
        currentBranch = b
        window.__changed()
      }

      /* fsck/gc: stream a few determinate progress ticks then resolve, like the real ops. */
      const emitProgress = (op, percent) => onProgressListeners.forEach((cb) => cb({ id: REPO.id, op, percent }))
      const simulateMaint = async (op) => {
        for (const pct of [8, 26, 52, 78, 100]) {
          emitProgress(op, pct)
          await new Promise((r) => setTimeout(r, 260))
        }
      }

      const REFS = [
        { name: "develop", kind: "head", head: true, ahead: 2, behind: 2, tip: sha("dd01aa11") },
        { name: "feature/cost-optim", kind: "head", head: false, ahead: 0, behind: 0, tip: sha("5a6b7c8d") },
        { name: "feature/ui/graph", kind: "head", head: false, ahead: 0, behind: 0, tip: sha("7e8f9a0b") },
        { name: "hotfix/empty-matrix", kind: "head", head: false, ahead: 0, behind: 1, tip: sha("9f8e7d6c") },
        { name: "master", kind: "head", head: false, ahead: 0, behind: 0, tip: sha("9f8e7d6c") },
        { name: "origin/develop", kind: "remote", head: false, ahead: 0, behind: 0, tip: sha("cc01aa11") },
        { name: "origin/master", kind: "remote", head: false, ahead: 0, behind: 0, tip: sha("9f8e7d6c") },
        { name: "origin/release/4.2", kind: "remote", head: false, ahead: 0, behind: 0, tip: sha("5a6b7c8d") },
        { name: "v4.1.3", kind: "tag", head: false, ahead: 0, behind: 0, tip: sha("4d5e6f70") },

      ]

      /* mirrors the SETTINGS registry defaults (shared/settings.ts) */
      const MOCK_SETTINGS = { autoFetch: true, autoFetchIntervalMin: 5, prune: true }

      window.amont = {
        state: async () => ({ root: "/mock", recents: RECENTS, tabs: [REPO], active: REPO.id }),
        repos: async () => ({ root: "/mock", recents: RECENTS }),
        setTabs: async () => {},

        setSettings: async (patch) => {

           ignores the id, so a created/cloned tab renders the same dataset as mock-repo */

        initRepo: async (_dir, name) => ({ id: nextRepoId++, path: `/mock/projects/${name}`, name }),
        initBare: async (_dir, name) => `/mock/projects/${name.endsWith(".git") ? name : name + ".git"}`,
        cloneRepo: async (_dir, _url, name) => ({ id: nextRepoId++, path: `/mock/projects/${name}`, name }),
        log: async (_id, skip, count) => C.slice(skip, skip + count),
        total: async () => C.length - 2, // minus the stash plumbing, same as repo:total
        refs: async () => REFS,
        stashes: async () => [
          {
            name: "stash@{0}",
            h: sha("ee01aa02"),
            p: [sha("a1b2c3d4"), sha("ee02bb03"), sha("ee03cc04")],
            d: "2026-07-08",
            a: "Grace Hopper",
            e: ME,
            s: "On develop: solver threshold calibration",
          },
        ],
        stash: async () => {},
        files: async () => [
          { st: "M", path: "src/solver/cost.ts", old: null },
          { st: "A", path: "src/solver/lp/simplex.ts", old: null },
          { st: "D", path: "src/legacy/old.ts", old: null },
          { st: "M", path: "assets/banner.svg", old: null },
          { st: "A", path: "assets/pixel.png", old: null },
        ],
        diff: async () =>
          diffText("diff --git a/x.ts b/x.ts\n--- a/x.ts\n+++ b/x.ts\n@@ -1 +1 @@\n-const a = 1\n+const a = 2\n"),
        /* Image preview (repo:blob): svg bytes colored by the requested rev so before/after
           differ; a real 1×1 red PNG proves the raster mime path. Raw bytes (Uint8Array), like
           the real bridge after the base64 → binary IPC change. */
        blob: async (_id, path, ref) => {
          if (/\.png$/i.test(path))
            return {
              size: 68,
              bytes: Uint8Array.from(
                atob(
                  "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="
                ),
                (c) => c.charCodeAt(0)
              ),
            }
          const key = ref.kind === "commit" ? ref.rev : ref.kind
          const hues = ["#e11d48", "#16a34a", "#2563eb", "#d97706", "#9333ea"]
          const fill = hues[[...key].reduce((a, c) => a + c.charCodeAt(0), 0) % hues.length]
          const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="100"><rect width="160" height="100" fill="${fill}"/><text x="80" y="56" font-size="13" fill="#fff" text-anchor="middle">${path.split("/").pop()}</text></svg>`
          return { size: svg.length, bytes: new TextEncoder().encode(svg) }
        },
        status: async () => ({ branch: currentBranch, head: sha("dd01aa11"), ahead: 2, behind: 2 }),
        body: async (_id, hash) => BODIES[hash] ?? "",
        op: async () => {},
        /* The real bridge returns an unsubscribe function per call (ipcRenderer.off, cf.
       src/preload): one set of listeners per channel rather than a single callback, to stay
       faithful to the real shape even though the harness only ever mounts one tab at a time. */
        onOp: (cb) => {
          onOpListeners.add(cb)
          return () => onOpListeners.delete(cb)
        },
        onChanged: (cb) => {
          onChangedListeners.add(cb)
          return () => onChangedListeners.delete(cb)
        },
        onTrace: (cb) => {
          onTraceListeners.add(cb)
          return () => onTraceListeners.delete(cb)
        },
        onProgress: (cb) => {
          onProgressListeners.add(cb)
          return () => onProgressListeners.delete(cb)
        },
        /* auto-update: window.__update({origin:"manual",kind:"ready",version:"9.9.9"}) drives
           the card by hand from the console */
        onUpdate: (cb) => {
          onUpdateListeners.add(cb)
          return () => onUpdateListeners.delete(cb)
        },
        checkForUpdates: async () => onUpdateListeners.forEach((cb) => cb({ origin: "manual", kind: "unavailable" })),
        installUpdate: async () => {},
        search: async () => [],
        flow: async () => flowPrefixes,
        flowInfo: async (_id, branch, kind) => {
          const tagged = kind === "release" || kind === "hotfix"
          return {
            commits: 3,
            startedAt: Math.floor(Date.now() / 1000) - 7200,
            base: tagged ? "v4.2.0" : "develop",
            targets: tagged ? ["master", "develop"] : ["develop"],
            nextTag: kind === "release" ? "v4.3.0" : kind === "hotfix" ? "v4.2.1" : null,
            /* no remote-tracking branch yet → Publish is offered */
            unpushed: true,
          }
        },
        flowInit: async (_id, cfg) => {
          flowPrefixes = { feature: cfg.feature, bugfix: cfg.bugfix, release: cfg.release, hotfix: cfg.hotfix }
          return flowPrefixes
        },
        flowStart: async (_id, kind, name) => {
          currentBranch = (flowPrefixes[kind] || `${kind}/`) + name
        },
        flowPublish: async () => {},
        countObjects: async () => counts,
        fsck: async () => {
          await simulateMaint("fsck")
        },
        gc: async () => {
          await simulateMaint("gc")
          /* a real gc repacks the loose objects and prunes the garbage: the healthcheck hint
             clears and the (still-open) stats modal refreshes to the compacted numbers */
          counts = {
            ...counts,
            count: 0,
            size: "0 bytes",
            packs: 1,
            prunePackable: 0,
            garbage: 0,
            sizeGarbage: "0 bytes",
          }
        },
        branch: async () => {},
        checkout: async () => {},
        worktrees: async () => structuredClone(worktrees),
        worktreeAct: async (_id, action, path) => {
          worktrees =
            action === "prune" ? worktrees.filter((w) => !w.prunable) : worktrees.filter((w) => w.path !== path)
        },
        worktreeAdd: async (_id, branch) => {
          const name = branch.split("/").pop()
          const path = `/mock/mock-repo-worktrees/${name}`
          const tip = REFS.find((r) => r.kind === "head" && r.name === branch)?.tip ?? sha("a1b2c3d4")
          worktrees.push({ path, head: tip, branch, main: false, current: false, locked: false, prunable: false })
          return { id: nextRepoId++, path, name }
        },
        worktreeOpen: async (_id, path) => ({ id: nextRepoId++, path, name: path.split("/").pop() }),
        worktreeReveal: async () => {},
        worktree: async () => structuredClone(wt),
        wtdiff: async (_id, p, source) => {
          const entry = WT_DIFFS[p]
          if (!entry) return diffText(`diff --git a/${p} b/${p}\n--- a/${p}\n+++ b/${p}\n@@ -1 +1 @@\n-old\n+new\n`)
          const hunks = entry[source] ?? []
          return diffText(hunks.length ? [...entry.header, ...hunks.flat(), ""].join("\n") : "")
        },
        applyPatch: async (_id, patch, reverse) => {
          const path = /^diff --git a\/(.+) b\//m.exec(patch)?.[1]
          const entry = WT_DIFFS[path]
          if (!entry) return
          const from = reverse ? "staged" : "unstaged"
          const to = reverse ? "unstaged" : "staged"
          const starts = [...patch.matchAll(/^@@ -(\d+)/gm)].map((m) => Number(m[1]))
          const moved = entry[from].filter((h) => starts.includes(oldStartOf(h)))
          entry[from] = entry[from].filter((h) => !moved.includes(h))
          entry[to].push(...moved)
          entry[to].sort((a, b) => oldStartOf(a) - oldStartOf(b))
          syncWtLists(path, entry)
        },
        discard: async (_id, paths, untracked) => {
          wt.unstaged = drop(wt.unstaged, paths)
          wt.untracked = drop(wt.untracked, untracked)
          for (const p of paths) {
            const entry = WT_DIFFS[p]
            if (entry) {
              entry.unstaged = []
              syncWtLists(p, entry)
            }
          }
        },
        /* removes the matched hunks from the unstaged side — same matching as applyPatch,
           but the change vanishes instead of moving to the index */
        discardPatch: async (_id, patch) => {
          const path = /^diff --git a\/(.+) b\//m.exec(patch)?.[1]
          const entry = WT_DIFFS[path]
          if (!entry) return
          const starts = [...patch.matchAll(/^@@ -(\d+)/gm)].map((m) => Number(m[1]))
          entry.unstaged = entry.unstaged.filter((h) => !starts.includes(oldStartOf(h)))
          syncWtLists(path, entry)
        },
        stage: async (_id, paths) => {
          const moved = [...wt.unstaged, ...wt.untracked].filter((f) => paths.includes(f.path))
          wt.unstaged = drop(wt.unstaged, paths)
          wt.untracked = drop(wt.untracked, paths)
          wt.staged.push(...moved.map((f) => ({ st: f.st === "?" ? "A" : f.st, path: f.path, old: null })))
          for (const p of paths) {
            const entry = WT_DIFFS[p]
            if (entry) entry.staged.push(...entry.unstaged.splice(0))
          }
        },
        unstage: async (_id, paths) => {
          const moved = wt.staged.filter((f) => paths.includes(f.path))
          wt.staged = drop(wt.staged, paths)
          wt.unstaged.push(...moved.map((f) => ({ st: "M", path: f.path })))
          for (const p of paths) {
            const entry = WT_DIFFS[p]
            if (entry) entry.unstaged.push(...entry.staged.splice(0))
          }
        },
        commit: async () => {
          wt.staged = []
          merging = false
        },
        mergeState: async () => ({
          merging,
          ours: merging ? "develop" : null,
          theirs: merging ? "feature/cost-optim" : null,
        }),
        conflict: async (_id, path) =>
          structuredClone(CONFLICTS[path] ?? { base: null, ours: null, theirs: null, merged: "" }),
        resolve: async (_id, path, content) => {
          CONFLICTS[path] = { ...CONFLICTS[path], merged: content }
          wt.conflicts = drop(wt.conflicts, [path])
          wt.staged.push({ st: "M", path, old: null })
        },
        mergeAbort: async () => {
          merging = false
          wt.conflicts = []
        },
        fileIcon: async () => null,
        openFile: async () => "",
        cancel: async () => {},
      }

      await import("./src/main.tsx")
    </script>
  </body>
