<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>git-graph — mock</title>
</head>
<body>
<div id="root"></div>
<script type="module">
  /* Harnais de vérification : monte le vrai renderer avec une API git simulée.
     window.gitgraph doit exister avant l'import — lib/git.ts le capture au chargement. */
  /* `r` est au format `%D --decorate=full`. Les cas que la ligne doit tenir :
     branche + son remote + origin/HEAD (un seul chip), remote orphelin, tags en surnombre, tag isolé. */
  /* adresse `users.noreply.github.com` : avatar déduit de l'id, sans requête d'API */
  const ME = '17126477+ethylon@users.noreply.github.com';
  const C = [
    { h: 'a1b2c3d4', p: ['9f8e7d6c', '5a6b7c8d'], d: '2026-07-07', a: 'Mathieu Guey', e: ME, r: 'HEAD -> refs/heads/develop, refs/remotes/origin/develop, refs/remotes/origin/HEAD', s: "Merge branch 'feature/optim-cout' into develop" },
    { h: '5a6b7c8d', p: ['9f8e7d6c'], d: '2026-07-07', a: 'Ada Lovelace', e: 'ada@analytical.engine', r: 'refs/remotes/origin/release/4.2', s: 'feat(solver): optimisation du coût de formulation' },
    { h: '9f8e7d6c', p: ['7e8f9a0b'], d: '2026-07-06', a: 'Mathieu Guey', e: ME, r: 'refs/heads/master, refs/heads/hotfix/matrice-vide, refs/heads/release/4.3, refs/remotes/origin/master, tag: refs/tags/v4.3.0', s: '[HOTFIX] plantage sur matrice vide' },
    { h: '7e8f9a0b', p: ['2b3c4d5e'], d: '2026-07-06', a: 'Mathieu Guey', e: ME, r: 'tag: refs/tags/reflection/v3.0.1, tag: refs/tags/maths/v2.1.0, tag: refs/tags/helpers/v5.5.0, tag: refs/tags/extensions/v3.3.0, tag: refs/tags/exceptions/v1.0.0, tag: refs/tags/collections/v3.0.1', s: 'feat: per-package CI/CD triggers + MinVer versioning' },
    { h: '2b3c4d5e', p: ['4d5e6f70'], d: '2026-07-05', a: 'Mathieu Guey', e: ME, r: 'tag: refs/tags/holidays/v1.0.0, tag: refs/tags/helpers/v5.9.0', s: 'Helpers v5.9.0: Holidays France & Mexique (Holidays v1.0.0)' },
    { h: '4d5e6f70', p: ['3c4d5e6f'], d: '2026-07-05', a: 'Mathieu Guey', e: ME, r: '', s: '[BACKUP] WIP 2026-07-05 18:42' },
    { h: '3c4d5e6f', p: [], d: '2026-07-05', a: 'Mathieu Guey', e: ME, r: 'tag: refs/tags/v4.2.0', s: 'chore: init' },
  ];

  /* Le bridge hache en synchrone (Node, côté preload) ; le navigateur ne sait le faire qu'en
     asynchrone. Les e-mails du mock sont donc préhachés, le reste retourne un hash vide → 404. */
  const sha = async (t) => [...new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t)))]
    .map(b => b.toString(16).padStart(2, '0')).join('');
  const HASHES = new Map(await Promise.all(
    ['ada@analytical.engine', 'alan@bletchley.uk'].map(async e => [e, await sha(e)])));

  /* corps de message : description + co-auteurs, description seule, rien.
     Les deux premiers co-auteurs n'ont pas de Gravatar et retombent sur leur monogramme ;
     le troisième signe sous l'adresse d'un compte GitHub connu (cf. `KNOWN` dans lib/avatar). */
  const BODIES = {
    '5a6b7c8d': 'Le simplexe repartait de la base triviale à chaque itération de prix.\nOn conserve la base entre deux résolutions : -40% sur les matrices creuses.\n\nCo-authored-by: Ada Lovelace <ada@analytical.engine>\nCo-authored-by: Alan Turing <alan@bletchley.uk>\nCo-authored-by: Claude <noreply@anthropic.com>\n',
    '9f8e7d6c': 'Une matrice sans ligne passait la validation et faisait diviser par zéro\nle calcul de la borne inférieure.\n',
  };

  let wt = {
    staged: [{ st: 'A', path: 'src/solver/cost.ts', old: null }],
    unstaged: [{ st: 'M', path: 'src/solver/constraints.ts' }, { st: 'D', path: 'src/legacy/old.ts' }],
    untracked: [{ st: '?', path: 'notes/todo.md' }],
    conflicts: [],
  };
  const drop = (arr, paths) => arr.filter(f => !paths.includes(f.path));

  const REPO = { id: 1, path: '/mock/mock-repo', name: 'mock-repo' };
  const RECENTS = [{ path: '/mock/mock-repo', name: 'mock-repo' }];

  const REFS = [
    { name: 'develop', kind: 'head', head: true, ahead: 2, behind: 0 },
    { name: 'feature/optim-cout', kind: 'head', head: false, ahead: 0, behind: 0 },
    { name: 'feature/ui/graph', kind: 'head', head: false, ahead: 0, behind: 0 },
    { name: 'hotfix/matrice-vide', kind: 'head', head: false, ahead: 0, behind: 1 },
    { name: 'master', kind: 'head', head: false, ahead: 0, behind: 0 },
    { name: 'origin/develop', kind: 'remote', head: false, ahead: 0, behind: 0 },
    { name: 'origin/master', kind: 'remote', head: false, ahead: 0, behind: 0 },
    { name: 'origin/release/4.2', kind: 'remote', head: false, ahead: 0, behind: 0 },
    { name: 'v4.1.3', kind: 'tag', head: false, ahead: 0, behind: 0 },
    { name: 'v4.2.0', kind: 'tag', head: false, ahead: 0, behind: 0 },
  ];

  window.gitgraph = {
    sha256: (text) => HASHES.get(text) ?? '',
    state: async () => ({ root: '/mock', recents: RECENTS, tabs: [REPO], active: REPO.id }),
    repos: async () => ({ root: '/mock', recents: RECENTS }),
    setTabs: async () => {},
    openDialog: async () => REPO,
    openPath: async () => REPO,
    close: async () => {},
    chooseRoot: async () => '/mock',
    scanRoot: async () => RECENTS,
    log: async (_id, skip, count) => C.slice(skip, skip + count),
    total: async () => C.length,
    refs: async () => REFS,
    files: async () => [
      { st: 'M', path: 'src/solver/cost.ts', old: null },
      { st: 'A', path: 'src/solver/lp/simplex.ts', old: null },
      { st: 'D', path: 'src/legacy/old.ts', old: null },
    ],
    diff: async () => 'diff --git a/x.ts b/x.ts\n--- a/x.ts\n+++ b/x.ts\n@@ -1 +1 @@\n-const a = 1\n+const a = 2\n',
    status: async () => ({ branch: 'develop', head: C[0].h, ahead: 1, behind: 2 }),
    body: async (_id, hash) => BODIES[hash] ?? '',
    op: async () => {},
    onOp: () => {},
    onChanged: () => {},
    worktree: async () => structuredClone(wt),
    wtdiff: async (_id, p) => `diff --git a/${p} b/${p}\n--- a/${p}\n+++ b/${p}\n@@ -1 +1 @@\n-old\n+new\n`,
    stage: async (_id, paths) => {
      const moved = [...wt.unstaged, ...wt.untracked].filter(f => paths.includes(f.path));
      wt.unstaged = drop(wt.unstaged, paths);
      wt.untracked = drop(wt.untracked, paths);
      wt.staged.push(...moved.map(f => ({ st: f.st === '?' ? 'A' : f.st, path: f.path, old: null })));
    },
    unstage: async (_id, paths) => {
      const moved = wt.staged.filter(f => paths.includes(f.path));
      wt.staged = drop(wt.staged, paths);
      wt.unstaged.push(...moved.map(f => ({ st: 'M', path: f.path })));
    },
    commit: async () => { wt.staged = []; },
    fileIcon: async () => null,
    openFile: async () => '',
  };

  await import('./src/main.tsx');
</script>
</body>
</html>
