<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Amont — mock</title>
</head>
<body>
<div id="root"></div>
<script type="module">
  /* Harnais de vérification : monte le vrai renderer avec une API git simulée.
     window.amont doit exister avant l'import — lib/git.ts le capture au chargement. */
  /* `r` est au format `%D --decorate=full`. Les cas que la ligne doit tenir :
     branche + son remote + origin/HEAD (un seul chip), remote orphelin, tags en surnombre, tag isolé. */
  /* adresse `users.noreply.github.com` : avatar déduit de l'id, sans requête d'API */
  const ME = '17126477+ethylon@users.noreply.github.com';
  /* SHA complets (fix B1, AUDIT.md §2/§6) : le main ne tronque plus à 8 caractères, le harnais
     doit rester représentatif. Les seeds courts ci-dessous restent lisibles dans ce fichier —
     `sha()` les étend à 40 caractères hex, seule forme que le renderer accepte désormais. */
  const sha = s => s.repeat(Math.ceil(40 / s.length)).slice(0, 40);
  /* Un stash arrive du log sous sa forme brute : le commit d'entrée (3 parents) suivi de sa
     plomberie — index, non suivis — que le renderer doit replier (cf. foldStashes). */
  const C = [
    { h: sha('ee01aa02'), p: [sha('a1b2c3d4'), sha('ee02bb03'), sha('ee03cc04')], d: '2026-07-08', a: 'Mathieu Guey', e: ME, r: '', s: 'On develop: calibrage des seuils du solver' },
    { h: sha('ee02bb03'), p: [sha('a1b2c3d4')], d: '2026-07-08', a: 'Mathieu Guey', e: ME, r: '', s: 'index on develop: a1b2c3d4 Merge…' },
    { h: sha('ee03cc04'), p: [], d: '2026-07-08', a: 'Mathieu Guey', e: ME, r: '', s: 'untracked files on develop: a1b2c3d4 Merge…' },
    { h: sha('a1b2c3d4'), p: [sha('9f8e7d6c'), sha('5a6b7c8d')], d: '2026-07-07', a: 'Mathieu Guey', e: ME, r: 'HEAD -> refs/heads/develop, refs/remotes/origin/develop, refs/remotes/origin/HEAD', s: "Merge branch 'feature/optim-cout' into develop" },
    { h: sha('5a6b7c8d'), p: [sha('9f8e7d6c')], d: '2026-07-07', a: 'Ada Lovelace', e: 'ada@analytical.engine', r: 'refs/remotes/origin/release/4.2', s: 'feat(solver): optimisation du coût de formulation' },
    { h: sha('9f8e7d6c'), p: [sha('7e8f9a0b')], d: '2026-07-06', a: 'Mathieu Guey', e: ME, r: 'refs/heads/master, refs/heads/hotfix/matrice-vide, refs/heads/release/4.3, refs/remotes/origin/master, tag: refs/tags/v4.3.0', s: '[HOTFIX] plantage sur matrice vide' },
    { h: sha('7e8f9a0b'), p: [sha('2b3c4d5e')], d: '2026-07-06', a: 'Mathieu Guey', e: ME, r: 'tag: refs/tags/reflection/v3.0.1, tag: refs/tags/maths/v2.1.0, tag: refs/tags/helpers/v5.5.0, tag: refs/tags/extensions/v3.3.0, tag: refs/tags/exceptions/v1.0.0, tag: refs/tags/collections/v3.0.1', s: 'feat: per-package CI/CD triggers + MinVer versioning' },
    { h: sha('2b3c4d5e'), p: [sha('4d5e6f70')], d: '2026-07-05', a: 'Mathieu Guey', e: ME, r: 'tag: refs/tags/holidays/v1.0.0, tag: refs/tags/helpers/v5.9.0', s: 'Helpers v5.9.0: Holidays France & Mexique (Holidays v1.0.0)' },
    { h: sha('4d5e6f70'), p: [sha('3c4d5e6f')], d: '2026-07-05', a: 'Mathieu Guey', e: ME, r: '', s: '[BACKUP] WIP 2026-07-05 18:42' },
    { h: sha('3c4d5e6f'), p: [sha('00025000')], d: '2026-07-05', a: 'Mathieu Guey', e: ME, r: 'tag: refs/tags/v4.2.0', s: 'chore: reprise' },
  ];

  /* Traîne synthétique linéaire (~25k commits) : de quoi dépasser la fenêtre résidente du cache
     de pages et exercer la vraie virtualisation — éviction, refetch au retour, saut lointain. */
  const TAIL = 25_000;
  const th = i => sha(String(TAIL - i).padStart(8, '0')); // hex valides : que des chiffres
  for (let i = 0; i < TAIL; i++) {
    C.push({
      h: th(i), p: i === TAIL - 1 ? [] : [th(i + 1)], d: '2026-07-04',
      a: i % 3 ? 'Mathieu Guey' : 'Ada Lovelace', e: i % 3 ? ME : 'ada@analytical.engine',
      r: '', s: `chore: itération ${TAIL - i}`,
    });
  }

  /* corps de message : description + co-auteurs, description seule, rien.
     Les deux premiers co-auteurs n'ont pas de Gravatar et retombent sur leur monogramme ;
     le troisième signe sous l'adresse d'un compte GitHub connu (cf. `KNOWN` dans lib/avatar). */
  const BODIES_SEED = {
    '5a6b7c8d': 'Le simplexe repartait de la base triviale à chaque itération de prix.\nOn conserve la base entre deux résolutions : -40% sur les matrices creuses.\n\nCo-authored-by: Ada Lovelace <ada@analytical.engine>\nCo-authored-by: Alan Turing <alan@bletchley.uk>\nCo-authored-by: Claude <noreply@anthropic.com>\n',
    '9f8e7d6c': 'Une matrice sans ligne passait la validation et faisait diviser par zéro\nle calcul de la borne inférieure.\n',
  };
  const BODIES = Object.fromEntries(Object.entries(BODIES_SEED).map(([h, v]) => [sha(h), v]));

  let wt = {
    staged: [{ st: 'A', path: 'src/solver/cost.ts', old: null }],
    unstaged: [{ st: 'M', path: 'src/solver/constraints.ts' }, { st: 'D', path: 'src/legacy/old.ts' }],
    untracked: [{ st: '?', path: 'notes/todo.md' }],
    conflicts: [],
  };
  const drop = (arr, paths) => arr.filter(f => !paths.includes(f.path));

  const REPO = { id: 1, path: '/mock/mock-repo', name: 'mock-repo' };
  const RECENTS = [{ path: '/mock/mock-repo', name: 'mock-repo' }];

  /* Un jeu de listeners par canal d'événement, comme le vrai preload (cf. onOp/onChanged/onTrace
     plus bas). `window.__changed` reste déclenchable à la main depuis la console pour simuler
     un `.git` qui bouge (checkout/commit fait hors app) : il notifie tous les abonnés courants. */
  const onOpListeners = new Set();
  const onChangedListeners = new Set();
  const onTraceListeners = new Set();
  window.__changed = (payload = { id: REPO.id }) => onChangedListeners.forEach(cb => cb(payload));

  const REFS = [
    { name: 'develop', kind: 'head', head: true, ahead: 2, behind: 0, tip: sha('a1b2c3d4') },
    { name: 'feature/optim-cout', kind: 'head', head: false, ahead: 0, behind: 0, tip: sha('5a6b7c8d') },
    { name: 'feature/ui/graph', kind: 'head', head: false, ahead: 0, behind: 0, tip: sha('7e8f9a0b') },
    { name: 'hotfix/matrice-vide', kind: 'head', head: false, ahead: 0, behind: 1, tip: sha('9f8e7d6c') },
    { name: 'master', kind: 'head', head: false, ahead: 0, behind: 0, tip: sha('9f8e7d6c') },
    { name: 'origin/develop', kind: 'remote', head: false, ahead: 0, behind: 0, tip: sha('a1b2c3d4') },
    { name: 'origin/master', kind: 'remote', head: false, ahead: 0, behind: 0, tip: sha('9f8e7d6c') },
    { name: 'origin/release/4.2', kind: 'remote', head: false, ahead: 0, behind: 0, tip: sha('5a6b7c8d') },
    { name: 'v4.1.3', kind: 'tag', head: false, ahead: 0, behind: 0, tip: sha('4d5e6f70') },
    { name: 'v4.2.0', kind: 'tag', head: false, ahead: 0, behind: 0, tip: sha('3c4d5e6f') },
  ];

  window.amont = {
    state: async () => ({ root: '/mock', recents: RECENTS, tabs: [REPO], active: REPO.id }),
    repos: async () => ({ root: '/mock', recents: RECENTS }),
    setTabs: async () => {},
    openDialog: async () => REPO,
    openPath: async () => REPO,
    close: async () => {},
    chooseRoot: async () => '/mock',
    scanRoot: async () => RECENTS,
    log: async (_id, skip, count) => C.slice(skip, skip + count),
    total: async () => C.length - 2, // moins la plomberie du stash, comme repo:total
    refs: async () => REFS,
    stashes: async () => [
      { name: 'stash@{0}', h: sha('ee01aa02'), p: [sha('a1b2c3d4'), sha('ee02bb03'), sha('ee03cc04')], d: '2026-07-08', a: 'Mathieu Guey', e: ME, s: 'On develop: calibrage des seuils du solver' },
    ],
    stash: async () => {},
    files: async () => [
      { st: 'M', path: 'src/solver/cost.ts', old: null },
      { st: 'A', path: 'src/solver/lp/simplex.ts', old: null },
      { st: 'D', path: 'src/legacy/old.ts', old: null },
    ],
    diff: async () => 'diff --git a/x.ts b/x.ts\n--- a/x.ts\n+++ b/x.ts\n@@ -1 +1 @@\n-const a = 1\n+const a = 2\n',
    status: async () => ({ branch: 'develop', head: C[0].h, ahead: 1, behind: 2 }),
    body: async (_id, hash) => BODIES[hash] ?? '',
    op: async () => {},
    /* Le vrai bridge retourne un désabonnement par appel (ipcRenderer.off, cf. src/preload) :
       un jeu de listeners par canal, plutôt qu'un unique callback, pour rester fidèle à la
       forme réelle même si le harnais n'a qu'un seul onglet monté à la fois. */
    onOp: cb => { onOpListeners.add(cb); return () => onOpListeners.delete(cb); },
    onChanged: cb => { onChangedListeners.add(cb); return () => onChangedListeners.delete(cb); },
    onTrace: cb => { onTraceListeners.add(cb); return () => onTraceListeners.delete(cb); },
    search: async () => [],
    flow: async () => null,
    branch: async () => {},
    checkout: async () => {},
    worktree: async () => structuredClone(wt),
    wtdiff: async (_id, p) => `diff --git a/${p} b/${p}\n--- a/${p}\n+++ b/${p}\n@@ -1 +1 @@\n-old\n+new\n`,
    stage: async (_id, paths) => {
      const moved = [...wt.unstaged, ...wt.untracked].filter(f => paths.includes(f.path));
      wt.unstaged = drop(wt.unstaged, paths);
      wt.untracked = drop(wt.untracked, paths);
      wt.staged.push(...moved.map(f => ({ st: f.st === '?' ? 'A' : f.st, path: f.path, old: null })));
    },
    unstage: async (_id, paths) => {
      const moved = wt.staged.filter(f => paths.includes(f.path));
      wt.staged = drop(wt.staged, paths);
      wt.unstaged.push(...moved.map(f => ({ st: 'M', path: f.path })));
    },
    commit: async () => { wt.staged = []; },
    fileIcon: async () => null,
    openFile: async () => '',
    cancel: async () => {},
  };

  await import('./src/main.tsx');
</script>
</body>
</html>
