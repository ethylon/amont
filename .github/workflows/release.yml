name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      # Pre-create the draft release with auto-generated notes. electron-builder then uploads into
      # this existing release instead of creating its own — which avoids the concurrent-create race
      # that silently dropped the installer asset — and --generate-notes runs on `create`, the only
      # command that supports it (`gh release edit --generate-notes` does not exist).
      - run: gh release create ${{ github.ref_name }} --draft --title ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # electron-builder reads `publish` from electron-builder.yml: attaches the installer to the draft
      - run: pnpm release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Crash reporting: baked in only for official release builds (cf. main/telemetry.ts).
          # Set the `SENTRY_DSN` repository variable to enable it; unset → empty → telemetry stays
          # inert. A DSN ends up embedded in the shipped binary, so it's a variable, not a secret.
          MAIN_VITE_SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          # Source-map upload for readable stack traces (cf. electron.vite.config.mjs). The token
          # grants write access to the Sentry project and is NOT embedded in the binary, so it's a
          # secret. Unset → source maps aren't generated or uploaded; the build still succeeds.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - run: gh release edit ${{ github.ref_name }} --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
