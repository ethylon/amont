name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      # electron-builder lit `publish` dans electron-builder.yml : brouillon + installeur attaché
      - run: pnpm release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: gh release edit ${{ github.ref_name }} --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
