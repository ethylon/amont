name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      # electron-builder reads `publish` from electron-builder.yml: draft + installer attached
      - run: pnpm release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --generate-notes fills in the changelog from merged PRs since the previous tag
      - run: gh release edit ${{ github.ref_name }} --draft=false --latest --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
