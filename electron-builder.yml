appId: fr.mathieuguey.gitgraph
productName: Git Graph

# Le renderer et le main sont bundlés par electron-vite : `out/` se suffit,
# `node_modules` n'a rien à faire dans l'asar.
files:
  - out/**
  - package.json

# electron-builder y cherche l'icône de lui-même (icon.png, >= 256x256 → .ico généré).
directories:
  buildResources: resources

win:
  target: nsis

# ponytail: pas de signature de code. SmartScreen affichera « éditeur inconnu »
# jusqu'à l'achat d'un certificat EV — renseigner alors `win.certificateSubjectName`.

# La release reste en brouillon le temps de l'upload : le workflow la publie ensuite.
# `releaseType: release` fait re-créer la release à chaque artefact → 422 already_exists.
publish:
  provider: github
  owner: ethylon
  repo: git-graph
  releaseType: draft
