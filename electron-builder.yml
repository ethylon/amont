appId: fr.mathieuguey.amont
productName: Amont

# Le renderer et le main sont bundlés par electron-vite : `out/` se suffit,
# `node_modules` n'a rien à faire dans l'asar.
files:
  - out/**
  - package.json

# electron-builder y cherche l'icône de lui-même (icon.ico multi-tailles, icon.png en secours).
directories:
  buildResources: resources

win:
  target: nsis

# No code signing for 1.0: SmartScreen will show "unknown publisher" until a certificate is
# obtained (see README/CONTRIBUTING for the SignPath Foundation route) — set
# `win.certificateSubjectName` once one is configured.

# Fuses Electron (RunAsNode, inspect CLI, NODE_OPTIONS, intégrité asar) : basculées sur le
# binaire packagé une fois les fichiers en place, avant toute signature (AUDIT.md §4).
afterPack: scripts/after-pack.mjs

# La release reste en brouillon le temps de l'upload : le workflow la publie ensuite.
# `releaseType: release` fait re-créer la release à chaque artefact → 422 already_exists.
publish:
  provider: github
  owner: ethylon
  repo: amont
  releaseType: draft
