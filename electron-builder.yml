appId: fr.mathieuguey.amont
productName: Amont

# The renderer and main are bundled by electron-vite: `out/` is enough,
# `node_modules` has no business in the asar.
files:
  - out/**
  - package.json

# electron-builder finds the icon on its own (icon.ico multi-size, icon.png as fallback).
directories:
  buildResources: resources

win:
  target: nsis

# No code signing for 1.0: SmartScreen will show "unknown publisher" until a certificate is
# obtained (see README/CONTRIBUTING for the SignPath Foundation route) — set
# `win.certificateSubjectName` once one is configured.

# Electron fuses (RunAsNode, inspect CLI, NODE_OPTIONS, asar integrity): flipped on the
# packaged binary once the files are in place, before any signing (AUDIT.md §4).
afterPack: scripts/after-pack.mjs

# The release stays a draft for the duration of the upload: the workflow publishes it after.
# `releaseType: release` would recreate the release on every artifact -> 422 already_exists.
publish:
  provider: github
  owner: ethylon
  repo: amont
  releaseType: draft
